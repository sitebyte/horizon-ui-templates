<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cargo Matching — Horizon ETRM</title>
  <link href="shell.css" rel="stylesheet" />
  <style>
    /* ---- Page layout: 3-panel ---- */
    .cm-top { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
    @media (max-width: 64rem) { .cm-top { grid-template-columns: 1fr; } }

    /* ---- Panel header ---- */
    .cm-panel-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.375rem;
    }
    .cm-panel-title {
      font-size: var(--text-sm); font-weight: 600; color: var(--text-primary);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .cm-panel-count {
      font-size: 0.5625rem; font-weight: 700; font-family: var(--font-mono);
      padding: 0.125rem 0.375rem; border-radius: var(--radius-full);
      background: var(--amber-dim); color: var(--amber);
    }

    /* ---- Matching params bar ---- */
    .cm-match-bar {
      display: flex; flex-wrap: wrap; align-items: flex-end; gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: var(--card-bg);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 0.75rem;
    }
    .cm-field { display: flex; flex-direction: column; gap: 0.125rem; }
    .cm-field label {
      font-size: 0.5625rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .cm-field select, .cm-field input {
      height: 1.75rem; font-size: var(--text-xs);
      padding: 0 0.5rem; min-width: 10rem;
    }

    /* ---- Table tweaks ---- */
    .cm-tbl { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
    .cm-tbl th {
      text-align: left; padding: var(--sp-1) var(--sp-2);
      font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; font-size: 0.5625rem; letter-spacing: 0.05em;
      border-bottom: 0.0625rem solid var(--border);
      background: var(--card-bg); position: sticky; top: 0; z-index: 1;
    }
    .cm-tbl td {
      padding: var(--sp-1) var(--sp-2);
      border-bottom: 0.0625rem solid var(--border-subtle);
      color: var(--text-secondary); height: 1.5rem;
    }
    .cm-tbl tr:hover td { background: var(--hover); }
    .cm-tbl td.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; }
    .cm-tbl th.num { text-align: right; }
    .cm-tbl input[type="checkbox"] { accent-color: var(--accent); width: 0.875rem; height: 0.875rem; cursor: pointer; }

    /* ---- Status badges ---- */
    .cm-badge {
      display: inline-flex; align-items: center;
      padding: 0.0625rem 0.375rem; border-radius: var(--radius-full);
      font-size: 0.5625rem; font-weight: 600;
    }
    .cm-badge.matched  { background: var(--blue-dim);  color: var(--blue); }
    .cm-badge.scheduled { background: var(--amber-dim); color: var(--amber); }
    .cm-badge.intransit { background: var(--green-dim); color: var(--green); }

    /* ---- Page title area ---- */
    .cm-page-hdr {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .cm-page-title {
      font-size: 0.9375rem; font-weight: 700; color: var(--text-primary);
    }
    .cm-page-badge {
      font-size: 0.5625rem; font-weight: 700; font-family: var(--font-mono);
      padding: 0.125rem 0.5rem; border-radius: var(--radius-full);
      background: var(--amber-dim); color: var(--amber);
    }

    /* ---- Selected row highlight ---- */
    .cm-tbl tr.selected td { background: var(--accent-bg2); }
  </style>
</head>
<body>
<div id="hz-app">

  <!-- Page header -->
  <div class="cm-page-hdr fade-in">
    <span class="cm-page-title">Cargo Matching</span>
    <span class="cm-page-badge">4 unmatched</span>
  </div>

  <!-- Top panels: Purchases + Sales -->
  <div class="cm-top fade-in-d1">

    <!-- Top-left: Unmatched Purchases -->
    <div>
      <div class="cm-panel-hdr">
        <div class="cm-panel-title">Unmatched Purchases <span class="cm-panel-count">4</span></div>
      </div>
      <div style="overflow-x:auto;">
        <table class="cm-tbl" id="tbl-purchases">
          <thead>
            <tr>
              <th style="width:2rem;"></th>
              <th>Trade ID</th>
              <th>Counterparty</th>
              <th>Product</th>
              <th class="num">Volume</th>
              <th>Start Port</th>
              <th>Delivery</th>
            </tr>
          </thead>
          <tbody id="tbody-purchases"></tbody>
        </table>
      </div>
    </div>

    <!-- Top-right: Unmatched Sales -->
    <div>
      <div class="cm-panel-hdr">
        <div class="cm-panel-title">Unmatched Sales <span class="cm-panel-count">3</span></div>
      </div>
      <div style="overflow-x:auto;">
        <table class="cm-tbl" id="tbl-sales">
          <thead>
            <tr>
              <th style="width:2rem;"></th>
              <th>Trade ID</th>
              <th>Counterparty</th>
              <th>Product</th>
              <th class="num">Volume</th>
              <th>Start Port</th>
              <th>Delivery</th>
            </tr>
          </thead>
          <tbody id="tbody-sales"></tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Middle: Matching Parameters -->
  <div class="cm-match-bar fade-in-d2">
    <div class="cm-field">
      <label>Vessel</label>
      <select class="hz-input" id="cm-vessel" style="height:1.75rem;font-size:var(--text-xs);">
        <option value="">-- Select Vessel --</option>
        <option value="Al Dafna">Al Dafna</option>
        <option value="Seri Begawan">Seri Begawan</option>
        <option value="Arctic Spirit">Arctic Spirit</option>
        <option value="Pacific Breeze">Pacific Breeze</option>
      </select>
    </div>
    <div class="cm-field">
      <label>Return Port</label>
      <select class="hz-input" id="cm-return-port" style="height:1.75rem;font-size:var(--text-xs);">
        <option value="">-- Select Port --</option>
        <option value="Sabine Pass">Sabine Pass</option>
        <option value="Ras Laffan">Ras Laffan</option>
        <option value="Bonny Island">Bonny Island</option>
      </select>
    </div>
    <div class="cm-field">
      <label>Charter Override ($)</label>
      <input class="hz-input" id="cm-charter-override" type="text" placeholder="e.g. 85,000" style="height:1.75rem;font-size:var(--text-xs);min-width:8rem;" />
    </div>
    <button class="hz-btn primary sm" onclick="matchSelected()">Match Selected</button>
    <button class="hz-btn ghost sm" onclick="clearSelection()">Clear Selection</button>
  </div>

  <!-- Bottom: Matched Cargoes -->
  <div class="fade-in-d3">
    <div class="cm-panel-hdr">
      <div class="cm-panel-title">Matched Cargoes</div>
    </div>
    <div style="overflow-x:auto;">
      <table class="cm-tbl" id="tbl-matched">
        <thead>
          <tr>
            <th>Cargo</th>
            <th>Vessel</th>
            <th>Buy Trade</th>
            <th>Sell Trade</th>
            <th class="num">Volume</th>
            <th>Load Port</th>
            <th>Discharge Port</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody-matched"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="shell.js"></script>
<script>
initShell('cargo-matching', 'Cargo Matching');

/* ============================================================
   DATA
   ============================================================ */

var purchases = [
  { id: 'T-2041', cp: 'QatarEnergy',    product: 'LNG (DES)', volume: '3,200,000', port: 'Ras Laffan',   delivery: 'Jul 2026' },
  { id: 'T-2043', cp: 'Shell Trading',   product: 'LNG (FOB)', volume: '2,800,000', port: 'Sabine Pass',  delivery: 'Jul 2026' },
  { id: 'T-2045', cp: 'Cheniere',        product: 'LNG (FOB)', volume: '3,400,000', port: 'Sabine Pass',  delivery: 'Aug 2026' },
  { id: 'T-2047', cp: 'NLNG',            product: 'LNG (FOB)', volume: '2,950,000', port: 'Bonny Island', delivery: 'Aug 2026' },
];

var sales = [
  { id: 'T-2042', cp: 'JERA Co.',        product: 'LNG (DES)', volume: '3,200,000', port: 'Sodegaura',    delivery: 'Aug 2026' },
  { id: 'T-2044', cp: 'KOGAS',           product: 'LNG (DES)', volume: '2,800,000', port: 'Incheon',      delivery: 'Aug 2026' },
  { id: 'T-2046', cp: 'PetroChina',      product: 'LNG (DES)', volume: '3,400,000', port: 'Dapeng',       delivery: 'Sep 2026' },
];

var matched = [
  { cargo: 'CRG-2035', vessel: 'Al Dafna',      buy: 'T-2031', sell: 'T-2032', volume: '3,200,000', loadPort: 'Ras Laffan',   dischPort: 'Sodegaura', status: 'In Transit' },
  { cargo: 'CRG-2033', vessel: 'Seri Begawan',   buy: 'T-2029', sell: 'T-2030', volume: '2,800,000', loadPort: 'Sabine Pass',  dischPort: 'Incheon',   status: 'Scheduled' },
  { cargo: 'CRG-2031', vessel: 'Arctic Spirit',  buy: 'T-2027', sell: 'T-2028', volume: '3,400,000', loadPort: 'Bonny Island', dischPort: 'Gate Rotterdam', status: 'Matched' },
];

var selectedPurchases = [];
var selectedSales = [];

/* ============================================================
   RENDER
   ============================================================ */

function renderPurchases() {
  var tbody = document.getElementById('tbody-purchases');
  var html = '';
  purchases.forEach(function(t, i) {
    var sel = selectedPurchases.indexOf(i) >= 0;
    html += '<tr class="' + (sel ? 'selected' : '') + '" onclick="togglePurchase(' + i + ')">';
    html += '<td><input type="checkbox" ' + (sel ? 'checked' : '') + ' onclick="event.stopPropagation(); togglePurchase(' + i + ')" /></td>';
    html += '<td><a href="lifecycle.html" class="hz-entity-link" onclick="event.stopPropagation();">' + t.id + '</a></td>';
    html += '<td>' + t.cp + '</td>';
    html += '<td>' + t.product + '</td>';
    html += '<td class="num">' + t.volume + '</td>';
    html += '<td>' + t.port + '</td>';
    html += '<td>' + t.delivery + '</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

function renderSales() {
  var tbody = document.getElementById('tbody-sales');
  var html = '';
  sales.forEach(function(t, i) {
    var sel = selectedSales.indexOf(i) >= 0;
    html += '<tr class="' + (sel ? 'selected' : '') + '" onclick="toggleSale(' + i + ')">';
    html += '<td><input type="checkbox" ' + (sel ? 'checked' : '') + ' onclick="event.stopPropagation(); toggleSale(' + i + ')" /></td>';
    html += '<td><a href="lifecycle.html" class="hz-entity-link" onclick="event.stopPropagation();">' + t.id + '</a></td>';
    html += '<td>' + t.cp + '</td>';
    html += '<td>' + t.product + '</td>';
    html += '<td class="num">' + t.volume + '</td>';
    html += '<td>' + t.port + '</td>';
    html += '<td>' + t.delivery + '</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

function renderMatched() {
  var tbody = document.getElementById('tbody-matched');
  var html = '';
  matched.forEach(function(m) {
    var statusCls = m.status === 'Matched' ? 'matched' : m.status === 'Scheduled' ? 'scheduled' : 'intransit';
    html += '<tr>';
    html += '<td><a href="cargo-board.html" class="hz-entity-link">' + m.cargo + '</a></td>';
    html += '<td>' + m.vessel + '</td>';
    html += '<td><a href="lifecycle.html" class="hz-entity-link">' + m.buy + '</a></td>';
    html += '<td><a href="lifecycle.html" class="hz-entity-link">' + m.sell + '</a></td>';
    html += '<td class="num">' + m.volume + '</td>';
    html += '<td>' + m.loadPort + '</td>';
    html += '<td>' + m.dischPort + '</td>';
    html += '<td><span class="cm-badge ' + statusCls + '">' + m.status + '</span></td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

/* ============================================================
   INTERACTIONS
   ============================================================ */

function togglePurchase(idx) {
  var pos = selectedPurchases.indexOf(idx);
  if (pos >= 0) { selectedPurchases.splice(pos, 1); }
  else { selectedPurchases.push(idx); }
  renderPurchases();
}

function toggleSale(idx) {
  var pos = selectedSales.indexOf(idx);
  if (pos >= 0) { selectedSales.splice(pos, 1); }
  else { selectedSales.push(idx); }
  renderSales();
}

function clearSelection() {
  selectedPurchases = [];
  selectedSales = [];
  document.getElementById('cm-vessel').value = '';
  document.getElementById('cm-return-port').value = '';
  document.getElementById('cm-charter-override').value = '';
  renderPurchases();
  renderSales();
}

function matchSelected() {
  if (selectedPurchases.length === 0) {
    showToast('Select at least one purchase trade', 'error');
    return;
  }
  if (selectedSales.length === 0) {
    showToast('Select at least one sale trade', 'error');
    return;
  }
  var vessel = document.getElementById('cm-vessel').value;
  if (!vessel) {
    showToast('Select a vessel for matching', 'error');
    return;
  }

  /* Build the new cargo from first selected buy + sell */
  var buyIdx = selectedPurchases[0];
  var sellIdx = selectedSales[0];
  var buyTrade = purchases[buyIdx];
  var sellTrade = sales[sellIdx];

  var newCargoId = 'CRG-' + (2035 + matched.length + 1);
  matched.push({
    cargo: newCargoId,
    vessel: vessel,
    buy: buyTrade.id,
    sell: sellTrade.id,
    volume: buyTrade.volume,
    loadPort: buyTrade.port,
    dischPort: sellTrade.port,
    status: 'Matched'
  });

  /* Remove matched items from unmatched lists */
  purchases.splice(buyIdx, 1);
  sales.splice(sellIdx, 1);
  selectedPurchases = [];
  selectedSales = [];

  /* Update badge count */
  var badge = document.querySelector('.cm-page-badge');
  if (badge) badge.textContent = purchases.length + ' unmatched';
  var purchCount = document.querySelector('#tbl-purchases').closest('div').parentElement.querySelector('.cm-panel-count');
  if (purchCount) purchCount.textContent = purchases.length;

  renderPurchases();
  renderSales();
  renderMatched();

  showToast('Cargo ' + newCargoId + ' created: ' + buyTrade.id + ' + ' + sellTrade.id + ' on ' + vessel, 'success');
}

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded', function() {
  renderPurchases();
  renderSales();
  renderMatched();
});
</script>

</body>
</html>
