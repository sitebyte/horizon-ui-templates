  <script>
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('mobileOverlay').classList.toggle('hidden'); }
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }

    // Status cell renderer
    function statusRenderer(params) {
      const statusMap = {
        'Confirmed': 'badge-confirmed',
        'Pending': 'badge-pending',
        'Draft': 'badge-draft',
        'Cancelled': 'badge-error'
      };
      const cls = statusMap[params.value] || 'badge-draft';
      return `<span class="status-badge ${cls}">${params.value}</span>`;
    }

    const columnDefs = [
      { headerCheckboxSelection: true, checkboxSelection: true, width: 50, headerName: '' },
      { field: 'tradeId', headerName: 'Trade ID', sortable: true, filter: true, width: 150 },
      { field: 'date', headerName: 'Date', sortable: true, filter: true, width: 130 },
      { field: 'counterparty', headerName: 'Counterparty', sortable: true, filter: true, flex: 1, minWidth: 160 },
      { field: 'type', headerName: 'Type', sortable: true, filter: true, width: 100 },
      { field: 'direction', headerName: 'Buy/Sell', sortable: true, filter: true, width: 100 },
