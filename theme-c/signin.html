<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meridian Glass — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
          colors: {
            violet: {
              50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd',
              400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9',
              800: '#5b21b6', 900: '#4c1d95'
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-size: 0.875rem; }
    .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(1.5rem); -webkit-backdrop-filter: blur(1.5rem); border: 0.0625rem solid rgba(255,255,255,0.2); }
    .dark .glass { background: rgba(38,38,38,0.5); border-color: rgba(64,64,64,0.3); }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animated-gradient {
      background: linear-gradient(-45deg, #7c3aed, #6d28d9, #4c1d95, #5b21b6, #7c3aed, #818cf8, #6366f1);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }
  </style>
</head>
<body class="antialiased">
  <div class="animated-gradient min-h-screen flex items-center justify-center p-5 relative">
    <!-- Theme toggle top-right -->
    <button onclick="toggleTheme()" class="absolute top-5 right-5 p-2.5 rounded-xl glass text-white/80 hover:text-white transition-all">
      <svg id="themeIconLight" class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
      <svg id="themeIconDark" class="w-5 h-5 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
    </button>

    <!-- Sign In Card -->
    <div class="glass rounded-2xl p-8 w-full max-w-md">
      <!-- Logo / Avatar Circle -->
      <div class="flex justify-center mb-8">
        <div class="w-16 h-16 rounded-full bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center shadow-lg shadow-violet-500/30">
          <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
        </div>
      </div>

      <h2 class="text-xl font-bold text-center text-white mb-1">Welcome back</h2>
      <p class="text-sm text-center text-white/60 mb-8">Sign in to Meridian Glass</p>

      <form onsubmit="return false;" class="space-y-5">
        <div>
          <label class="block text-xs font-medium text-white/90 mb-2">Email</label>
          <input type="email" placeholder="you@meridian-lng.com" class="w-full rounded-2xl border border-white/20 bg-white/10 backdrop-blur-sm py-3 px-4 text-sm text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-violet-400/50 focus:border-violet-400/50 transition-all">
        </div>

        <div>
          <label class="block text-xs font-medium text-white/90 mb-2">Password</label>
          <input type="password" placeholder="Enter your password" class="w-full rounded-2xl border border-white/20 bg-white/10 backdrop-blur-sm py-3 px-4 text-sm text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-violet-400/50 focus:border-violet-400/50 transition-all">
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 rounded border-white/30 bg-white/10 text-violet-600 focus:ring-violet-500/50">
            <span class="text-xs text-white/80">Remember me</span>
          </label>
          <a href="#" class="text-xs text-violet-300 hover:text-violet-200 font-medium transition-colors">Forgot password?</a>
        </div>

        <button type="submit" onclick="window.location.href='index.html'" class="w-full bg-gradient-to-r from-violet-600 to-purple-600 text-white text-sm font-semibold py-3.5 rounded-2xl transition-all hover:shadow-lg hover:shadow-violet-500/30 hover:from-violet-500 hover:to-purple-500">
          Sign In
        </button>
      </form>

      <div class="mt-6 flex items-center gap-3">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-xs text-white/40">or continue with</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <div class="mt-5 grid grid-cols-2 gap-3">
        <button class="flex items-center justify-center gap-2 rounded-2xl border border-white/20 bg-white/10 backdrop-blur-sm py-2.5 text-sm text-white/80 hover:bg-white/20 transition-all">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="flex items-center justify-center gap-2 rounded-2xl border border-white/20 bg-white/10 backdrop-blur-sm py-2.5 text-sm text-white/80 hover:bg-white/20 transition-all">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
          GitHub
        </button>
      </div>

      <p class="mt-6 text-center text-xs text-white/40">
        Don't have an account? <a href="#" class="text-violet-300 hover:text-violet-200 font-medium transition-colors">Request access</a>
      </p>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>

<!-- Back to Index -->
<a href="../index.html" 
   style="position:fixed;bottom:1rem;right:1rem;z-index:9999;display:inline-flex;align-items:center;gap:0.375rem;padding:0.5rem 0.875rem;font-size:0.75rem;font-family:Inter,system-ui,sans-serif;border-radius:0.5rem;text-decoration:none;transition:all 0.15s;background:rgba(99,102,241,0.9);color:white;box-shadow:0 0.25rem 0.75rem rgba(0,0,0,0.2);backdrop-filter:blur(0.5rem);"
   onmouseover="this.style.background='rgba(79,70,229,1)'"
   onmouseout="this.style.background='rgba(99,102,241,0.9)'"
>&#8592; All Themes</a>

</body>
</html>
