<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meridian Glass — 404</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
          colors: {
            violet: {
              50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd',
              400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9',
              800: '#5b21b6', 900: '#4c1d95'
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-size: 0.875rem; }
    .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(1.5rem); -webkit-backdrop-filter: blur(1.5rem); border: 0.0625rem solid rgba(255,255,255,0.2); }
    .dark .glass { background: rgba(38,38,38,0.5); border-color: rgba(64,64,64,0.3); }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animated-gradient {
      background: linear-gradient(-45deg, #7c3aed, #6d28d9, #4c1d95, #5b21b6, #7c3aed, #818cf8, #6366f1);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-0.5rem); }
    }
    .float-anim { animation: float 4s ease-in-out infinite; }
  </style>
</head>
<body class="antialiased">
  <div class="animated-gradient min-h-screen flex items-center justify-center p-5 relative">
    <!-- Theme toggle top-right -->
    <button onclick="toggleTheme()" class="absolute top-5 right-5 p-2.5 rounded-xl glass text-white/80 hover:text-white transition-all">
      <svg id="themeIconLight" class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
      <svg id="themeIconDark" class="w-5 h-5 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
    </button>

    <!-- 404 Card -->
    <div class="glass rounded-2xl p-10 w-full max-w-lg text-center float-anim">
      <!-- Large 404 with gradient text -->
      <div class="text-8xl font-bold bg-gradient-to-r from-violet-400 via-purple-400 to-violet-300 bg-clip-text text-transparent mb-4" style="line-height: 1.1;">404</div>

      <h2 class="text-xl font-bold text-white mb-2">Page not found</h2>
      <p class="text-sm text-white/60 mb-8 max-w-sm mx-auto">The page you're looking for doesn't exist or has been moved. Let's get you back on course.</p>

      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="index.html" class="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-violet-600 to-purple-600 text-white text-sm font-semibold py-3 px-6 rounded-2xl transition-all hover:shadow-lg hover:shadow-violet-500/30 hover:from-violet-500 hover:to-purple-500">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
          Back to Home
        </a>
        <button onclick="history.back()" class="inline-flex items-center justify-center gap-2 rounded-2xl border border-white/20 bg-white/10 backdrop-blur-sm py-3 px-6 text-sm text-white/80 font-medium hover:bg-white/20 transition-all">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"/></svg>
          Go Back
        </button>
      </div>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
<!-- Back to Index --><a href="../index.html" style="position:fixed;bottom:1rem;right:1rem;z-index:9999;display:inline-flex;align-items:center;gap:0.375rem;padding:0.375rem 0.75rem;font-size:0.75rem;font-family:Inter,system-ui,sans-serif;border-radius:0.5rem;text-decoration:none;transition:all 0.15s;background:rgba(99,102,241,0.9);color:white;box-shadow:0 0.25rem 0.75rem rgba(0,0,0,0.2);backdrop-filter:blur(0.5rem);" onmouseover="this.style.background='rgba(79,70,229,1)'" onmouseout="this.style.background='rgba(99,102,241,0.9)'"></body>#8592; All Themes</a>
</body>
</html>
