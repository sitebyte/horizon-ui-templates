<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vessel Charters — Horizon ETRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:["selector","[data-theme=\"dark\"]"],theme:{extend:{fontFamily:{sans:["Inter","sans-serif"],mono:["JetBrains Mono","monospace"]}}}}</script>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link href="shell.css" rel="stylesheet" />
  <style>
    /* ---- KPI strip ---- */
    .vc-kpis {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    @media (max-width: 48rem) { .vc-kpis { grid-template-columns: repeat(2, 1fr); } }

    /* ---- Table: borderless fills viewport ---- */
    .vc-tbl { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
    .vc-tbl th {
      text-align: left; padding: var(--sp-1) var(--sp-2);
      font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; font-size: 0.5625rem; letter-spacing: 0.05em;
      border-bottom: 0.0625rem solid var(--border);
      position: sticky; top: 0; background: var(--surface-canvas); z-index: 1;
    }
    .vc-tbl td {
      padding: var(--sp-1) var(--sp-2);
      border-bottom: 0.0625rem solid var(--border-subtle);
      color: var(--text-secondary); height: 1.5rem;
    }
    .vc-tbl tr:hover td { background: var(--hover); }
    .vc-tbl tr.selected td { background: var(--accent-bg2); }
    .vc-tbl td.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; }
    .vc-tbl th.num { text-align: right; }

    /* ---- Status badges ---- */
    .vc-badge {
      display: inline-flex; align-items: center;
      padding: 0.0625rem 0.375rem; border-radius: var(--radius-full);
      font-size: 0.5625rem; font-weight: 600;
    }
    .vc-badge.active  { background: var(--green-dim);  color: var(--green); }
    .vc-badge.expired { background: var(--surface-elevated); color: var(--text-muted); }
    .vc-badge.pending { background: var(--amber-dim); color: var(--amber); }

    /* ---- Detail panel ---- */
    .vc-detail {
      margin-top: 0.75rem;
      background: var(--card-bg);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.75rem;
    }
    .vc-detail-title {
      font-size: var(--text-sm); font-weight: 700; color: var(--text-primary);
      margin-bottom: 0.5rem;
      display: flex; align-items: center; gap: 0.5rem;
    }

    /* Section within detail */
    .vc-section {
      margin-bottom: 0.625rem;
    }
    .vc-section:last-child { margin-bottom: 0; }
    .vc-section-hdr {
      font-size: 0.5625rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 0.375rem;
      padding-bottom: 0.25rem;
      border-bottom: 0.0625rem solid var(--border-subtle);
    }

    /* Detail field grid */
    .vc-fields {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(11rem, 1fr));
      gap: 0.375rem 1.25rem;
    }
    .vc-field { display: flex; flex-direction: column; gap: 0.0625rem; }
    .vc-field-label {
      font-size: 0.5625rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .vc-field-value {
      font-size: var(--text-sm); font-weight: 500; color: var(--text-primary);
    }
    .vc-field-value.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

    /* Invoice mini-table */
    .vc-inv-tbl { width: 100%; border-collapse: collapse; font-size: var(--text-xs); }
    .vc-inv-tbl th {
      text-align: left; padding: var(--sp-1) var(--sp-2);
      font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; font-size: 0.5rem; letter-spacing: 0.05em;
      border-bottom: 0.0625rem solid var(--border);
    }
    .vc-inv-tbl td {
      padding: var(--sp-1) var(--sp-2);
      border-bottom: 0.0625rem solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .vc-inv-tbl td.num { font-family: var(--font-mono); text-align: right; }
    .vc-inv-tbl th.num { text-align: right; }
    .vc-inv-tbl tr:hover td { background: var(--hover); }

    /* Paid badge */
    .inv-badge {
      display: inline-flex; padding: 0.0625rem 0.375rem; border-radius: var(--radius-full);
      font-size: 0.5rem; font-weight: 600;
    }
    .inv-badge.paid { background: var(--green-dim); color: var(--green); }
    .inv-badge.due  { background: var(--amber-dim); color: var(--amber); }
    .inv-badge.upcoming { background: var(--surface-elevated); color: var(--text-muted); }

    /* Clickable row */
    .vc-tbl tr { cursor: pointer; }
  </style>
</head>
<body>
<div id="hz-app">

  <!-- KPIs -->
  <div class="vc-kpis fade-in">
    <div class="hz-kpi">
      <span class="hz-kpi-label">Active Charters</span>
      <span class="hz-kpi-value">3</span>
    </div>
    <div class="hz-kpi">
      <span class="hz-kpi-label">Vessels on Hire</span>
      <span class="hz-kpi-value">3</span>
    </div>
    <div class="hz-kpi">
      <span class="hz-kpi-label">Monthly Cost</span>
      <span class="hz-kpi-value">$2.4M</span>
    </div>
    <div class="hz-kpi">
      <span class="hz-kpi-label">Avg Daily Rate</span>
      <span class="hz-kpi-value">$85K</span>
    </div>
  </div>

  <!-- Charter list -->
  <div class="fade-in-d1" style="overflow-x:auto;">
    <table class="vc-tbl" id="tbl-charters">
      <thead>
        <tr>
          <th>Charter ID</th>
          <th>Vessel</th>
          <th>Counterparty</th>
          <th>Start</th>
          <th>End</th>
          <th class="num">Daily Rate</th>
          <th>Status</th>
          <th class="num">Heel (MT)</th>
        </tr>
      </thead>
      <tbody id="tbody-charters"></tbody>
    </table>
  </div>

  <!-- Charter detail panel -->
  <div class="vc-detail fade-in-d2" id="charter-detail"></div>

</div>

<script src="shell.js"></script>
<script>
initShell('vessel-charters', 'Vessel Charters');

/* ============================================================
   DATA
   ============================================================ */

var charters = [
  {
    id: 'TC-2026-001', vessel: 'Al Dafna', imo: '9784321', dwt: '87,145',
    cp: 'Nakilat (Q-Max)', start: '2026-01-15', end: '2027-01-14',
    dailyRate: 92000, paymentTerm: 'Monthly in arrears, 15 days',
    status: 'Active',
    startLocation: 'Ras Laffan, Qatar', endLocation: 'Ras Laffan, Qatar',
    returnBasis: 'Same port, laden or ballast',
    heelStart: { qty: '1,200', port: 'Ras Laffan' },
    heelEnd: { qty: '1,100', port: 'Ras Laffan' },
    heelDisplay: '1,200',
    invoices: [
      { period: 'Jan 2026', amount: 2852000, due: '2026-02-15', status: 'Paid' },
      { period: 'Feb 2026', amount: 2576000, due: '2026-03-15', status: 'Paid' },
      { period: 'Mar 2026', amount: 2852000, due: '2026-04-15', status: 'Paid' },
      { period: 'Apr 2026', amount: 2760000, due: '2026-05-15', status: 'Due' },
      { period: 'May 2026', amount: 2852000, due: '2026-06-15', status: 'Upcoming' },
      { period: 'Jun 2026', amount: 2760000, due: '2026-07-15', status: 'Upcoming' },
    ]
  },
  {
    id: 'TC-2026-002', vessel: 'Seri Begawan', imo: '9812456', dwt: '79,800',
    cp: 'MISC Berhad', start: '2026-02-01', end: '2027-01-31',
    dailyRate: 85000, paymentTerm: 'Monthly in arrears, 10 days',
    status: 'Active',
    startLocation: 'Bintulu, Malaysia', endLocation: 'Bintulu, Malaysia',
    returnBasis: 'Same port, ballast',
    heelStart: { qty: '950', port: 'Bintulu' },
    heelEnd: { qty: '900', port: 'Bintulu' },
    heelDisplay: '950',
    invoices: [
      { period: 'Feb 2026', amount: 2380000, due: '2026-03-10', status: 'Paid' },
      { period: 'Mar 2026', amount: 2635000, due: '2026-04-10', status: 'Paid' },
      { period: 'Apr 2026', amount: 2550000, due: '2026-05-10', status: 'Due' },
      { period: 'May 2026', amount: 2635000, due: '2026-06-10', status: 'Upcoming' },
    ]
  },
  {
    id: 'TC-2026-003', vessel: 'Arctic Spirit', imo: '9756789', dwt: '82,300',
    cp: 'Teekay LNG Partners', start: '2026-03-01', end: '2026-12-31',
    dailyRate: 78000, paymentTerm: 'Monthly in arrears, 15 days',
    status: 'Active',
    startLocation: 'Hammerfest, Norway', endLocation: 'Hammerfest, Norway',
    returnBasis: 'Same port, ballast',
    heelStart: { qty: '1,050', port: 'Hammerfest' },
    heelEnd: { qty: '1,000', port: 'Hammerfest' },
    heelDisplay: '1,050',
    invoices: [
      { period: 'Mar 2026', amount: 2418000, due: '2026-04-15', status: 'Paid' },
      { period: 'Apr 2026', amount: 2340000, due: '2026-05-15', status: 'Due' },
      { period: 'May 2026', amount: 2418000, due: '2026-06-15', status: 'Upcoming' },
    ]
  },
  {
    id: 'TC-2025-008', vessel: 'Pacific Breeze', imo: '9723456', dwt: '74,100',
    cp: 'GasLog Partners', start: '2025-06-01', end: '2026-05-31',
    dailyRate: 82000, paymentTerm: 'Monthly in arrears, 10 days',
    status: 'Expired',
    startLocation: 'Sabine Pass, USA', endLocation: 'Sabine Pass, USA',
    returnBasis: 'Same port, ballast',
    heelStart: { qty: '800', port: 'Sabine Pass' },
    heelEnd: { qty: '750', port: 'Sabine Pass' },
    heelDisplay: '800',
    invoices: [
      { period: 'Mar 2026', amount: 2542000, due: '2026-04-10', status: 'Paid' },
      { period: 'Apr 2026', amount: 2460000, due: '2026-05-10', status: 'Due' },
      { period: 'May 2026', amount: 2542000, due: '2026-06-10', status: 'Upcoming' },
    ]
  },
  {
    id: 'TC-2026-004', vessel: 'Methane Princess', imo: '9867890', dwt: '76,200',
    cp: 'MOL LNG Transport', start: '2026-07-01', end: '2027-06-30',
    dailyRate: 88000, paymentTerm: 'Monthly in arrears, 15 days',
    status: 'Pending',
    startLocation: 'Futtsu, Japan', endLocation: 'Futtsu, Japan',
    returnBasis: 'Same port, laden or ballast',
    heelStart: { qty: '1,100', port: 'Futtsu' },
    heelEnd: { qty: '1,050', port: 'Futtsu' },
    heelDisplay: '1,100',
    invoices: []
  },
];

var selectedCharter = 0;

/* ============================================================
   RENDER
   ============================================================ */

function renderCharters() {
  var tbody = document.getElementById('tbody-charters');
  var html = '';
  charters.forEach(function(c, i) {
    var statusCls = c.status === 'Active' ? 'active' : c.status === 'Expired' ? 'expired' : 'pending';
    html += '<tr class="' + (i === selectedCharter ? 'selected' : '') + '" onclick="selectCharter(' + i + ')">';
    html += '<td><a href="#" class="hz-entity-link" onclick="event.preventDefault();">' + c.id + '</a></td>';
    html += '<td>' + c.vessel + '</td>';
    html += '<td>' + c.cp + '</td>';
    html += '<td style="font-family:var(--font-mono);font-size:var(--text-xs);">' + c.start + '</td>';
    html += '<td style="font-family:var(--font-mono);font-size:var(--text-xs);">' + c.end + '</td>';
    html += '<td class="num">$' + c.dailyRate.toLocaleString() + '</td>';
    html += '<td><span class="vc-badge ' + statusCls + '">' + c.status + '</span></td>';
    html += '<td class="num">' + c.heelDisplay + '</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

function renderDetail(idx) {
  var c = charters[idx];
  var container = document.getElementById('charter-detail');

  var html = '';

  /* Title */
  html += '<div class="vc-detail-title">';
  html += '<a href="#" class="hz-entity-link" onclick="event.preventDefault();">' + c.id + '</a>';
  html += '<span style="color:var(--text-muted);font-size:var(--text-xs);font-weight:400;">' + c.vessel + '</span>';
  html += '<span class="vc-badge ' + (c.status === 'Active' ? 'active' : c.status === 'Expired' ? 'expired' : 'pending') + '">' + c.status + '</span>';
  html += '</div>';

  /* Section: Charter Essentials */
  html += '<div class="vc-section">';
  html += '<div class="vc-section-hdr">Charter Essentials</div>';
  html += '<div class="vc-fields">';
  html += field('Vessel', c.vessel);
  html += field('IMO', c.imo, true);
  html += field('DWT', c.dwt + ' MT', true);
  html += field('Counterparty', c.cp);
  html += field('Start', c.start, true);
  html += field('End', c.end, true);
  html += field('Daily Rate', '$' + c.dailyRate.toLocaleString(), true);
  html += field('Payment Term', c.paymentTerm);
  html += '</div>';
  html += '</div>';

  /* Section: Delivery / Redelivery */
  html += '<div class="vc-section">';
  html += '<div class="vc-section-hdr">Delivery / Redelivery</div>';
  html += '<div class="vc-fields">';
  html += field('Start Location', c.startLocation);
  html += field('End Location', c.endLocation);
  html += field('Return Basis', c.returnBasis);
  html += '</div>';
  html += '</div>';

  /* Section: Heel Status */
  html += '<div class="vc-section">';
  html += '<div class="vc-section-hdr">Heel Status</div>';
  html += '<div class="vc-fields">';
  html += field('Start Heel', c.heelStart.qty + ' MT @ ' + c.heelStart.port, true);
  html += field('End Heel', c.heelEnd.qty + ' MT @ ' + c.heelEnd.port, true);
  html += '</div>';
  html += '</div>';

  /* Section: Invoice Schedule */
  if (c.invoices.length > 0) {
    html += '<div class="vc-section">';
    html += '<div class="vc-section-hdr">Invoice Schedule</div>';
    html += '<table class="vc-inv-tbl">';
    html += '<thead><tr>';
    html += '<th>Period</th>';
    html += '<th class="num">Amount</th>';
    html += '<th>Due Date</th>';
    html += '<th>Status</th>';
    html += '</tr></thead>';
    html += '<tbody>';
    c.invoices.forEach(function(inv) {
      var invCls = inv.status === 'Paid' ? 'paid' : inv.status === 'Due' ? 'due' : 'upcoming';
      html += '<tr>';
      html += '<td>' + inv.period + '</td>';
      html += '<td class="num">$' + inv.amount.toLocaleString() + '</td>';
      html += '<td style="font-family:var(--font-mono);font-size:var(--text-xs);">' + inv.due + '</td>';
      html += '<td><span class="inv-badge ' + invCls + '">' + inv.status + '</span></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    html += '</div>';
  } else {
    html += '<div class="vc-section">';
    html += '<div class="vc-section-hdr">Invoice Schedule</div>';
    html += '<div style="font-size:var(--text-xs);color:var(--text-muted);padding:0.25rem 0;">No invoices yet — charter starts ' + c.start + '</div>';
    html += '</div>';
  }

  container.innerHTML = html;
}

function field(label, value, mono) {
  return '<div class="vc-field"><span class="vc-field-label">' + label + '</span><span class="vc-field-value' + (mono ? ' mono' : '') + '">' + value + '</span></div>';
}

/* ============================================================
   INTERACTIONS
   ============================================================ */

function selectCharter(idx) {
  selectedCharter = idx;
  renderCharters();
  renderDetail(idx);
}

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded', function() {
  renderCharters();
  renderDetail(0);
});
</script>

</body>
</html>
