/* --- Utilities --- */
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const benchmarkPrices = { JKM: 14.60, TTF: 12.65, HH: 3.55, Brent: 82.40 };

function calcMtm(data) {
  if (!data || data.price == null || !data.benchmark) return null;
  const spot = benchmarkPrices[data.benchmark];
  if (spot == null) return null;
  return data.side === 'B' ? (spot - data.price) : (data.price - spot);
}
function calcUnrealPnl(data) {
  const mtm = calcMtm(data);
  if (mtm == null || data.volume == null) return null;
  return mtm * data.volume;
}
function formatPnl(v) {
  if (v == null) return '\u2013';
  const abs = Math.abs(v);
  const sign = v < 0 ? '-$' : '$';
  if (abs >= 1e6) return sign + (abs / 1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return sign + Math.round(abs / 1e3) + 'K';
  return sign + abs.toFixed(0);
}

let gridApi;
let activeStatusFilter = 'all';
let activeQuickFilters = new Set();
const currentTrader = 'JC'; // simulated logged-in user

function updateTotalPnl() {
  let total = 0;
  gridApi.forEachNodeAfterFilter(node => { total += calcUnrealPnl(node.data) || 0; });
  const el = document.getElementById('total-pnl');
  if (!el) return;
  const sign = total >= 0 ? '+' : '';
  el.style.color = total >= 0 ? 'var(--green)' : 'var(--red)';
  el.textContent = 'Total Unrealized P&L: ' + sign + formatPnl(total);
}

function onSearchChanged() {
  gridApi.setGridOption('quickFilterText', document.getElementById('grid-search').value);
}

function filterStatus(status) {
  activeStatusFilter = status;
  document.querySelectorAll('.hz-pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.status === status);
  });
  gridApi.onFilterChanged();
}

function toggleQuickFilter(qf) {
  if (activeQuickFilters.has(qf)) {
    activeQuickFilters.delete(qf);
  } else {
    // Clear mutually exclusive filters
    if (qf === 'matched') activeQuickFilters.delete('unmatched');
    if (qf === 'unmatched') activeQuickFilters.delete('matched');
    if (qf === 'buy') activeQuickFilters.delete('sell');
    if (qf === 'sell') activeQuickFilters.delete('buy');
    activeQuickFilters.add(qf);
  }
  document.querySelectorAll('.hz-qf-btn').forEach(btn => {
    btn.classList.toggle('active', activeQuickFilters.has(btn.dataset.qf));
  });
  gridApi.onFilterChanged();
}

function exportCsv() { gridApi.exportDataAsCsv({ fileName: 'blotter-export.csv' }); }

function toggleColPanel() { document.getElementById('col-panel').classList.toggle('open'); }

function toggleCol(field, visible) { gridApi.setColumnsVisible([field], visible); }

/* --- Context menu --- */
let selectedRow = null;
let ctxMenuEl = null;

function showContextMenu(event, items) {
  closeContextMenu();
  ctxMenuEl = document.createElement('div');
  ctxMenuEl.style.cssText = 'position:fixed;z-index:9999;min-width:10rem;padding:0.25rem;border-radius:0.5rem;border:1px solid var(--border,#27272a);background:var(--surface-elevated,#27272a);box-shadow:0 0.5rem 1.5rem rgba(0,0,0,0.3);';
  ctxMenuEl.innerHTML = items.map(function(item) {
    return '<button onclick="' + item.action + '" style="display:block;width:100%;text-align:left;padding:0.375rem 0.75rem;font-size:0.8125rem;color:var(--text-primary,#fafafa);background:none;border:none;border-radius:0.375rem;cursor:pointer;" onmouseover="this.style.background=\'var(--surface-raised,#3f3f46)\'" onmouseout="this.style.background=\'none\'">' + item.label + '</button>';
  }).join('');
  var x = event.clientX, y = event.clientY;
  document.body.appendChild(ctxMenuEl);
  if (x + ctxMenuEl.offsetWidth > window.innerWidth) x = window.innerWidth - ctxMenuEl.offsetWidth - 8;
  if (y + ctxMenuEl.offsetHeight > window.innerHeight) y = window.innerHeight - ctxMenuEl.offsetHeight - 8;
  ctxMenuEl.style.left = x + 'px';
  ctxMenuEl.style.top = y + 'px';
}

function closeContextMenu() {
  if (ctxMenuEl && ctxMenuEl.parentNode) { ctxMenuEl.parentNode.removeChild(ctxMenuEl); ctxMenuEl = null; }
}

document.addEventListener('click', closeContextMenu);
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeContextMenu(); });

function ctxAction(action) {
  closeContextMenu();
  if (!selectedRow) return;
  if (action === 'view') showToast('Viewing ' + selectedRow.tradeId);
  else if (action === 'amend') showToast('Amending ' + selectedRow.tradeId);
  else if (action === 'cancel') {
    selectedRow.status = 'Cancelled';
    gridApi.applyTransaction({ update: [selectedRow] });
    updateTotalPnl();
    showToast(selectedRow.tradeId + ' cancelled');
  }
}

/* --- Status badge renderer --- */
function statusRenderer(p) {
  if (p.value == null) return '\u2013';
  var v = escapeHtml(p.value);
  var styles = {
    'Draft':         'background:rgba(59,130,246,0.2);color:#3b82f6',
    'FO-Entered':    'background:rgba(245,158,11,0.2);color:#f59e0b',
    'FO-Validated':  'background:rgba(34,197,94,0.2);color:#22c55e',
    'Trade Checked': 'background:rgba(22,163,74,0.3);color:#16a34a',
    'Cancelled':     'background:rgba(113,113,122,0.2);color:#71717a',
  };
  return '<span style="display:inline-flex;padding:0.0625rem 0.375rem;border-radius:1rem;font-size:0.5625rem;font-weight:600;white-space:nowrap;' + (styles[v] || '') + '">' + v + '</span>';
}

/* --- Entity link renderer --- */
function entityLinkRenderer(targetPage) {
  return function(p) {
    if (p.value == null || p.value === '') return '\u2013';
    return '<a href="' + targetPage + '" class="hz-entity-link">' + escapeHtml(p.value) + '</a>';
  };
}

/* --- Matched badge renderer --- */
function matchedRenderer(p) {
  if (p.value == null) return '\u2013';
  if (p.value === 'Yes') return '<span style="display:inline-flex;padding:0.0625rem 0.25rem;border-radius:0.1875rem;font-size:0.5rem;font-weight:700;background:rgba(59,130,246,0.15);color:#3b82f6;">YES</span>';
  return '<span style="font-size:0.5rem;color:var(--text-muted);">NO</span>';
}

/* --- Strategy renderer --- */
function strategyRenderer(p) {
  if (p.value == null || p.value === '' || p.value === 'None') return '<span style="color:var(--text-muted);">\u2013</span>';
  var colors = {
    'Inventory':  'color:#22c55e',
    'Exclude':    'color:#ef4444',
    'Temporary':  'color:#f59e0b',
  };
  return '<span style="font-size:0.5625rem;font-weight:600;' + (colors[p.value] || '') + '">' + escapeHtml(p.value) + '</span>';
}

/* --- Location restriction renderer --- */
function locRestrictionRenderer(p) {
  if (p.value == null) return '\u2013';
  var styles = {
    'Open':        'color:var(--green)',
    'Validated':   'color:var(--blue)',
    'Constrained': 'color:var(--amber)',
  };
  return '<span style="font-size:0.5625rem;font-weight:500;' + (styles[p.value] || '') + '">' + escapeHtml(p.value) + '</span>';
}

/* --- Init Grid --- */
setTimeout(function() {
  var colDefs = [
    /* === Trade Identity === */
    {
      headerName: 'Trade Identity',
      children: [
        { field:'tradeId', headerName:'ID', flex:1, minWidth:64, pinned:'left',
          cellRenderer: function(p) {
            if (p.value == null) return '\u2013';
            return '<a href="lifecycle.html" class="hz-entity-link">' + escapeHtml(p.value) + '</a>';
          }
        },
        { field:'groupId', headerName:'Trade Group', flex:1, minWidth:64 },
        { field:'side', flex:0.7, minWidth:48, cellRenderer: function(p) {
          if (p.value == null) return '\u2013';
          var v = escapeHtml(p.value);
          return v === 'B'
            ? '<span style="display:inline-flex;align-items:center;justify-content:center;width:1.25rem;height:1.25rem;border-radius:0.1875rem;font-size:0.5625rem;font-weight:700;background:var(--green-dim);color:var(--green);">B</span>'
            : '<span style="display:inline-flex;align-items:center;justify-content:center;width:1.25rem;height:1.25rem;border-radius:0.1875rem;font-size:0.5625rem;font-weight:700;background:var(--red-dim);color:var(--red);">S</span>';
        }},
        { field:'type', headerName:'Type', flex:0.7, minWidth:48 },
        { field:'status', flex:0.7, minWidth:64, cellRenderer: statusRenderer },
      ]
    },
    /* === Counterparty & Books === */
    {
      headerName: 'Counterparty & Books',
      children: [
        { field:'counterparty', headerName:'Counterparty', flex:1.2, minWidth:64 },
        { field:'leBook', headerName:'LE Book', flex:1, minWidth:64 },
        { field:'cptyBook', headerName:'Cpty Book', flex:1, minWidth:64 },
      ]
    },
    /* === Commercial === */
    {
      headerName: 'Commercial',
      children: [
        { field:'volume', flex:1, minWidth:64, type:'rightAligned', valueFormatter: function(p) { return p.value != null ? p.value.toLocaleString() : '\u2013'; } },
        { field:'benchmark', headerName:'Bench', flex:0.7, minWidth:48 },
        { field:'price', flex:1, minWidth:64, type:'rightAligned', valueFormatter: function(p) { return p.value != null ? '$' + p.value.toFixed(2) : '\u2013'; } },
        { field:'index', headerName:'Index', flex:1.5, minWidth:64 },
        { field:'incoterm', headerName:'Inco', flex:0.7, minWidth:48 },
        { field:'delivery', headerName:'Delivery', flex:1.2, minWidth:64 },
      ]
    },
    /* === Valuation === */
    {
      headerName: 'Valuation',
      children: [
        { field:'mtm', headerName:'MTM', flex:1, minWidth:64, type:'rightAligned',
          valueGetter: function(p) { return calcMtm(p.data); },
          valueFormatter: function(p) { return p.value != null ? '$' + p.value.toFixed(2) : '\u2013'; },
          cellStyle: function(p) { if (p.value == null) return null; return { color: p.value >= 0 ? 'var(--green)' : 'var(--red)' }; },
          comparator: function(a, b) { return (a || 0) - (b || 0); }
        },
        { field:'unrealPnl', headerName:'Unreal P&L', flex:1, minWidth:64, type:'rightAligned',
          valueGetter: function(p) { return calcUnrealPnl(p.data); },
          valueFormatter: function(p) { return p.value != null ? formatPnl(p.value) : '\u2013'; },
          cellStyle: function(p) { if (p.value == null) return null; return { color: p.value >= 0 ? 'var(--green)' : 'var(--red)' }; },
          comparator: function(a, b) { return (a || 0) - (b || 0); }
        },
      ]
    },
    /* === Matching & References === */
    {
      headerName: 'Matching & References',
      children: [
        { field:'matched', headerName:'Matched', flex:0.7, minWidth:48, cellRenderer: matchedRenderer },
        { field:'cargoRef', headerName:'Cargo Ref', flex:1, minWidth:64, cellRenderer: entityLinkRenderer('cargo-board.html') },
        { field:'contractRef', headerName:'Contract Ref', flex:1, minWidth:64, cellRenderer: entityLinkRenderer('contracts.html') },
      ]
    },
    /* === Strategy & Controls === */
    {
      headerName: 'Strategy & Controls',
      children: [
        { field:'strategy', headerName:'Strategy', flex:1, minWidth:64, cellRenderer: strategyRenderer },
        { field:'locRestriction', headerName:'Loc Restriction', flex:1, minWidth:64, cellRenderer: locRestrictionRenderer },
        { field:'creditSecurity', headerName:'Credit Sec.', flex:1, minWidth:64 },
        { field:'optionRight', headerName:'Option Right', flex:1, minWidth:64 },
      ]
    },
    /* === Tolerances === */
    {
      headerName: 'Tolerances',
      children: [
        { field:'tolMin', headerName:'Tol Min %', flex:0.7, minWidth:48, type:'rightAligned', valueFormatter: function(p) { return p.value != null ? p.value + '%' : '\u2013'; } },
        { field:'tolMax', headerName:'Tol Max %', flex:0.7, minWidth:48, type:'rightAligned', valueFormatter: function(p) { return p.value != null ? '+' + p.value + '%' : '\u2013'; } },
      ]
    },
    /* === Audit === */
    {
      headerName: 'Audit',
      children: [
        { field:'portfolio', headerName:'Portfolio', flex:1, minWidth:64 },
        { field:'trader', headerName:'Trader', flex:0.7, minWidth:48 },
        { field:'charges', headerName:'Charges', flex:0.7, minWidth:48, type:'rightAligned' },
        { field:'timestamp', headerName:'Created', flex:1.2, minWidth:64 },
        { field:'lastModified', headerName:'Modified', flex:1.2, minWidth:64 },
      ]
    },
  ];

  // Flatten column defs for toggle panel
  function flattenCols(defs) {
    var result = [];
    defs.forEach(function(d) {
      if (d.children) {
        d.children.forEach(function(c) { result.push(c); });
      } else {
        result.push(d);
      }
    });
    return result;
  }

  var flatCols = flattenCols(colDefs);

  // Build column toggle panel
  var colPanel = document.getElementById('col-panel');
  flatCols.forEach(function(c) {
    if (!c.field) return;
    var name = c.headerName || c.field;
    var div = document.createElement('div');
    div.className = 'hz-col-item';
    div.innerHTML = '<input type="checkbox" checked onchange="toggleCol(\'' + escapeHtml(c.field) + '\',this.checked)" /><span>' + escapeHtml(name) + '</span>';
    colPanel.appendChild(div);
  });

  var gridOptions = {
    columnDefs: colDefs,
    rowData: tradeData,
    getRowId: function(params) { return String(params.data.id); },
    defaultColDef: { flex: 1, minWidth: 64, sortable: true, filter: true, resizable: true },
    autoSizeStrategy: { type: 'fitGridWidth' },
    rowGroupPanelShow: 'always',
    rowSelection: 'single',
    animateRows: true,
    suppressCellFocus: true,
    getRowClass: function(params) {
      if (!params.data) return '';
      var classes = [];
      if (params.data.matched === 'Yes') classes.push('row-matched');
      if (params.data.status === 'Cancelled') classes.push('row-cancelled');
      return classes.join(' ');
    },
    isExternalFilterPresent: function() {
      return activeStatusFilter !== 'all' || activeQuickFilters.size > 0;
    },
    doesExternalFilterPass: function(node) {
      var d = node.data;
      // Status filter
      if (activeStatusFilter !== 'all' && d.status !== activeStatusFilter) return false;
      // Quick filters (all must pass)
      if (activeQuickFilters.has('matched') && d.matched !== 'Yes') return false;
      if (activeQuickFilters.has('unmatched') && d.matched !== 'No') return false;
      if (activeQuickFilters.has('buy') && d.side !== 'B') return false;
      if (activeQuickFilters.has('sell') && d.side !== 'S') return false;
      if (activeQuickFilters.has('mytrades') && d.trader !== currentTrader) return false;
      return true;
    },
    onCellContextMenu: function(e) {
      e.event.preventDefault();
      selectedRow = e.data;
      showContextMenu(e.event, [
        { label: 'View Trade', action: "ctxAction('view')" },
        { label: 'Amend Trade', action: "ctxAction('amend')" },
        { label: 'Cancel Trade', action: "ctxAction('cancel')" },
      ]);
    },
    onFirstDataRendered: function() {
      document.getElementById('row-count').textContent = gridApi.getDisplayedRowCount() + ' trades';
      updateTotalPnl();
    },
    onFilterChanged: function() {
      document.getElementById('row-count').textContent = gridApi.getDisplayedRowCount() + ' trades';
      updateTotalPnl();
    },
  };

  gridApi = agGrid.createGrid(document.getElementById('blotter-grid'), gridOptions);

  // Theme-aware grid
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var gridEl = document.getElementById('blotter-grid');
  gridEl.classList.toggle('ag-theme-quartz-dark', isDark);
  gridEl.classList.toggle('ag-theme-quartz', !isDark);

}, 100);

// Close column panel on outside click
document.addEventListener('click', function(e) {
  var panel = document.getElementById('col-panel');
  if (panel && !e.target.closest('.hz-col-panel') && !e.target.closest('[onclick*="toggleColPanel"]')) {
    panel.classList.remove('open');
  }
});
</script>

</body>
</html>
