<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Horizon ETRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:["selector","[data-theme=\"dark\"]"],theme:{extend:{fontFamily:{sans:["Inter","sans-serif"],mono:["JetBrains Mono","monospace"]}}}}</script>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link href="shell.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-quartz.css" />
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
  <style>
    /* Position ladder */
    .pos-table { width:100%; border-collapse:collapse; font-family:'JetBrains Mono',monospace; font-size:0.6875rem; }
    .pos-table th { text-align:center; padding:0.25rem 0.375rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; font-size:0.5625rem; letter-spacing:0.05em; border-bottom:0.0625rem solid var(--border); background:var(--surface-base); position:sticky; top:0; z-index:1; }
    .pos-table th:first-child { text-align:left; }
    .pos-table td { padding:0.125rem; text-align:center; border-bottom:0.0625rem solid var(--border); }
    .pos-table td:first-child { text-align:left; font-weight:600; color:var(--text-primary); padding-left:0.375rem; }
    .pos-table td:last-child { text-align:right; font-weight:600; padding-right:0.375rem; }
    .pos-table tbody tr:hover td { background:var(--hover); }

    /* Heat-map cells */
    .pos-cell { border-radius:0.25rem; padding:0.25rem 0.375rem; cursor:pointer; transition:outline 0.15s, transform 0.1s; user-select:none; min-width:5.5rem; }
    .pos-cell:hover { outline:0.125rem solid var(--accent); outline-offset:-0.0625rem; }
    .pos-cell:focus { outline:0.125rem solid var(--accent); outline-offset:-0.0625rem; }
    .pos-cell.selected { outline:0.125rem solid var(--accent); background:var(--accent-bg) !important; }
    .pos-cell .vol { font-weight:600; font-size:0.6875rem; }
    .pos-cell .wacog { font-size:0.5625rem; opacity:0.7; margin-top:0.0625rem; }
    .pos-cell .pnl { font-size:0.5625rem; margin-top:0.0625rem; }
    .pos-cell .split { font-size:0.5rem; opacity:0.5; margin-top:0.0625rem; }

    /* Heat intensity: long */
    .heat-long-1 { background: rgba(34,197,94,0.06); color: var(--green); }
    .heat-long-2 { background: rgba(34,197,94,0.12); color: var(--green); }
    .heat-long-3 { background: rgba(34,197,94,0.20); color: var(--green); }
    .heat-long-4 { background: rgba(34,197,94,0.30); color: var(--green); }
    /* Heat intensity: short */
    .heat-short-1 { background: rgba(239,68,68,0.06); color: var(--red); }
    .heat-short-2 { background: rgba(239,68,68,0.12); color: var(--red); }
    .heat-short-3 { background: rgba(239,68,68,0.20); color: var(--red); }
    .heat-short-4 { background: rgba(239,68,68,0.30); color: var(--red); }

    /* Totals row */
    .pos-table .totals-row td { font-weight:700; color:var(--text-primary); border-top:0.125rem solid var(--border); background:var(--surface-raised); }

    /* Drill-down panel */
    .drill-panel { display:none; }
    .drill-panel.open { display:block; animation: fadeIn 0.2s ease; }
    .drill-table { width:100%; border-collapse:collapse; font-size:0.6875rem; }
    .drill-table th { text-align:left; padding:0.25rem 0.5rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; font-size:0.5625rem; border-bottom:0.0625rem solid var(--border); }
    .drill-table td { padding:0.25rem 0.5rem; border-bottom:0.0625rem solid var(--border); color:var(--text-secondary); }
    .drill-table tr:hover td { background:var(--hover); }

    /* Toolbar filter buttons */
    .tb-filter { padding:0.125rem 0.375rem; border-radius:0.25rem; font-size:0.5625rem; font-weight:600; border:0.0625rem solid var(--border); color:var(--text-muted); background:transparent; transition:all 0.15s; cursor:pointer; text-transform:uppercase; letter-spacing:0.03em; }
    .tb-filter:hover { border-color:var(--text-muted); color:var(--text-secondary); }
    .tb-filter.active { background:var(--accent-bg); border-color:var(--accent); color:var(--accent-light); }
  </style>
</head>
<body>
<div id="hz-app">

  <div id="pos-content" style="flex:1;display:flex;flex-direction:column;min-height:0;">
    <!-- KPI Strip -->
    <div class="hz-kpi-strip" style="margin:0 0 0.25rem 0;">
      <span><span class="strip-label">Long</span><span class="strip-value pnl-positive" style="color:var(--green);">22.4M</span></span>
      <span class="strip-sep">|</span>
      <span><span class="strip-label">Short</span><span class="strip-value pnl-negative" style="color:var(--red);">-17.6M</span></span>
      <span class="strip-sep">|</span>
      <span><span class="strip-label">Net</span><span class="strip-value">4.8M</span></span>
      <span class="strip-sep">|</span>
      <span><span class="strip-label">P&amp;L</span><span class="strip-value pnl-positive" style="color:var(--green);">+$2.11M</span></span>
      <span class="strip-sep">|</span>
      <span><span class="strip-label">WACOG</span><span class="strip-value">$13.92</span></span>
    </div>

    <!-- Toolbar: Benchmark filters, Time range, Export -->
    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem;flex-shrink:0;padding:0 0.25rem;">
      <span style="font-size:0.5625rem;color:var(--text-muted);margin-right:0.125rem;">Benchmark:</span>
      <button class="tb-filter active" data-bench="all" onclick="filterBench('all')">All</button>
      <button class="tb-filter" data-bench="JKM" onclick="filterBench('JKM')">JKM</button>
      <button class="tb-filter" data-bench="TTF" onclick="filterBench('TTF')">TTF</button>
      <button class="tb-filter" data-bench="HH" onclick="filterBench('HH')">HH</button>
      <button class="tb-filter" data-bench="Brent" onclick="filterBench('Brent')">Brent</button>

      <span style="color:var(--border-strong);margin:0 0.25rem;">|</span>

      <span style="font-size:0.5625rem;color:var(--text-muted);margin-right:0.125rem;">Range:</span>
      <button class="tb-filter" data-range="3m" onclick="filterRange('3m')">3M</button>
      <button class="tb-filter active" data-range="6m" onclick="filterRange('6m')">6M</button>
      <button class="tb-filter" data-range="12m" onclick="filterRange('12m')">12M</button>

      <span style="flex:1;"></span>

      <span style="font-size:0.5625rem;color:var(--text-muted);">Arrow keys to navigate &middot; Enter to drill down</span>
      <button class="hz-btn sm" style="height:1.5rem;font-size:0.625rem;" onclick="showToast('Export started','success')">Export</button>
    </div>

    <!-- Position Ladder — no card wrapper, fills viewport -->
    <div class="fade-in" style="flex:1;min-height:0;overflow:auto;">
      <table class="pos-table">
        <thead>
          <tr>
            <th style="width:5rem;">Benchmark</th>
            <th>Jun 26</th>
            <th>Jul 26</th>
            <th>Aug 26</th>
            <th>Sep 26</th>
            <th>Oct 26</th>
            <th>Nov 26</th>
            <th style="width:4rem; text-align:right;">Net</th>
          </tr>
        </thead>
        <tbody id="pos-tbody"></tbody>
      </table>
    </div>

    <!-- Drill-down panel — no card wrapper -->
    <div id="drill-panel" class="drill-panel fade-in-d1" style="margin-top:0.25rem;flex-shrink:0;max-height:30vh;overflow:auto;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.25rem;padding:0 0.25rem;">
        <span id="drill-title" style="font-weight:600; color:var(--text-primary); font-size:0.8125rem;">Trades</span>
        <button class="hz-btn sm" onclick="closeDrill()" style="height:1.5rem;font-size:0.625rem;">Close</button>
      </div>
      <table class="drill-table">
        <thead>
          <tr>
            <th>ID</th>
            <th style="text-align:center;">Side</th>
            <th>Counterparty</th>
            <th style="text-align:right;">Volume</th>
            <th style="text-align:right;">Price</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="drill-tbody"></tbody>
      </table>
    </div>

  </div>
</div>

<script src="shell.js"></script>

function filterBench(bench) {
  activeBenchFilter = bench;
  document.querySelectorAll('[data-bench]').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.bench === bench);
  });
  renderLadder();
}

function filterRange(range) {
  activeRangeFilter = range;
  document.querySelectorAll('[data-range]').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.range === range);
  });
  // Range would alter months shown; for demo, just toggle button state
  showToast('Range: ' + range.toUpperCase(), 'success');
}

function formatVol(v) {
  if (v == null) return '\u2013';
  var abs = Math.abs(v);
  var s = abs >= 1000000 ? (abs/1000000).toFixed(1)+'M' : abs >= 1000 ? Math.round(abs/1000)+'k' : abs.toString();
  return (v >= 0 ? '+' : '-') + s;
}
function formatPnl(v) {
  if (v == null) return '\u2013';
  var abs = Math.abs(v);
  var s = abs >= 1000000 ? '$'+(abs/1000000).toFixed(1)+'M' : '$'+Math.round(abs/1000)+'k';
  return (v >= 0 ? '+' : '-') + s;
}

function heatClass(vol) {
  var abs = Math.abs(vol);
  var isLong = vol >= 0;
  var prefix = isLong ? 'heat-long-' : 'heat-short-';
  if (abs >= 300000) return prefix + '4';
  if (abs >= 150000) return prefix + '3';
  if (abs >= 80000) return prefix + '2';
  return prefix + '1';
}

var selectedCell = null;
var cellGrid = [];

function renderLadder() {
  var tbody = document.getElementById('pos-tbody');
  tbody.innerHTML = '';
  cellGrid = [];

  var benchmarks = activeBenchFilter === 'all' ? ['JKM','TTF','HH','Brent'] : [activeBenchFilter];

  benchmarks.forEach(function(bench, ri) {
    var row = document.createElement('tr');
    var html = '<td>' + bench + '</td>';
    var rowCells = [];

    months.forEach(function(m, ci) {
      var d = positions[bench] ? positions[bench][m] : null;
      if (!d) { html += '<td>-</td>'; rowCells.push(null); return; }
      var heat = heatClass(d.vol);
      var cellId = bench + '|' + m;
      html += '<td><div class="pos-cell ' + heat + '" tabindex="0" data-cell="' + cellId + '" data-ri="' + ri + '" data-ci="' + ci + '" onclick="drillDown(\'' + bench + '\',\'' + m + '\',this)" onkeydown="cellKeydown(event,this)">' +
        '<div class="vol">' + formatVol(d.vol) + '</div>' +
        '<div class="wacog">WACOG $' + d.wacog.toFixed(2) + '</div>' +
        '<div class="pnl">' + formatPnl(d.pnl) + ' (' + (d.pnlPct >= 0 ? '+' : '') + d.pnlPct.toFixed(1) + '%)</div>' +
        '<div class="split">P:' + formatVol(d.phys) + ' / H:' + formatVol(d.paper) + '</div>' +
        '</div></td>';
      rowCells.push(cellId);
    });

    // Net column
    var netVol = 0, netPnl = 0;
    months.forEach(function(m) { var d = positions[bench] ? positions[bench][m] : null; if (d) { netVol += d.vol; netPnl += d.pnl; } });
    var netColor = netVol >= 0 ? 'color:var(--green)' : 'color:var(--red)';
    html += '<td style="' + netColor + '"><div class="vol">' + formatVol(netVol) + '</div><div class="pnl" style="font-size:0.5rem;">' + formatPnl(netPnl) + '</div></td>';

    row.innerHTML = html;
    tbody.appendChild(row);
    cellGrid.push(rowCells);
  });

  // Totals row
  var totRow = document.createElement('tr');
  totRow.className = 'totals-row';
  var totHtml = '<td>Total</td>';
  var grandNet = 0;
  months.forEach(function(m) {
    var mTotal = 0, mPnl = 0;
    benchmarks.forEach(function(b) { var d = positions[b] ? positions[b][m] : null; if (d) { mTotal += d.vol; mPnl += d.pnl; } });
    grandNet += mTotal;
    var c = mTotal >= 0 ? 'color:var(--green)' : 'color:var(--red)';
    totHtml += '<td style="' + c + '">' + formatVol(mTotal) + '</td>';
  });
  var gc = grandNet >= 0 ? 'color:var(--green)' : 'color:var(--red)';
  totHtml += '<td style="' + gc + '">' + formatVol(grandNet) + '</td>';
  totRow.innerHTML = totHtml;
  tbody.appendChild(totRow);
}

function drillDown(bench, month, cellEl) {
  if (selectedCell) selectedCell.classList.remove('selected');
  if (cellEl) { cellEl.classList.add('selected'); selectedCell = cellEl; }

  var key = bench + '|' + month;
  var t = trades[key] || [];
  var panel = document.getElementById('drill-panel');
  document.getElementById('drill-title').textContent = 'Trades \u2014 ' + bench + ' ' + month;
  var tbody = document.getElementById('drill-tbody');
  tbody.innerHTML = '';

  if (t.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:0.5rem; color:var(--text-muted);">No trades for this position</td></tr>';
    panel.classList.add('open');
    return;
  }

  t.forEach(function(tr) {
    var sideStyle = tr.side === 'B'
      ? 'background:var(--green-dim);color:var(--green)'
      : 'background:var(--red-dim);color:var(--red)';
    var stColor = tr.status === 'Confirmed' ? 'var(--green)' : tr.status === 'Pending' ? 'var(--amber)' : 'var(--text-muted)';
    tbody.innerHTML += '<tr>' +
      '<td style="color:var(--accent);"><a href="lifecycle.html" class="hz-entity-link">' + tr.id + '</a></td>' +
      '<td style="text-align:center;"><span style="display:inline-flex;align-items:center;justify-content:center;width:1.25rem;height:1.25rem;border-radius:0.1875rem;font-size:0.5625rem;font-weight:700;' + sideStyle + '">' + tr.side + '</span></td>' +
      '<td>' + tr.cpty + '</td>' +
      '<td style="text-align:right;font-family:var(--font-mono);">' + tr.vol.toLocaleString() + '</td>' +
      '<td style="text-align:right;font-family:var(--font-mono);">$' + tr.price.toFixed(2) + '</td>' +
      '<td style="color:' + stColor + ';">' + tr.status + '</td>' +
      '</tr>';
  });
  panel.classList.add('open');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDrill() {
  document.getElementById('drill-panel').classList.remove('open');
  if (selectedCell) { selectedCell.classList.remove('selected'); selectedCell = null; }
}

function cellKeydown(e, el) {
  var ri = parseInt(el.dataset.ri);
  var ci = parseInt(el.dataset.ci);
  var nr = ri, nc = ci;

  if (e.key === 'ArrowRight') { e.preventDefault(); nc = Math.min(ci + 1, months.length - 1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); nc = Math.max(ci - 1, 0); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); nr = Math.min(ri + 1, cellGrid.length - 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); nr = Math.max(ri - 1, 0); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    var cid = el.dataset.cell;
    if (cid) { var parts = cid.split('|'); drillDown(parts[0], parts[1], el); }
    return;
  }
  else if (e.key === 'Escape') { e.preventDefault(); closeDrill(); return; }
  else return;

  if (nr !== ri || nc !== ci) {
    var targetId = cellGrid[nr] && cellGrid[nr][nc];
    if (targetId) {
      var targetEl = document.querySelector('[data-cell="' + targetId + '"]');
      if (targetEl) targetEl.focus();
    }
  }
}

document.addEventListener('DOMContentLoaded', function() {
  renderLadder();
});
</script>
