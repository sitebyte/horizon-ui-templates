<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cargo Matching — Horizon ETRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:["selector","[data-theme=\"dark\"]"],theme:{extend:{fontFamily:{sans:["Inter","sans-serif"],mono:["JetBrains Mono","monospace"]}}}}</script>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link href="shell.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-quartz.css" />
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
  <style>
    /* Status badges */
    .cm-badge {
      display: inline-flex; align-items: center;
      padding: 0.0625rem 0.375rem; border-radius: var(--radius-full);
      font-size: 0.5625rem; font-weight: 600;
    }
    .cm-badge.matched  { background: var(--blue-dim);  color: var(--blue); }
    .cm-badge.scheduled { background: var(--amber-dim); color: var(--amber); }
    .cm-badge.intransit { background: var(--green-dim); color: var(--green); }
  </style>
</head>
<body>
<div id="hz-app">

  <!-- KPI Strip -->
  <div class="hz-kpi-strip" style="margin:0 0 0.25rem 0;">
    <span><span class="strip-label">Unmatched Purchases</span><span class="strip-value" style="color:var(--amber);">4</span></span>
    <span class="strip-sep">|</span>
    <span><span class="strip-label">Unmatched Sales</span><span class="strip-value" style="color:var(--amber);">3</span></span>
    <span class="strip-sep">|</span>
    <span><span class="strip-label">Matched Cargoes</span><span class="strip-value" style="color:var(--green);">3</span></span>
    <span class="strip-sep">|</span>
    <span><span class="strip-label">Total Volume</span><span class="strip-value">24.8M MMBtu</span></span>
    <span class="strip-sep">|</span>
    <span><span class="strip-label">Est. P&amp;L Impact</span><span class="strip-value pnl-positive" style="color:var(--green);">+$1.42M</span></span>
  </div>

  <!-- Top: Purchases + Sales grids side by side -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.375rem;flex-shrink:0;height:calc((100vh - 14rem) * 0.35);">
    <!-- Unmatched Purchases -->
    <div style="display:flex;flex-direction:column;min-height:0;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.125rem;">
        <div style="display:flex;align-items:center;gap:0.375rem;">
          <span style="font-size:0.6875rem;font-weight:600;color:var(--text-primary);">Unmatched Purchases</span>
          <span style="font-size:0.5625rem;font-weight:700;font-family:var(--font-mono);padding:0.0625rem 0.375rem;border-radius:var(--radius-full);background:var(--amber-dim);color:var(--amber);" id="purch-count">4</span>
        </div>
      </div>
      <div id="grid-purchases" class="ag-theme-quartz-dark ag-compact" style="width:100%;flex:1;min-height:0;"></div>
    </div>

    <!-- Unmatched Sales -->
    <div style="display:flex;flex-direction:column;min-height:0;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.125rem;">
        <div style="display:flex;align-items:center;gap:0.375rem;">
          <span style="font-size:0.6875rem;font-weight:600;color:var(--text-primary);">Unmatched Sales</span>
          <span style="font-size:0.5625rem;font-weight:700;font-family:var(--font-mono);padding:0.0625rem 0.375rem;border-radius:var(--radius-full);background:var(--amber-dim);color:var(--amber);" id="sales-count">3</span>
        </div>
      </div>
      <div id="grid-sales" class="ag-theme-quartz-dark ag-compact" style="width:100%;flex:1;min-height:0;"></div>
    </div>
  </div>

  <!-- Matching Parameters — single compact row -->
  <div style="display:flex;flex-wrap:wrap;align-items:center;gap:0.5rem;padding:0.25rem 0.5rem;background:var(--card-bg);border:0.0625rem solid var(--border);border-radius:var(--radius-sm);margin:0.25rem 0;flex-shrink:0;">
    <span style="font-size:0.5625rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;">Match:</span>
    <div style="display:flex;align-items:center;gap:0.25rem;">
      <label style="font-size:0.5rem;color:var(--text-muted);text-transform:uppercase;">Vessel</label>
      <select class="hz-input" id="cm-vessel" style="height:1.5rem;font-size:0.625rem;min-width:8rem;width:auto;">
        <option value="">Select...</option>
        <option value="Al Dafna">Al Dafna</option>
        <option value="Seri Begawan">Seri Begawan</option>
        <option value="Arctic Spirit">Arctic Spirit</option>
        <option value="Pacific Breeze">Pacific Breeze</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:0.25rem;">
      <label style="font-size:0.5rem;color:var(--text-muted);text-transform:uppercase;">Return Port</label>
      <select class="hz-input" id="cm-return-port" style="height:1.5rem;font-size:0.625rem;min-width:7rem;width:auto;">
        <option value="">Select...</option>
        <option value="Sabine Pass">Sabine Pass</option>
        <option value="Ras Laffan">Ras Laffan</option>
        <option value="Bonny Island">Bonny Island</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:0.25rem;">
      <label style="font-size:0.5rem;color:var(--text-muted);text-transform:uppercase;">Charter ($)</label>
      <input class="hz-input" id="cm-charter-override" type="text" placeholder="85,000" style="height:1.5rem;font-size:0.625rem;min-width:5rem;width:6rem;" />
    </div>
    <button class="hz-btn primary sm" style="height:1.5rem;font-size:0.625rem;" onclick="matchSelected()">Match Selected</button>
    <button class="hz-btn ghost sm" style="height:1.5rem;font-size:0.625rem;" onclick="clearSelection()">Clear</button>
    <span style="flex:1;"></span>
    <span id="selection-info" style="font-size:0.5625rem;color:var(--text-muted);font-family:var(--font-mono);">No selection</span>
  </div>

  <!-- Bottom: Matched Cargoes -->
  <div style="flex:1;display:flex;flex-direction:column;min-height:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.125rem;">
      <div style="display:flex;align-items:center;gap:0.375rem;">
        <span style="font-size:0.6875rem;font-weight:600;color:var(--text-primary);">Matched Cargoes</span>
        <span style="font-size:0.5625rem;font-weight:700;font-family:var(--font-mono);padding:0.0625rem 0.375rem;border-radius:var(--radius-full);background:var(--blue-dim);color:var(--blue);" id="matched-count">3</span>
      </div>
      <button class="hz-btn sm" style="height:1.5rem;font-size:0.625rem;" onclick="showToast('Exported matched cargoes','success')">Export CSV</button>
    </div>
    <div id="grid-matched" class="ag-theme-quartz-dark ag-compact" style="width:100%;flex:1;min-height:0;"></div>
  </div>

</div>

<script src="shell.js"></script>
<script>
initShell('cargo-matching', 'Cargo Matching');

/* ============================================================
   DATA
   ============================================================ */

var purchases = [
  { id: 'T-2041', cp: 'QatarEnergy', tradeGroup: 'GRP-601', leBook: 'SG-LNG-01', strategy: 'Inventory', product: 'LNG (DES)', volume: 3200000, index: 'JKM', price: 14.10, tolerance: '95-105%', port: 'Ras Laffan', delivery: 'Jul 2026' },
  { id: 'T-2043', cp: 'Shell Trading', tradeGroup: 'GRP-602', leBook: 'UK-GAS-02', strategy: 'None', product: 'LNG (FOB)', volume: 2800000, index: 'TTF', price: 11.82, tolerance: '97-103%', port: 'Sabine Pass', delivery: 'Jul 2026' },
  { id: 'T-2045', cp: 'Cheniere', tradeGroup: 'GRP-603', leBook: 'US-LNG-01', strategy: 'Inventory', product: 'LNG (FOB)', volume: 3400000, index: 'HH', price: 3.38, tolerance: '95-105%', port: 'Sabine Pass', delivery: 'Aug 2026' },
  { id: 'T-2047', cp: 'NLNG', tradeGroup: 'GRP-604', leBook: 'UK-GAS-02', strategy: 'None', product: 'LNG (FOB)', volume: 2950000, index: 'Brent', price: 82.40, tolerance: '95-105%', port: 'Bonny Island', delivery: 'Aug 2026' },
];

var sales = [
  { id: 'T-2042', cp: 'JERA Co.', tradeGroup: 'GRP-605', leBook: 'SG-LNG-01', strategy: 'Inventory', product: 'LNG (DES)', volume: 3200000, index: 'JKM', price: 15.10, tolerance: '95-105%', port: 'Sodegaura', delivery: 'Aug 2026' },
  { id: 'T-2044', cp: 'KOGAS', tradeGroup: 'GRP-606', leBook: 'SG-LNG-01', strategy: 'None', product: 'LNG (DES)', volume: 2800000, index: 'JKM', price: 14.80, tolerance: '97-103%', port: 'Incheon', delivery: 'Aug 2026' },
  { id: 'T-2046', cp: 'PetroChina', tradeGroup: 'GRP-607', leBook: 'SG-LNG-01', strategy: 'None', product: 'LNG (DES)', volume: 3400000, index: 'JKM', price: 14.55, tolerance: '95-105%', port: 'Dapeng', delivery: 'Sep 2026' },
];

var matched = [
  { cargo: 'CRG-2035', vessel: 'Al Dafna', buy: 'T-2031', sell: 'T-2032', volume: 3200000, loadPort: 'Ras Laffan', dischPort: 'Sodegaura', oct: '15-Jun', cct: '02-Jul', charterRate: 85000, pnlImpact: 420000, status: 'In Transit' },
  { cargo: 'CRG-2033', vessel: 'Seri Begawan', buy: 'T-2029', sell: 'T-2030', volume: 2800000, loadPort: 'Sabine Pass', dischPort: 'Incheon', oct: '22-Jun', cct: '15-Jul', charterRate: 92000, pnlImpact: 310000, status: 'Scheduled' },
  { cargo: 'CRG-2031', vessel: 'Arctic Spirit', buy: 'T-2027', sell: 'T-2028', volume: 3400000, loadPort: 'Bonny Island', dischPort: 'Gate Rotterdam', oct: '01-Jul', cct: '12-Jul', charterRate: 78000, pnlImpact: -85000, status: 'Matched' },
];

var purchaseGridApi = null;
var salesGridApi = null;
var matchedGridApi = null;

/* ============================================================
   RENDERERS
   ============================================================ */
function entityLinkRenderer(p) {
  if (!p.value || p.value === '') return '\u2013';
  return '<a href="lifecycle.html" class="hz-entity-link" onclick="event.stopPropagation();">' + p.value + '</a>';
}

function cargoLinkRenderer(p) {
  if (!p.value || p.value === '') return '\u2013';
  return '<a href="cargo-board.html" class="hz-entity-link" onclick="event.stopPropagation();">' + p.value + '</a>';
}

function statusBadgeRenderer(p) {
  if (!p.value) return '\u2013';
  var cls = p.value === 'Matched' ? 'matched' : p.value === 'Scheduled' ? 'scheduled' : 'intransit';
  return '<span class="cm-badge ' + cls + '">' + p.value + '</span>';
}

function volFormatter(p) {
  if (p.value == null) return '\u2013';
  return p.value.toLocaleString();
}

function priceFormatter(p) {
  if (p.value == null) return '\u2013';
  return '$' + p.value.toFixed(2);
}

function pnlImpactFormatter(p) {
  if (p.value == null) return '\u2013';
  var abs = Math.abs(p.value);
  var sign = p.value >= 0 ? '+$' : '-$';
  if (abs >= 1e6) return sign + (abs / 1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return sign + Math.round(abs / 1e3).toLocaleString() + 'K';
  return sign + abs;
}

function charterFormatter(p) {
  if (p.value == null) return '\u2013';
  return '$' + p.value.toLocaleString() + '/d';
}

function updateSelectionInfo() {
  var pSel = purchaseGridApi ? purchaseGridApi.getSelectedRows() : [];
  var sSel = salesGridApi ? salesGridApi.getSelectedRows() : [];
  var info = document.getElementById('selection-info');
  if (pSel.length === 0 && sSel.length === 0) {
    info.textContent = 'No selection';
    info.style.color = 'var(--text-muted)';
  } else {
    info.textContent = pSel.length + ' purchase' + (pSel.length !== 1 ? 's' : '') + ' + ' + sSel.length + ' sale' + (sSel.length !== 1 ? 's' : '') + ' selected';
    info.style.color = 'var(--accent-light)';
  }
}

/* ============================================================
   INTERACTIONS
   ============================================================ */

function clearSelection() {
  if (purchaseGridApi) purchaseGridApi.deselectAll();
  if (salesGridApi) salesGridApi.deselectAll();
  document.getElementById('cm-vessel').value = '';
  document.getElementById('cm-return-port').value = '';
  document.getElementById('cm-charter-override').value = '';
  updateSelectionInfo();
}

function matchSelected() {
  var pSel = purchaseGridApi ? purchaseGridApi.getSelectedRows() : [];
  var sSel = salesGridApi ? salesGridApi.getSelectedRows() : [];

  if (pSel.length === 0) {
    showToast('Select at least one purchase trade', 'error');
    return;
  }
  if (sSel.length === 0) {
    showToast('Select at least one sale trade', 'error');
    return;
  }
  var vessel = document.getElementById('cm-vessel').value;
  if (!vessel) {
    showToast('Select a vessel for matching', 'error');
    return;
  }

  var buyTrade = pSel[0];
  var sellTrade = sSel[0];

  var newCargoId = 'CRG-' + (2035 + matched.length + 1);
  var newCargo = {
    cargo: newCargoId,
    vessel: vessel,
    buy: buyTrade.id,
    sell: sellTrade.id,
    volume: buyTrade.volume,
    loadPort: buyTrade.port,
    dischPort: sellTrade.port,
    oct: '01-Aug',
    cct: '15-Aug',
    charterRate: 85000,
    pnlImpact: Math.round((Math.random() - 0.3) * 500000),
    status: 'Matched'
  };
  matched.push(newCargo);
  if (matchedGridApi) matchedGridApi.setGridOption('rowData', matched);

  // Remove matched items from unmatched lists
  var pIdx = purchases.indexOf(buyTrade);
  if (pIdx >= 0) purchases.splice(pIdx, 1);
  var sIdx = sales.indexOf(sellTrade);
  if (sIdx >= 0) sales.splice(sIdx, 1);

  if (purchaseGridApi) purchaseGridApi.setGridOption('rowData', purchases);
  if (salesGridApi) salesGridApi.setGridOption('rowData', sales);

  // Update counts
  document.getElementById('purch-count').textContent = purchases.length;
  document.getElementById('sales-count').textContent = sales.length;
  document.getElementById('matched-count').textContent = matched.length;

  clearSelection();
  showToast('Cargo ' + newCargoId + ' created: ' + buyTrade.id + ' + ' + sellTrade.id + ' on ' + vessel, 'success');
}

/* ============================================================
   AG GRID INIT
   ============================================================ */
setTimeout(function() {
  if (typeof agGrid === 'undefined') return;

  var theme = getAgTheme() + ' ag-compact';

  // --- Purchases Grid ---
  var purchDiv = document.getElementById('grid-purchases');
  purchDiv.className = theme;

  var purchCols = [
    { headerCheckboxSelection: true, checkboxSelection: true, flex: 0.7, minWidth: 48, maxWidth: 48, headerCheckboxSelectionFilteredOnly: true },
    { field: 'id', headerName: 'Trade ID', flex: 1, minWidth: 64, cellRenderer: entityLinkRenderer },
    { field: 'cp', headerName: 'Counterparty', flex: 1.2, minWidth: 64 },
    { field: 'tradeGroup', headerName: 'Trade Group', flex: 1, minWidth: 64 },
    { field: 'leBook', headerName: 'LE Book', flex: 1, minWidth: 64 },
    { field: 'strategy', headerName: 'Strategy', flex: 0.7, minWidth: 64 },
    { field: 'product', headerName: 'Product', flex: 1, minWidth: 64 },
    { field: 'volume', headerName: 'Volume', flex: 1, minWidth: 64, type: 'numericColumn', valueFormatter: volFormatter },
    { field: 'index', headerName: 'Index', flex: 0.7, minWidth: 48 },
    { field: 'price', headerName: 'Price', flex: 1, minWidth: 64, type: 'numericColumn', valueFormatter: priceFormatter },
    { field: 'tolerance', headerName: 'Tolerance', flex: 0.7, minWidth: 64 },
    { field: 'port', headerName: 'Load Port', flex: 1.2, minWidth: 64 },
    { field: 'delivery', headerName: 'Delivery', flex: 1.2, minWidth: 64 },
  ];

  purchaseGridApi = agGrid.createGrid(purchDiv, {
    columnDefs: purchCols,
    rowData: purchases,
    defaultColDef: { flex: 1, minWidth: 64, sortable: true, resizable: true, suppressMovable: true },
    autoSizeStrategy: { type: 'fitGridWidth' },
    rowSelection: 'multiple',
    rowMultiSelectWithClick: true,
    headerHeight: 28,
    rowHeight: 24,
    suppressCellFocus: true,
    getRowId: function(p) { return p.data.id; },
    onSelectionChanged: function() { updateSelectionInfo(); }
  });

  // --- Sales Grid ---
  var salesDiv = document.getElementById('grid-sales');
  salesDiv.className = theme;

  var salesCols = [
    { headerCheckboxSelection: true, checkboxSelection: true, flex: 0.7, minWidth: 48, maxWidth: 48, headerCheckboxSelectionFilteredOnly: true },
    { field: 'id', headerName: 'Trade ID', flex: 1, minWidth: 64, cellRenderer: entityLinkRenderer },
    { field: 'cp', headerName: 'Counterparty', flex: 1.2, minWidth: 64 },
    { field: 'tradeGroup', headerName: 'Trade Group', flex: 1, minWidth: 64 },
    { field: 'leBook', headerName: 'LE Book', flex: 1, minWidth: 64 },
    { field: 'strategy', headerName: 'Strategy', flex: 0.7, minWidth: 64 },
    { field: 'product', headerName: 'Product', flex: 1, minWidth: 64 },
    { field: 'volume', headerName: 'Volume', flex: 1, minWidth: 64, type: 'numericColumn', valueFormatter: volFormatter },
    { field: 'index', headerName: 'Index', flex: 0.7, minWidth: 48 },
    { field: 'price', headerName: 'Price', flex: 1, minWidth: 64, type: 'numericColumn', valueFormatter: priceFormatter },
    { field: 'tolerance', headerName: 'Tolerance', flex: 0.7, minWidth: 64 },
    { field: 'port', headerName: 'Disch Port', flex: 1.2, minWidth: 64 },
    { field: 'delivery', headerName: 'Delivery', flex: 1.2, minWidth: 64 },
  ];

  salesGridApi = agGrid.createGrid(salesDiv, {
    columnDefs: salesCols,
    rowData: sales,
    defaultColDef: { flex: 1, minWidth: 64, sortable: true, resizable: true, suppressMovable: true },
    autoSizeStrategy: { type: 'fitGridWidth' },
    rowSelection: 'multiple',
    rowMultiSelectWithClick: true,
    headerHeight: 28,
    rowHeight: 24,
    suppressCellFocus: true,
    getRowId: function(p) { return p.data.id; },
    onSelectionChanged: function() { updateSelectionInfo(); }
  });

  // --- Matched Cargoes Grid ---
  var matchedDiv = document.getElementById('grid-matched');
  matchedDiv.className = theme;

  var matchedCols = [
    { field: 'cargo', headerName: 'Cargo', flex: 1, minWidth: 64, cellRenderer: cargoLinkRenderer },
    { field: 'vessel', headerName: 'Vessel', flex: 1.2, minWidth: 64 },
    { field: 'buy', headerName: 'Buy Trade', flex: 1, minWidth: 64, cellRenderer: entityLinkRenderer },
    { field: 'sell', headerName: 'Sell Trade', flex: 1, minWidth: 64, cellRenderer: entityLinkRenderer },
    { field: 'volume', headerName: 'Volume', flex: 1, minWidth: 64, type: 'numericColumn', valueFormatter: volFormatter },
    { field: 'loadPort', headerName: 'Load Port', flex: 1.2, minWidth: 64 },
    { field: 'dischPort', headerName: 'Disch Port', flex: 1.2, minWidth: 64 },
    { field: 'oct', headerName: 'OCT', flex: 0.7, minWidth: 48 },
    { field: 'cct', headerName: 'CCT', flex: 0.7, minWidth: 48 },
    { field: 'charterRate', headerName: 'Charter Rate', flex: 1, minWidth: 64, type: 'numericColumn', valueFormatter: charterFormatter },
    { field: 'pnlImpact', headerName: 'P&L Impact', flex: 1, minWidth: 64, type: 'numericColumn', valueFormatter: pnlImpactFormatter,
      cellStyle: function(p) { if (p.value == null) return null; return { color: p.value >= 0 ? 'var(--green)' : 'var(--red)', fontWeight: 600 }; }
    },
    { field: 'status', headerName: 'Status', flex: 0.7, minWidth: 64, cellRenderer: statusBadgeRenderer },
  ];

  matchedGridApi = agGrid.createGrid(matchedDiv, {
    columnDefs: matchedCols,
    rowData: matched,
    defaultColDef: { flex: 1, minWidth: 64, sortable: true, resizable: true, suppressMovable: true },
    autoSizeStrategy: { type: 'fitGridWidth' },
    rowSelection: 'single',
    headerHeight: 28,
    rowHeight: 24,
    suppressCellFocus: true,
    getRowId: function(p) { return p.data.cargo; },
  });

}, 100);
</script>

</body>
</html>
