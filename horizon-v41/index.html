<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trades View — Horizon ETRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:["selector","[data-theme=\"dark\"]"],theme:{extend:{fontFamily:{sans:["Inter","sans-serif"],mono:["JetBrains Mono","monospace"]}}}}</script>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link href="shell.css" rel="stylesheet" />
  <!-- AG Grid v31.3.2 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-quartz.css" />
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
  <style>
    .hz-kpi-strip .strip-value.pnl-positive { color: var(--green); }
    .hz-kpi-strip .strip-value.pnl-negative { color: var(--red); }

    /* Side badge in grid cells */
    .side-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.25rem;
      height: 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.5625rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .side-badge.buy { background: var(--green-dim); color: var(--green); }
    .side-badge.sell { background: var(--red-dim); color: var(--red); }

    /* Status badges in grid cells */
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.0625rem 0.375rem;
      border-radius: var(--radius-full);
      font-size: 0.5625rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .status-badge.draft { background: var(--blue-dim); color: var(--blue); }
    .status-badge.fo-entered { background: var(--amber-dim); color: var(--amber); }
    .status-badge.fo-validated { background: var(--green-dim); color: var(--green); }
    .status-badge.trade-checked { background: rgba(22, 163, 74, 0.2); color: #16a34a; }
    .status-badge.cancelled { background: var(--surface-elevated); color: var(--text-muted); }

    /* Matched badge */
    .match-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.0625rem 0.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.5625rem;
      font-weight: 500;
    }
    .match-badge.yes { color: var(--green); }
    .match-badge.no { color: var(--text-muted); }
  </style>
</head>
<body>
<div id="hz-app">

  <div class="hz-content-fill">

    <!-- KPI Strip -->
    <div class="hz-kpi-strip">
      <span><span class="strip-label">Net Position</span><span class="strip-value pnl-positive">+6.4M</span></span>
      <span class="strip-sep">|</span>
      <span><span class="strip-label">P&amp;L</span><span class="strip-value pnl-positive">+$2.1M</span></span>
      <span class="strip-sep">|</span>
      <span><span class="strip-label">Hedge</span><span class="strip-value" style="color:var(--amber);">78%</span></span>
      <span class="strip-sep">|</span>
      <span><span class="strip-label">Trades</span><span class="strip-value">47</span></span>
      <span class="strip-sep">|</span>
      <span><span class="strip-label">Cargoes</span><span class="strip-value">7</span></span>
      <span class="strip-sep">|</span>
      <span><span class="strip-label">Credit</span><span class="strip-value">62%</span></span>
    </div>

    <!-- Main AG Grid — fills viewport -->
    <div id="trades-grid" class="ag-theme-quartz-dark ag-compact" style="width:100%;height:calc(100vh - 12rem);"></div>

    <!-- Bottom Tab Bar -->
    <div class="hz-bottom-tabs">
      <button class="hz-bottom-tab active" onclick="switchView('trades')">Trades</button>
      <button class="hz-bottom-tab" onclick="switchView('cargoes')">View Cargoes</button>
      <button class="hz-bottom-tab" onclick="switchView('charges')">Charges</button>
    </div>

  </div>

</div>
<script src="shell.js"></script>

        field: 'side',

          return p.value;

        field: 'status',

</body>
</html>
