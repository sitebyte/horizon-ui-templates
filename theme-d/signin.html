<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ---------- Variables ---------- */
    :root {
      --font: 'JetBrains Mono', monospace;
      --accent: #06b6d4;
      --accent-dim: #0891b2;
    }
    [data-theme="dark"] {
      --bg-0: #0a0a0a;
      --bg-1: #0f0f0f;
      --bg-2: #171717;
      --bg-3: #1f1f1f;
      --border: #2a2a2a;
      --border-2: #333;
      --text-0: #fafafa;
      --text-1: #d4d4d4;
      --text-2: #a3a3a3;
      --text-3: #737373;
      --card-bg: #141414;
      --input-bg: #1a1a1a;
    }
    [data-theme="light"] {
      --bg-0: #f8fafc;
      --bg-1: #f1f5f9;
      --bg-2: #e2e8f0;
      --bg-3: #cbd5e1;
      --border: #d1d5db;
      --border-2: #e5e7eb;
      --text-0: #0f172a;
      --text-1: #334155;
      --text-2: #64748b;
      --text-3: #94a3b8;
      --card-bg: #ffffff;
      --input-bg: #f1f5f9;
    }

    /* ---------- Reset ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 0.75rem; line-height: 1.4; }
    body {
      font-family: var(--font);
      background: var(--bg-0);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button { font-family: var(--font); cursor: pointer; border: none; background: none; color: inherit; font-size: inherit; }
    input { font-family: var(--font); font-size: inherit; }
    :focus-visible { outline: 0.125rem solid var(--accent); outline-offset: 0.0625rem; }

    /* ---------- Theme toggle ---------- */
    .theme-toggle {
      position: fixed;
      top: 0.75rem;
      right: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 0.375rem;
      color: var(--text-3);
      transition: color 0.15s;
      z-index: 10;
    }
    .theme-toggle:hover { color: var(--accent); }

    /* ---------- Sign-in card ---------- */
    .signin-card {
      width: 22rem;
      max-width: 90vw;
      background: var(--card-bg);
      border: 0.0625rem solid var(--border);
      border-radius: 0.5rem;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .signin-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .signin-icon {
      font-size: 2rem;
      color: var(--accent);
      line-height: 1;
    }
    .signin-logo {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.2em;
    }
    .signin-subtitle {
      font-size: 0.6875rem;
      color: var(--text-3);
      margin-top: 0.125rem;
    }

    .signin-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }
    .signin-field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .signin-label {
      font-size: 0.625rem;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .signin-input {
      background: var(--input-bg);
      border: 0.0625rem solid var(--border);
      border-radius: 0.375rem;
      padding: 0.375rem 0.5rem;
      color: var(--text-0);
      font-size: 0.75rem;
      height: 2rem;
      transition: border-color 0.15s;
      width: 100%;
    }
    .signin-input:focus { border-color: var(--accent); outline: none; }
    .signin-input::placeholder { color: var(--text-3); }

    .signin-btn {
      width: 100%;
      height: 2.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #000;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 0.375rem;
      border: none;
      letter-spacing: 0.04em;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }
    .signin-btn:hover { background: var(--accent-dim); }

    .signin-footer {
      font-size: 0.625rem;
      color: var(--text-3);
    }
    .signin-footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .signin-footer a:hover {
      text-decoration: underline;
    }

    /* Terminal cursor blink on focused input */
    .signin-input:focus {
      caret-color: var(--accent);
    }

    /* ---------- Animations ---------- */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(0.5rem); } to { opacity: 1; transform: translateY(0); } }
    .signin-card { animation: fadeIn 0.35s ease forwards; }
  </style>
</head>
<body>

  <!-- Theme toggle -->
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
    <span id="theme-icon"></span>
  </button>

  <!-- Sign-in card -->
  <div class="signin-card">
    <div class="signin-brand">
      <div class="signin-icon">&#9670;</div>
      <div class="signin-logo">HORIZON</div>
      <div class="signin-subtitle">Front Office Workspace</div>
    </div>

    <form class="signin-form" onsubmit="handleSignIn(event)">
      <div class="signin-field">
        <label class="signin-label" for="email">Email</label>
        <input class="signin-input" id="email" type="email" placeholder="trader@horizon.energy" autocomplete="email" required />
      </div>
      <div class="signin-field">
        <label class="signin-label" for="password">Password</label>
        <input class="signin-input" id="password" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" autocomplete="current-password" required />
      </div>
      <button type="submit" class="signin-btn">Sign In</button>
    </form>

    <div class="signin-footer">
      Forgot credentials? <a href="#">Contact admin</a>
    </div>
  </div>

  <script>
    /* Theme */
    function initTheme() {
      const saved = localStorage.getItem('hz-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      updateIcon();
    }
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('hz-theme', next);
      updateIcon();
    }
    function updateIcon() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.getElementById('theme-icon').innerHTML = isDark
        ? '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
        : '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    }
    initTheme();

    /* Sign-in handler */
    function handleSignIn(e) {
      e.preventDefault();
      window.location.href = 'index.html';
    }

    /* Auto-focus email */
    document.getElementById('email').focus();
  </script>
</body>
</html>
