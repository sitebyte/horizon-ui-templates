<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Trading Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            emerald: { 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857' },
            surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 800: '#1e1e2e', 900: '#151521', 950: '#0d0d17' }
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'monospace'],
            sans: ['Inter', 'sans-serif']
          },
          fontSize: {
            'xs': '0.75rem',
            'sm': '0.8125rem',
            'base': '0.875rem',
            'lg': '1rem',
            'xl': '1.125rem',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; font-size: 0.8125rem; }
    .font-mono, [class*="font-mono"] { font-family: 'JetBrains Mono', monospace; }
    input::placeholder { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body class="bg-surface-950 text-gray-200 dark:bg-surface-950 dark:text-gray-200 transition-colors min-h-screen flex items-center justify-center relative">

  <!-- Theme Toggle (top-right) -->
  <div class="fixed top-3 right-3 z-50">
    <button onclick="toggleTheme()" class="w-7 h-7 rounded flex items-center justify-center text-gray-400 hover:text-emerald-400 hover:bg-gray-800 transition-colors" title="Toggle theme">
      <span id="theme-icon">&#9789;</span>
    </button>
  </div>

  <!-- Terminal grid lines (subtle background decoration) -->
  <div class="fixed inset-0 opacity-5 pointer-events-none" style="background-image: linear-gradient(rgba(16, 185, 129, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.1) 1px, transparent 1px); background-size: 3rem 3rem;"></div>

  <!-- Sign In Card -->
  <div class="relative z-10 w-full max-w-sm mx-4">
    <div class="bg-surface-900 border border-gray-800 rounded-lg p-6">
      <!-- Logo -->
      <div class="flex items-center justify-center gap-2 mb-6">
        <span class="text-emerald-500 font-mono font-bold text-xl">&#9670;</span>
        <span class="font-mono font-bold text-lg text-emerald-500 tracking-wider">HORIZON</span>
      </div>

      <!-- Terminal prompt -->
      <div class="font-mono text-xs text-gray-600 mb-4 text-center">> authenticating secure session...</div>

      <!-- Form -->
      <form onsubmit="event.preventDefault();" class="space-y-3">
        <!-- Email -->
        <div>
          <label class="block font-mono text-xs text-gray-500 mb-1 uppercase tracking-wider">Operator ID</label>
          <input
            type="email"
            placeholder="trader@horizon.io"
            class="w-full bg-surface-950 border border-gray-800 rounded px-3 py-2 text-sm text-gray-200 font-mono placeholder-gray-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/30 transition-colors"
          >
        </div>

        <!-- Password -->
        <div>
          <label class="block font-mono text-xs text-gray-500 mb-1 uppercase tracking-wider">Passkey</label>
          <input
            type="password"
            placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
            class="w-full bg-surface-950 border border-gray-800 rounded px-3 py-2 text-sm text-gray-200 font-mono placeholder-gray-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/30 transition-colors"
          >
        </div>

        <!-- Remember + Forgot -->
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-1.5 cursor-pointer">
            <input type="checkbox" class="w-3.5 h-3.5 rounded border-gray-700 bg-surface-950 text-emerald-500 focus:ring-emerald-500/30 focus:ring-offset-0">
            <span class="text-xs text-gray-500 font-mono">persist session</span>
          </label>
          <a href="#" class="text-xs text-gray-500 hover:text-emerald-400 font-mono transition-colors">reset key</a>
        </div>

        <!-- Sign In Button -->
        <button
          type="submit"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-mono font-medium text-sm py-2 rounded transition-colors mt-2"
        >
          Sign In
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-4">
        <div class="flex-1 border-t border-gray-800"></div>
        <span class="text-xs text-gray-600 font-mono">or</span>
        <div class="flex-1 border-t border-gray-800"></div>
      </div>

      <!-- SSO Button -->
      <button class="w-full bg-surface-950 border border-gray-800 hover:border-gray-700 text-gray-400 hover:text-gray-200 font-mono text-xs py-2 rounded transition-colors">
        SSO via Corporate IdP
      </button>

      <!-- Footer -->
      <div class="mt-4 text-center">
        <span class="text-xs text-gray-600 font-mono">v2.4.1 &middot; </span>
        <a href="index.html" class="text-xs text-gray-500 hover:text-emerald-400 font-mono transition-colors">back to terminal</a>
      </div>
    </div>

    <!-- Encryption notice -->
    <div class="mt-3 text-center">
      <span class="text-xs text-gray-700 font-mono">&#9670; TLS 1.3 &middot; AES-256 &middot; session encrypted</span>
    </div>
  </div>

  <script>
    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      html.classList.toggle('dark');
      document.getElementById('theme-icon').textContent = isDark ? '&#9728;' : '&#9789;';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    // Init theme
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      document.documentElement.classList.remove('dark');
      document.getElementById('theme-icon').innerHTML = '&#9728;';
    }
  </script>

  <style>
    html:not(.dark) body { background: #f1f5f9; color: #1e293b; }
    html:not(.dark) .bg-surface-900 { background: #ffffff; border-color: #e2e8f0; }
    html:not(.dark) .bg-surface-950 { background: #f1f5f9; }
    html:not(.dark) input.bg-surface-950 { background: #f1f5f9; }
    html:not(.dark) .text-gray-200 { color: #1e293b; }
    html:not(.dark) .text-gray-300 { color: #334155; }
    html:not(.dark) .text-gray-400 { color: #64748b; }
    html:not(.dark) .text-gray-500 { color: #64748b; }
    html:not(.dark) .text-gray-600 { color: #94a3b8; }
    html:not(.dark) .text-gray-700 { color: #94a3b8; }
    html:not(.dark) .text-white { color: #0f172a; }
    html:not(.dark) .border-gray-800 { border-color: #e2e8f0; }
    html:not(.dark) .border-gray-700 { border-color: #cbd5e1; }
    html:not(.dark) .placeholder-gray-600::placeholder { color: #94a3b8; }
  </style>

<!-- Back to Index -->
<a href="../index.html" 
   style="position:fixed;bottom:1rem;right:1rem;z-index:9999;display:inline-flex;align-items:center;gap:0.375rem;padding:0.5rem 0.875rem;font-size:0.75rem;font-family:Inter,system-ui,sans-serif;border-radius:0.5rem;text-decoration:none;transition:all 0.15s;background:rgba(99,102,241,0.9);color:white;box-shadow:0 0.25rem 0.75rem rgba(0,0,0,0.2);backdrop-filter:blur(0.5rem);"
   onmouseover="this.style.background='rgba(79,70,229,1)'"
   onmouseout="this.style.background='rgba(99,102,241,0.9)'"
>&#8592; All Themes</a>

</body>
</html>
