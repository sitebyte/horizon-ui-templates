  /* --- Render trace results: map highlighting + message timeline --- */
  function renderTraceResults(results) {
    traceActive = true;
    var container = document.getElementById('topo-tracer');
    var svg = document.getElementById('svg-tracer');

    // Dim all nodes and flows
    container.querySelectorAll('.topo-node').forEach(function(n) {
      n.classList.add('dimmed');
      n.style.opacity = '0.15';
    });
    svg.querySelectorAll('path[data-from]').forEach(function(p) {
      p.classList.add('flow-dimmed');
      p.classList.remove('flow-highlighted', 'flow-trace-glow', 'flow-trace-fail');
    });

    // Collect unique routes
    var uniqueRoutes = [];
    var routeKeys = {};
    results.forEach(function(msg) {
      var key = msg.route.join('>');
      if (!routeKeys[key]) {
        routeKeys[key] = true;
        uniqueRoutes.push({ route: msg.route, status: msg.status, flowName: msg.flowName });
      }
    });

    // Highlight each unique route on the map
    uniqueRoutes.forEach(function(routeInfo, rIdx) {
      var route = routeInfo.route;
      var colorIdx = rIdx % TRACE_ROUTE_COLORS.length;
      var isFailed = routeInfo.status === 'failed';

      // Un-dim nodes on this route
      route.forEach(function(nodeId) {
        var el = container.querySelector('[data-id="' + nodeId + '"]');
        if (el) {
          el.classList.remove('dimmed');
          el.style.opacity = '1';
        }
      });

      // Highlight flow paths
      for (var i = 0; i < route.length - 1; i++) {
        var fromId = route[i];
        var toId = route[i + 1];
        svg.querySelectorAll('path[data-from="' + fromId + '"][data-to="' + toId + '"]').forEach(function(p) {
          p.classList.remove('flow-dimmed');
          if (isFailed) {
            p.classList.add('flow-trace-fail');
          } else {
            p.classList.add('flow-trace-glow');
            p.style.stroke = TRACE_ROUTE_COLORS[colorIdx];
          }
        });
      }
    });

    // Animate particles for each unique route
    stopAllParticles();
    var particlesContainer = document.getElementById('tracer-particles');
    particlesContainer.innerHTML = '';
    uniqueRoutes.forEach(function(routeInfo, rIdx) {
      var colorIdx = rIdx % TRACE_ROUTE_COLORS.length;
      var particle = document.createElement('div');
      particle.className = 'tracer-particle active' + (TRACE_PARTICLE_CLASSES[colorIdx] ? ' ' + TRACE_PARTICLE_CLASSES[colorIdx] : '');
      if (routeInfo.status === 'failed') {
        particle.className = 'tracer-particle active particle-red';
      }
      particle.id = 'trace-particle-' + rIdx;
      particlesContainer.appendChild(particle);
      animateTraceParticle(particle, routeInfo.route, rIdx);
    });

    // Show legend
    var legendEl = document.getElementById('trace-legend');
    var primaryEntity = results[0].entityId;
    var legendHtml = '<span style="font-weight:700;color:var(--text-primary);">' + uniqueRoutes.length + ' route' + (uniqueRoutes.length > 1 ? 's' : '') + ' found for ' + primaryEntity + '</span>';
    uniqueRoutes.forEach(function(routeInfo, rIdx) {
      var colorIdx = rIdx % TRACE_ROUTE_COLORS.length;
      var color = routeInfo.status === 'failed' ? 'var(--red)' : TRACE_ROUTE_COLORS[colorIdx];
      legendHtml += '<span class="trace-legend-item"><span class="trace-legend-swatch" style="background:' + color + ';' + (routeInfo.status === 'failed' ? 'box-shadow:0 0 6px rgba(239,68,68,0.6);' : 'box-shadow:0 0 6px ' + color + ';') + '"></span>' + routeInfo.flowName + '</span>';
    });
    legendEl.innerHTML = legendHtml;
    legendEl.style.display = 'flex';

    // Render message timeline
    renderTraceTimeline(results, uniqueRoutes);

    showToast(results.length + ' message' + (results.length > 1 ? 's' : '') + ' found', 'success');
  }

  /* --- Animate a single particle along a route --- */
  function animateTraceParticle(particleEl, route, index) {
    var container = document.getElementById('topo-tracer');
    var rect = container.getBoundingClientRect();

    var pathNodes = route.map(function(id) {
      var n = nodeMap[id];
      if (!n) return null;
      var pos = getNodePosition(n);
      return { x: (pos.x / 100) * rect.width, y: (pos.y / 100) * rect.height };
    }).filter(function(p) { return p !== null; });

    if (pathNodes.length < 2) return;

    var segIdx = 0;
    var progress = 0;
    var speed = 0.012 + (index * 0.002); // Slightly different speeds so they don't overlap

    function animate() {
      if (!traceActive) { particleEl.classList.remove('active'); return; }
      progress += speed;
      if (progress >= 1) {
        progress = 0;
        segIdx++;
        if (segIdx >= pathNodes.length - 1) segIdx = 0;
      }
      var from = pathNodes[segIdx];
      var to = pathNodes[segIdx + 1];
      var x = from.x + (to.x - from.x) * progress;
      var y = from.y + (to.y - from.y) * progress;
      particleEl.style.left = x + 'px';
      particleEl.style.top = y + 'px';
      var animId = requestAnimationFrame(animate);
      traceAnimationIds.push(animId);
    }
    animate();
  }

  function stopAllParticles() {
    traceAnimationIds.forEach(function(id) { cancelAnimationFrame(id); });
    traceAnimationIds = [];
    var particlesContainer = document.getElementById('tracer-particles');
    if (particlesContainer) particlesContainer.innerHTML = '';
  }

  /* --- Render the message timeline --- */
  function renderTraceTimeline(results, uniqueRoutes) {
    var timeline = document.getElementById('trace-timeline');
    var resultsDiv = document.getElementById('trace-results');
    timeline.style.display = 'block';

    // Build route key -> color index map
    var routeColorMap = {};
    uniqueRoutes.forEach(function(ri, idx) {
      routeColorMap[ri.route.join('>')] = idx;
    });

    var html = '';
    results.forEach(function(msg, idx) {
      var time = msg.timestamp.substring(11, 19);
      var isFailed = msg.status === 'failed';
      var routeKey = msg.route.join('>');
      var colorIdx = routeColorMap[routeKey] !== undefined ? routeColorMap[routeKey] : 0;

      // Build route display string
      var routeDisplay = msg.route.map(function(nodeId) {
        var n = nodeMap[nodeId];
        return n ? getNodeLabel(n) : nodeId;
      }).join(' \u2192 ');

      var statusBadge = isFailed
        ? '<span class="hz-badge red trace-status">Failed</span>'
        : '<span class="hz-badge green trace-status">Delivered</span>';
      var latencyStr = msg.latencyMs !== null ? msg.latencyMs + 'ms' : '-';
      var latencyColor = isFailed ? 'var(--red)' : (msg.latencyMs > 500 ? 'var(--amber)' : 'var(--green)');

      html += '<div class="trace-msg' + (isFailed ? ' trace-failed' : '') + '" data-trace-idx="' + idx + '" data-route-key="' + routeKey + '" onclick="expandTraceMsg(this,' + idx + ')">';
      html += '<div class="trace-msg-header">';
      html += '<span class="trace-time font-mono">' + time + '</span>';
      html += '<span class="trace-type hz-badge blue">' + msg.messageType + '</span>';
      html += '<span class="trace-route">' + routeDisplay + '</span>';
      html += '<span class="trace-latency font-mono" style="color:' + latencyColor + ';">' + latencyStr + '</span>';
      html += statusBadge;
      html += '</div>';
      html += '<div class="trace-msg-detail" id="trace-detail-' + idx + '" style="display:none;">';
      // Tabs
      html += '<div class="trace-detail-tabs">';
      html += '<button class="trace-detail-tab active" onclick="event.stopPropagation();switchTraceTab(\'trace-panel-payload-' + idx + '\', this)">Payload</button>';
      html += '<button class="trace-detail-tab" onclick="event.stopPropagation();switchTraceTab(\'trace-panel-route-' + idx + '\', this)">Route</button>';
      html += '<button class="trace-detail-tab" onclick="event.stopPropagation();switchTraceTab(\'trace-panel-headers-' + idx + '\', this)">Headers</button>';
      html += '</div>';
      // Payload panel
      html += '<div class="trace-detail-panel active" id="trace-panel-payload-' + idx + '">';
      html += '<div class="trace-json-viewer">' + formatJson(msg.payload) + '</div>';
      if (isFailed && msg.error) {
        html += '<div class="trace-error-box">' + msg.error + '</div>';
      }
      html += '</div>';
      // Route panel
      html += '<div class="trace-detail-panel" id="trace-panel-route-' + idx + '">';
      html += '<div class="trace-route-mini">';
      msg.route.forEach(function(nodeId, ri) {
        var n = nodeMap[nodeId];
        var label = n ? getNodeLabel(n) : nodeId;
        html += '<span class="trace-route-hop">' + label + '</span>';
        if (ri < msg.route.length - 1) {
          html += '<span class="trace-route-arrow">\u2192</span>';
        }
      });
      html += '</div>';
      html += '</div>';
      // Headers panel
      html += '<div class="trace-detail-panel" id="trace-panel-headers-' + idx + '">';
      html += '<div class="trace-header-grid">';
      html += '<div><div class="th-label">Correlation ID</div><div class="th-value" style="color:var(--accent-light);">' + msg.correlationId + '</div></div>';
      html += '<div><div class="th-label">Entity</div><div class="th-value">' + msg.entityId + ' (' + msg.entityType + ')</div></div>';
      html += '<div><div class="th-label">Message Type</div><div class="th-value">' + msg.messageType + '</div></div>';
      html += '<div><div class="th-label">Queue</div><div class="th-value">' + msg.queue + '</div></div>';
      html += '<div><div class="th-label">Consumer</div><div class="th-value">' + (msg.consumer || 'none') + '</div></div>';
      html += '<div><div class="th-label">Flow</div><div class="th-value">' + msg.flowName + '</div></div>';
      html += '<div><div class="th-label">Timestamp</div><div class="th-value">' + msg.timestamp + '</div></div>';
      html += '<div><div class="th-label">Latency</div><div class="th-value"' + (isFailed ? ' style="color:var(--red);"' : '') + '>' + (msg.latencyMs !== null ? msg.latencyMs + 'ms' : 'N/A') + '</div></div>';
      html += '<div><div class="th-label">Status</div><div class="th-value" style="color:' + (isFailed ? 'var(--red)' : 'var(--green)') + ';">' + msg.status + '</div></div>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
    });

    resultsDiv.innerHTML = html;
  }

  /* --- Expand/collapse a trace message row --- */
  function expandTraceMsg(el, idx) {
    var detail = document.getElementById('trace-detail-' + idx);
    var isVisible = detail.style.display !== 'none';

    // Collapse all
    document.querySelectorAll('.trace-msg-detail').forEach(function(d) { d.style.display = 'none'; });
    document.querySelectorAll('.trace-msg').forEach(function(m) { m.classList.remove('active-msg'); });

    if (!isVisible) {
      detail.style.display = '';
      el.classList.add('active-msg');
      // Highlight THIS specific route on the map, dim others
      highlightSingleRoute(el.getAttribute('data-route-key'));
    } else {
      // Re-show all routes
      restoreAllRouteHighlights();
    }
  }

  /* --- Highlight a single route, dim others --- */
  function highlightSingleRoute(routeKey) {
    var svg = document.getElementById('svg-tracer');
    var container = document.getElementById('topo-tracer');
    var routeNodes = routeKey.split('>');

    // Dim all nodes
    container.querySelectorAll('.topo-node').forEach(function(n) {
      n.classList.add('dimmed');
      n.style.opacity = '0.15';
    });
    // Un-dim nodes in this route
    routeNodes.forEach(function(nodeId) {
      var el = container.querySelector('[data-id="' + nodeId + '"]');
      if (el) { el.classList.remove('dimmed'); el.style.opacity = '1'; }
    });

    // Dim all flow paths
    svg.querySelectorAll('path[data-from]').forEach(function(p) {
      p.classList.add('flow-dimmed');
      p.classList.remove('flow-trace-glow', 'flow-trace-fail');
      p.style.stroke = '';
    });
    // Highlight this route's paths
    for (var i = 0; i < routeNodes.length - 1; i++) {
      svg.querySelectorAll('path[data-from="' + routeNodes[i] + '"][data-to="' + routeNodes[i + 1] + '"]').forEach(function(p) {
        p.classList.remove('flow-dimmed');
        p.classList.add('flow-trace-glow');
      });
    }
  }

  /* --- Restore all route highlights (after deselecting a msg) --- */
  function restoreAllRouteHighlights() {
    // Re-execute the current search to restore multi-route display
    var query = document.getElementById('tracer-search-input').value.trim().toLowerCase();
    var flowFilter = document.getElementById('tracer-flow-filter').value;
    if (query || flowFilter) {
      var results = ARCHIVE_DATA.filter(function(msg) {
        var matchesQuery = !query ||
          msg.entityId.toLowerCase().indexOf(query) >= 0 ||
          msg.correlationId.toLowerCase().indexOf(query) >= 0 ||
          msg.messageType.toLowerCase().indexOf(query) >= 0 ||
          msg.flowName.toLowerCase().indexOf(query) >= 0 ||
          JSON.stringify(msg.payload).toLowerCase().indexOf(query) >= 0;
        var matchesFlow = !flowFilter || msg.flowName === flowFilter;
        return matchesQuery && matchesFlow;
      });
      if (results.length > 0) {
        // Just re-highlight without re-rendering timeline
        var container = document.getElementById('topo-tracer');
        var svg = document.getElementById('svg-tracer');

        container.querySelectorAll('.topo-node').forEach(function(n) {
          n.classList.add('dimmed');
          n.style.opacity = '0.15';
        });
        svg.querySelectorAll('path[data-from]').forEach(function(p) {
          p.classList.add('flow-dimmed');
          p.classList.remove('flow-trace-glow', 'flow-trace-fail');
          p.style.stroke = '';
        });

        var uniqueRoutes = [];
        var routeKeys = {};
        results.forEach(function(msg) {
          var key = msg.route.join('>');
          if (!routeKeys[key]) {
            routeKeys[key] = true;
            uniqueRoutes.push({ route: msg.route, status: msg.status, flowName: msg.flowName });
          }
        });
        uniqueRoutes.forEach(function(routeInfo, rIdx) {
          var colorIdx = rIdx % TRACE_ROUTE_COLORS.length;
          routeInfo.route.forEach(function(nodeId) {
            var el = container.querySelector('[data-id="' + nodeId + '"]');
            if (el) { el.classList.remove('dimmed'); el.style.opacity = '1'; }
          });
          for (var i = 0; i < routeInfo.route.length - 1; i++) {
            svg.querySelectorAll('path[data-from="' + routeInfo.route[i] + '"][data-to="' + routeInfo.route[i + 1] + '"]').forEach(function(p) {
              p.classList.remove('flow-dimmed');
              if (routeInfo.status === 'failed') {
                p.classList.add('flow-trace-fail');
              } else {
                p.classList.add('flow-trace-glow');
                p.style.stroke = TRACE_ROUTE_COLORS[colorIdx];
              }
            });
          }
        });
      }
    }
  }

  /* --- Switch tabs in trace detail --- */
  function switchTraceTab(tabId, btn) {
    var panel = btn.closest('.trace-msg-detail');
    panel.querySelectorAll('.trace-detail-panel').forEach(function(p) { p.classList.remove('active'); });
    panel.querySelectorAll('.trace-detail-tab').forEach(function(t) { t.classList.remove('active'); });
    var target = panel.querySelector('#' + tabId);
    if (target) target.classList.add('active');
    btn.classList.add('active');
  }

  /* --- Clear trace --- */
  function clearTrace() {
    traceActive = false;
    stopAllParticles();
    var container = document.getElementById('topo-tracer');
    var svg = document.getElementById('svg-tracer');

    container.querySelectorAll('.topo-node').forEach(function(n) {
      n.classList.remove('dimmed');
      n.style.opacity = '';
    });
    svg.querySelectorAll('path[data-from]').forEach(function(p) {
      p.classList.remove('flow-dimmed', 'flow-highlighted', 'flow-trace-glow', 'flow-trace-fail');
      p.style.stroke = '';
    });
    container.querySelectorAll('.tracer-timestamp').forEach(function(el) { el.remove(); });
    document.getElementById('trace-timeline').style.display = 'none';
    document.getElementById('trace-legend').style.display = 'none';
    document.getElementById('tracer-search-input').value = '';
    document.getElementById('tracer-flow-filter').value = '';
  }

  /* ============================================================
     VIEW C: DASHBOARD
     ============================================================ */
  function initDashboardView() {
    if (!currentEnv) return;
    renderDashKPIs();
    renderNodes('topo-dashboard', {
      dashboard: true,
      onNodeClick: function(node, el) {
        showDetailPanel(node);
      }
    });
    renderFlows('svg-dashboard', 'topo-dashboard', { dashboard: true });
  }

  function renderDashKPIs() {
    if (!currentEnv) return;
    var data = currentEnv;
    var allNodes = getAllNodes(data);

    var totalMsgHr = 0;
    var degradedCount = 0;
    var offlineCount = 0;
    var totalConsumers = 0;
    var backedUpQueues = 0;
    var latencies = [];
    var failingChecks = 0;

    allNodes.forEach(function(n) {
      totalMsgHr += getNodeMsgPerHour(n);
      if (n.status === 'degraded') degradedCount++;
      if (n.status === 'offline') offlineCount++;
      var lat = getNodeLatency(n);
      if (lat && lat > 0 && n.status !== 'offline') latencies.push(lat);
    });

    var rmqNode = nodeMap['rabbitmq'];
    if (rmqNode && rmqNode.metadata && rmqNode.metadata.broker) totalConsumers = rmqNode.metadata.broker.consumers;
    else if (rmqNode && rmqNode.consumers) totalConsumers = rmqNode.consumers;

    var queues = (data.rabbitMq && data.rabbitMq.queues) || data.queues || [];
    queues.forEach(function(q) {
      if (q.status === 'backing-up' || q.status === 'critical') backedUpQueues++;
    });

    if (data.healthChecks) {
      data.healthChecks.forEach(function(hc) {
        if (hc.lastResult && hc.lastResult.status === 'fail') failingChecks++;
      });
    }

    var avgLatency = latencies.length > 0 ? Math.round(latencies.reduce(function(a, b) { return a + b; }, 0) / latencies.length) : 0;
    var errorRate = degradedCount > 0 ? '0.02%' : '0.00%';
    var errorColor = degradedCount > 0 ? 'var(--amber)' : 'var(--green)';

    var strip = document.getElementById('dash-kpi-strip');
    strip.innerHTML =
      '<div class="dash-kpi"><span class="dash-kpi-label">Total Messages/hr</span><span class="dash-kpi-value">' + numberFormat(totalMsgHr) + '</span></div>' +
      '<div class="dash-kpi"><span class="dash-kpi-label">Error Rate</span><span class="dash-kpi-value" style="color:' + errorColor + ';">' + errorRate + '</span></div>' +
      '<div class="dash-kpi"><span class="dash-kpi-label">Avg Latency</span><span class="dash-kpi-value">' + avgLatency + 'ms</span></div>' +
      '<div class="dash-kpi"><span class="dash-kpi-label">Queues Issues</span><span class="dash-kpi-value"' + (backedUpQueues > 0 ? ' style="color:var(--amber);"' : '') + '>' + backedUpQueues + '</span></div>' +
      '<div class="dash-kpi"><span class="dash-kpi-label">Active Consumers</span><span class="dash-kpi-value">' + totalConsumers + '</span></div>' +
      '<div class="dash-kpi"><span class="dash-kpi-label">Health Failures</span><span class="dash-kpi-value"' + (failingChecks > 0 ? ' style="color:var(--red);"' : ' style="color:var(--green);"') + '>' + failingChecks + '</span></div>' +
      '<div class="dash-kpi"><span class="dash-kpi-label">Offline</span><span class="dash-kpi-value"' + (offlineCount > 0 ? ' style="color:var(--red);"' : ' style="color:var(--green);"') + '>' + offlineCount + '</span></div>';
  }

  /* ============================================================
     VIEW SWITCHING
     ============================================================ */
  function switchTopoView(view, btn) {
    document.querySelectorAll('.topo-tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    document.querySelectorAll('.topo-view').forEach(function(v) { v.classList.remove('active'); });

    else if (view === 'dashboard') setTimeout(function() { initDashboardView(); }, 50);

  }

      html += '<div><div class="mh-label">Correlation ID</div><div class="mh-value" style="color:var(--accent-light);">' + corId + '</div></div>';
      html += '<div><div class="mh-label">Type</div><div class="mh-value">' + mt.type + '</div></div>';
      html += '<div><div class="mh-label">Exchange</div><div class="mh-value">' + (mt.exchange || '-') + '</div></div>';
      html += '<div><div class="mh-label">Routing Key</div><div class="mh-value">' + (mt.routingKey || '-') + '</div></div>';
      html += '<div><div class="mh-label">Source</div><div class="mh-value">' + sourceName + '</div></div>';
      html += '<div><div class="mh-label">Frequency</div><div class="mh-value">' + (mt.frequency || '-') + '</div></div>';
      html += '</div></div>';
      if (mt.samplePayload) {
        html += '<div class="msg-tab-panel" id="tab-payload-' + idx + '">';
        html += '<div class="json-viewer">' + syntaxHighlight(JSON.stringify(mt.samplePayload, null, 2)) + '</div>';
        html += '</div>';
      }
      html += '</div></td></tr>';
    });
    tbody.innerHTML = html;
  }

  function syntaxHighlight(json) {
    return json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"([^"]+)":/g, '<span class="json-key">"$1"</span>:')
      .replace(/: "([^"]*)"/g, ': <span class="json-string">"$1"</span>')
      .replace(/: (\d+\.?\d*)/g, ': <span class="json-number">$1</span>')
      .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
      .replace(/: (null)/g, ': <span class="json-null">$1</span>');
  }

  function searchMessages() {
    showToast('Search complete: ' + (currentEnv && currentEnv.messageTypes ? currentEnv.messageTypes.length : 0) + ' message types found', 'success');
  }

  function toggleMessageDetail(rowEl) {
    var detail = rowEl.nextElementSibling;
    if (detail && detail.classList.contains('msg-detail')) {
      var isHidden = detail.style.display === 'none';
      document.querySelectorAll('.msg-detail').forEach(function(d) {
        d.style.display = 'none';
        if (d.previousElementSibling) d.previousElementSibling.classList.remove('expanded');
      });
      if (isHidden) {
        detail.style.display = '';
        rowEl.classList.add('expanded');
      }
    }
  }

  function switchMsgTab(tabId, btn) {
    var panel = btn.closest('.msg-detail-inner');
    panel.querySelectorAll('.msg-tab-panel').forEach(function(p) { p.classList.remove('active'); });
    panel.querySelectorAll('.msg-tab').forEach(function(t) { t.classList.remove('active'); });
    var target = panel.querySelector('#' + tabId);
    if (target) target.classList.add('active');
    btn.classList.add('active');
  }

  function toggleCollapsible(headerEl) {
    headerEl.classList.toggle('collapsed');
  }

  /* ============================================================
     INITIALIZATION — load manifest then default environment
     ============================================================ */
  setTimeout(function() {
    loadManifest();
  }, 150);

  // Re-render on resize
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      if (!currentEnv) return;
      var activeView = document.querySelector('.topo-view.active');
      if (activeView) {
        var id = activeView.id;
        if (id === 'view-map') initMapView();
        else if (id === 'view-tracer') initTracerView();
        else if (id === 'view-dashboard') initDashboardView();
      }
    }, 100);
  });

  // Close detail panel on container click
  document.addEventListener('click', function(e) {
    var map = document.getElementById('topo-map');
    if (map && (e.target === map || e.target.classList.contains('topo-glow'))) {
      closeDetailPanel();
    }
  });
</script>
</body>
</html>
