<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Checks — Horizon ETRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:["selector","[data-theme=\"dark\"]"],theme:{extend:{fontFamily:{sans:["Inter","sans-serif"],mono:["JetBrains Mono","monospace"]}}}}</script>
  <link href="shell.css" rel="stylesheet" />
  <style>
    /* ---- Toolbar ---- */
    .sql-toolbar {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-1) 0;
      margin-bottom: var(--sp-2);
      flex-wrap: wrap;
    }
    .sql-toolbar .spacer { flex: 1; }
    .sql-status-summary {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }
    .sql-status-summary .hz-dot { width: 0.375rem; height: 0.375rem; }

    /* ---- Parameter bar ---- */
    .param-bar {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-3);
      background: var(--surface-raised);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: var(--sp-2);
      flex-wrap: wrap;
    }
    .param-group {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
    }
    .param-group label {
      font-size: 0.5625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .param-group input,
    .param-group select {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      background: var(--input-bg);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 0.125rem var(--sp-2);
      height: 1.5rem;
    }
    .param-group input[type="date"] { width: 8.5rem; }
    .param-group select { min-width: 6rem; }

    /* ---- Table — compact .tbl pattern ---- */
    .tbl { font-size: var(--text-xs); width: 100%; border-collapse: collapse; }
    .tbl th {
      font-size: 0.5rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.125rem var(--sp-2);
      text-align: left;
      border-bottom: 0.0625rem solid var(--border);
      font-family: var(--font-ui);
      position: sticky;
      top: 0;
      background: var(--surface-canvas);
      z-index: 1;
    }
    .tbl td {
      padding: 0.125rem var(--sp-2);
      border-bottom: 0.0625rem solid var(--border-subtle);
      height: 1.25rem;
    }
    .tbl tr:hover td { background: var(--hover); }
    .tbl .r { text-align: right; }
    .tbl .c { text-align: center; }
    .tbl .check-num {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-size: 0.5625rem;
      width: 1.5rem;
    }
    .tbl .check-name {
      font-weight: 600;
      color: var(--text-primary);
    }
    .tbl .check-category {
      font-size: 0.5625rem;
      color: var(--text-tertiary);
    }
    .tbl .check-time {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-size: 0.5625rem;
    }
    .tbl .check-duration {
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      font-size: 0.5625rem;
    }
    .tbl .check-details {
      font-size: 0.5625rem;
      color: var(--text-tertiary);
      max-width: 14rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tbl .check-actions {
      display: flex;
      gap: var(--sp-1);
      white-space: nowrap;
    }
    .tbl .check-select {
      width: 1.25rem;
      text-align: center;
    }
    .tbl .check-select input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* Active row highlight */
    .tbl tr.active-check td {
      background: var(--accent-bg2);
    }

    /* Running spinner */
    .check-running {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-1);
      font-size: 0.5625rem;
      color: var(--accent-light);
    }
    .check-running::before {
      content: '';
      width: 0.5rem;
      height: 0.5rem;
      border: 0.0625rem solid var(--accent-light);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Layout: checks table + bottom panel ---- */
    .sql-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }
    .sql-table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }

    /* ---- Bottom detail panel (tabs: Results | SQL) ---- */
    .detail-panel {
      flex-shrink: 0;
      border-top: 0.0625rem solid var(--border);
      margin-top: var(--sp-2);
      max-height: 45vh;
      flex-direction: column;
    }
    .detail-panel.open { display: flex; }
    .detail-panel.closed { display: none; }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .detail-tabs {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: 0.0625rem solid var(--border);
      flex-shrink: 0;
      width: 100%;
    }
    .detail-tab {
      padding: var(--sp-2) var(--sp-3);
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 0.125rem solid transparent;
      transition: color var(--transition-fast), border-color var(--transition-fast);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .detail-tab:hover { color: var(--text-secondary); }
    .detail-tab.active {
      color: var(--accent-light);
      border-bottom-color: var(--accent-light);
    }
    .detail-tab-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      padding-right: var(--sp-2);
    }
    .detail-tab-title {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-secondary);
      padding: var(--sp-2) var(--sp-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 20rem;
    }

    .detail-body {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    .detail-pane {
      display: none;
      padding: var(--sp-2) 0;
    }
    .detail-pane.active { display: block; }

    /* Results table inside detail panel */
    .results-wrap {
      overflow: auto;
      padding: 0 var(--sp-2);
    }
    .results-header {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: 0 var(--sp-2) var(--sp-1);
      font-size: 0.5625rem;
      color: var(--text-muted);
    }
    .results-empty {
      padding: var(--sp-6) var(--sp-4);
      text-align: center;
      color: var(--text-muted);
      font-size: var(--text-xs);
    }

    /* SQL code block */
    .sql-code-block {
      background: var(--surface-canvas);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--sp-3);
      margin: 0 var(--sp-2);
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      line-height: 1.7;
      color: var(--text-secondary);
    }
    .sql-code-block .sql-kw { color: var(--accent-light); font-weight: 600; }
    .sql-code-block .sql-fn { color: var(--accent-violet); }
    .sql-code-block .sql-str { color: var(--green); }
    .sql-code-block .sql-comment { color: var(--text-muted); font-style: italic; }
    .sql-code-block .sql-num { color: var(--amber); }
    .sql-code-block .sql-alias { color: var(--text-tertiary); }
    .sql-code-block .sql-param { color: var(--amber); font-weight: 600; }

    /* Preset buttons */
    .preset-bar {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      margin-bottom: var(--sp-2);
      flex-wrap: wrap;
    }
    .preset-label {
      font-size: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-right: var(--sp-1);
    }
    .preset-btn {
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-full);
      font-size: 0.5625rem;
      font-weight: 500;
      border: 0.0625rem solid var(--border);
      color: var(--text-tertiary);
      background: transparent;
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--text-secondary); }
    .preset-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-light); }

    /* Clickable rows */
    .tbl tr[data-check-id] { cursor: pointer; }

    /* Multi-select summary in detail panel */
    .multi-summary { padding: var(--sp-2); }
    .multi-summary .tbl td { cursor: pointer; }
    .multi-summary .tbl tr:hover td { background: var(--accent-bg2); }

    /* Resize handle */
    .detail-resize {
      height: 0.375rem;
      cursor: ns-resize;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .detail-resize::after {
      content: '';
      width: 2rem;
      height: 0.125rem;
      border-radius: var(--radius-full);
      background: var(--border-strong);
    }
    .detail-resize:hover::after { background: var(--accent-light); }

    /* ---- Per-check parameters inline form ---- */
    .check-params-bar {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-3);
      background: var(--surface-elevated);
      border-bottom: 0.0625rem solid var(--border);
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .check-params-bar .param-group input[type="number"] {
      width: 6rem;
    }
    .check-params-label {
      font-size: 0.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent-light);
      white-space: nowrap;
      margin-right: var(--sp-1);
    }
    .check-params-bar .param-group input:focus,
    .check-params-bar .param-group select:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 0.0625rem var(--accent-bg);
    }
  </style>
</head>
<body>
<div id="hz-app">

  <div class="hz-content-fill">
    <div class="sql-layout">

      <!-- Toolbar -->
      <div class="sql-toolbar" data-component="sql-toolbar">
        <button class="hz-btn primary sm" onclick="runAllChecks()" aria-label="Run all checks">Run All Checks</button>
        <button class="hz-btn sm" onclick="runSelected()" aria-label="Run selected checks">Run Selected</button>
        <button class="hz-btn ghost sm" onclick="exportResults()" aria-label="Export results to CSV">Export Results</button>
        <div class="spacer"></div>
        <span class="font-mono text-xs" style="color:var(--text-muted);" id="last-run-time">Last run: —</span>
        <div class="sql-status-summary" id="status-summary">
          <span>12 checks:</span>
          <span class="hz-dot green"></span><span style="color:var(--green);">—</span>
          <span class="hz-dot amber"></span><span style="color:var(--amber);">—</span>
          <span class="hz-dot red"></span><span style="color:var(--red);">—</span>
        </div>
      </div>

      <!-- Preset Bar -->
      <div class="preset-bar" data-component="preset-bar">
        <span class="preset-label">Presets</span>
        <button class="preset-btn active" onclick="applyPreset('eod-prod')">EOD PROD</button>
        <button class="preset-btn" onclick="applyPreset('eod-1-prod')">EOD-1 PROD</button>
        <button class="preset-btn" onclick="applyPreset('uat-all')">UAT All</button>
        <button class="preset-btn" onclick="applyPreset('jkm-only')">JKM Only</button>
        <button class="preset-btn" onclick="applyPreset('glng-book')">ACME Book</button>
        <button class="preset-btn" onclick="applyPreset('ttf-curves')">TTF Curves</button>
      </div>

      <!-- Global Parameter Bar -->
      <div class="param-bar" data-component="param-bar">
        <div class="param-group">
          <label for="param-cob">COB Date</label>
          <input type="date" id="param-cob" aria-label="Close of business date" />
        </div>
        <div class="param-group">
          <label for="param-env">Environment</label>
          <select id="param-env" aria-label="Target environment">
            <option value="PROD" selected>PROD</option>
            <option value="UAT">UAT</option>
            <option value="TST1">TST1</option>
            <option value="TST2">TST2</option>
          </select>
        </div>
        <div class="param-group">
          <label for="param-book">Book</label>
          <select id="param-book" aria-label="Trading book filter">
            <option value="ALL" selected>All Books</option>
            <option value="ACME">ACME</option>
            <option value="ACME-SPOT">ACME Spot</option>
            <option value="ACME-TERM">ACME Term</option>
          </select>
        </div>
        <div class="param-group">
          <label for="param-benchmark">Benchmark</label>
          <select id="param-benchmark" aria-label="Benchmark filter">
            <option value="ALL" selected>All</option>
            <option value="JKM">JKM</option>
            <option value="TTF">TTF</option>
            <option value="HH">HH</option>
            <option value="Brent">Brent</option>
            <option value="NBP">NBP</option>
            <option value="JCC">JCC</option>
          </select>
        </div>
      </div>

      <!-- Check Results Table -->
      <div class="sql-table-wrap" data-component="sql-checks-table">
        <table class="tbl" id="sql-checks-table">
          <thead>
            <tr>
              <th class="check-select"><input type="checkbox" id="select-all" onclick="toggleSelectAll(this)" /></th>
              <th>#</th>
              <th>Check Name</th>
              <th>Category</th>
              <th>Last Run</th>
              <th>Duration</th>
              <th class="c">Result</th>
              <th>Details</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="checks-tbody"></tbody>
        </table>
      </div>

      <!-- Bottom Detail Panel: Results | SQL tabs -->
      <div class="detail-panel closed" id="detail-panel" data-component="detail-panel">
        <div class="detail-resize" id="detail-resize" title="Drag to resize"></div>
        <!-- Per-check parameters bar (shown when a check with custom params is selected) -->
        <div class="check-params-bar" id="check-params-bar" style="display:none;" data-component="check-params-bar">
          <span class="check-params-label">Check Params</span>
          <div id="check-params-fields"></div>
        </div>
        <div class="detail-tabs">
          <span class="detail-tab-title" id="detail-title">—</span>
          <button class="detail-tab active" data-tab="results" onclick="switchTab('results')">Results</button>
          <button class="detail-tab" data-tab="sql" onclick="switchTab('sql')">SQL</button>
          <div class="detail-tab-actions">
            <button class="hz-btn sm ghost" onclick="copyResults()" id="btn-copy-results" title="Copy results as tab-separated">Copy Results</button>
            <button class="hz-btn sm ghost" onclick="copySql()" id="btn-copy-sql" style="display:none;" title="Copy SQL to clipboard">Copy SQL</button>
            <button class="hz-btn sm ghost" onclick="closePanel()">Close</button>
          </div>
        </div>
        <div class="detail-body">
          <div class="detail-pane active" id="pane-results">
            <div class="results-header" id="results-header"></div>
            <div class="results-wrap" id="results-wrap">
              <div class="results-empty">Run a check to see results here</div>
            </div>
          </div>
          <div class="detail-pane" id="pane-sql">
            <div class="sql-code-block" id="sql-code-block"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<script src="shell.js"></script>
<script>
  initShell('support-sql-checks', 'SQL Checks');

  /* ================================================================
     CHECK DEFINITIONS — data-driven, structured as if from API
     Each check has per-check parameters with defaults.
     SQL templates use @paramName for both global and per-check params.
     In production, these would be fetched from:
       GET /api/support/sql-checks
     ================================================================ */
  var checks = [
    {
      id: 1, name: 'Bootstrap Curve Validation', category: 'Curves',
      description: 'Checks forward curves for smoothness and arbitrage-free pricing',
      severity: 'error',
      parameters: [
        { id: 'max_delta_pct', label: 'Max Delta %', type: 'number', default: 5, min: 0.1, max: 50, step: 0.5, description: 'Maximum allowed price change between adjacent tenors as a percentage' }
      ],
      sqlTemplate: "-- Bootstrap Curve Validation\n-- Checks forward curves for smoothness and arbitrage-free pricing\nSELECT\n    c.benchmark, c.tenor, c.settle_date,\n    c.price AS current_price,\n    LAG(c.price) OVER (PARTITION BY c.benchmark ORDER BY c.tenor) AS prev_price,\n    ABS(c.price - LAG(c.price) OVER (...)) AS delta,\n    CASE WHEN ABS(delta) > c.price * (@max_delta_pct / 100.0)\n         THEN 'FAIL' ELSE 'PASS' END AS check_result\nFROM curve_data c\nWHERE c.curve_date = @cob\n  AND (@benchmark = 'ALL' OR c.benchmark = @benchmark)\nORDER BY c.benchmark, c.tenor;",
      cols: ['Benchmark','Tenor','Settle Date','Price','Prev Price','Delta','Result'],
      colAlign: [null,null,null,'r','r','r','c'],
      mockResult: function() {
        return { status: 'PASS', detail: '4 curves, 96 tenors validated', duration: '2.4s', rows: [
          ['JKM','M+1','2026-06-15','14.85','14.72','0.13','PASS'],
          ['JKM','M+2','2026-07-15','14.62','14.85','0.23','PASS'],
          ['JKM','M+3','2026-08-15','14.41','14.62','0.21','PASS'],
          ['TTF','M+1','2026-06-15','11.34','11.28','0.06','PASS'],
          ['TTF','M+2','2026-07-15','11.18','11.34','0.16','PASS'],
          ['HH','M+1','2026-06-15','3.42','3.38','0.04','PASS'],
          ['Brent','M+1','2026-06-15','78.40','78.15','0.25','PASS'],
          ['Brent','M+2','2026-07-15','77.95','78.40','0.45','PASS'],
        ]};
      }
    },
    {
      id: 2, name: 'Forward Curve Monotonicity', category: 'Curves',
      description: 'Detects backward inversions in the forward curve',
      severity: 'warning',
      parameters: [
        { id: 'tenor_start', label: 'Tenor Start (months)', type: 'number', default: 1, min: 1, max: 120, step: 1, description: 'Start of tenor range to check' },
        { id: 'tenor_end', label: 'Tenor End (months)', type: 'number', default: 60, min: 1, max: 120, step: 1, description: 'End of tenor range to check' }
      ],
      sqlTemplate: "-- Forward Curve Monotonicity\n-- Detects backward inversions in the forward curve\nSELECT benchmark, tenor, price,\n    LAG(price) OVER (PARTITION BY benchmark ORDER BY tenor) AS prev,\n    CASE WHEN price < LAG(price) OVER (...) THEN 'INVERSION'\n         ELSE 'OK' END AS status\nFROM curve_data\nWHERE curve_date = @cob\n  AND (@benchmark = 'ALL' OR benchmark = @benchmark)\n  AND tenor_months BETWEEN @tenor_start AND @tenor_end\nORDER BY benchmark, tenor;",
      cols: ['Benchmark','Tenor','Price','Prev','Status'],
      colAlign: [null,null,'r','r','c'],
      mockResult: function() {
        return { status: 'PASS', detail: 'No inversions detected', duration: '1.1s', rows: [] };
      }
    },
    {
      id: 3, name: 'Stale Price Detection', category: 'Curves',
      description: 'Flags prices not updated within staleness threshold',
      severity: 'warning',
      parameters: [
        { id: 'staleness_threshold_hours', label: 'Staleness Threshold (hrs)', type: 'number', default: 24, min: 1, max: 168, step: 1, description: 'Number of hours after which a price is considered stale' }
      ],
      sqlTemplate: "-- Stale Price Detection\n-- Flags prices not updated within staleness threshold\nSELECT benchmark, tenor, price, last_updated,\n    DATEDIFF(hour, last_updated, @cob + ' 17:00') AS hours_stale\nFROM curve_data\nWHERE curve_date = @cob\n  AND DATEDIFF(hour, last_updated, @cob + ' 17:00') > @staleness_threshold_hours\n  AND (@benchmark = 'ALL' OR benchmark = @benchmark)\nORDER BY hours_stale DESC;",
      cols: ['Benchmark','Tenor','Price','Last Updated','Hours Stale'],
      colAlign: [null,null,'r',null,'r'],
      mockResult: function() {
        return { status: 'WARN', detail: '6 prices >24h old', duration: '0.8s', rows: [
          ['NBP','Q3-26','8.42','2026-05-04 09:15','55'],
          ['NBP','Q4-26','9.10','2026-05-04 09:15','55'],
          ['JCC','M+4','72.30','2026-05-04 14:22','50'],
          ['JCC','M+5','71.85','2026-05-04 14:22','50'],
          ['JCC','M+6','71.40','2026-05-04 14:22','50'],
          ['HH','Cal-27','3.95','2026-05-05 03:00','38'],
        ]};
      }
    },
    {
      id: 4, name: 'Trade Duplicate Check', category: 'Trades',
      description: 'Identifies trades with identical key fields',
      severity: 'error',
      parameters: [
        { id: 'lookback_days', label: 'Lookback Days', type: 'number', default: 7, min: 1, max: 90, step: 1, description: 'Number of days to look back for duplicate detection' }
      ],
      sqlTemplate: "-- Trade Duplicate Check\n-- Identifies trades with identical key fields\nSELECT t1.trade_id, t1.counterparty, t1.direction,\n    t1.volume, t1.price, t1.trade_date,\n    COUNT(*) OVER (PARTITION BY t1.counterparty, t1.direction,\n        t1.volume, t1.price, t1.trade_date) AS dup_count\nFROM trades t1\nWHERE t1.trade_date BETWEEN DATEADD(day, -@lookback_days, @cob) AND @cob\n  AND (@book = 'ALL' OR t1.book = @book)\nHAVING dup_count > 1\nORDER BY t1.trade_date DESC;",
      cols: ['Trade ID','Counterparty','Direction','Volume','Price','Trade Date','Dup Count'],
      colAlign: [null,null,null,'r','r',null,'r'],
      mockResult: function() {
        return { status: 'PASS', detail: '0 duplicates in 1,247 trades', duration: '3.2s', rows: [] };
      }
    },
    {
      id: 5, name: 'Missing Settlement Prices', category: 'Settlement',
      description: 'Checks for settlement periods without published prices',
      severity: 'error',
      parameters: [

  /* ================================================================
     STATE
     ================================================================ */
  var activeCheckId = null;
  var checkStates = {};
  var checkParamValues = {}; // Per-check parameter overrides: { checkId: { paramId: value } }
  var runningChecks = {};    // Track which checks are currently running

  /* ================================================================
     PER-CHECK PARAMETER MANAGEMENT
     ================================================================ */
  function getCheckParamDefaults(chk) {
    var defaults = {};
    if (chk.parameters) {
      chk.parameters.forEach(function(p) {
        defaults[p.id] = p.default;
      });
    }
    return defaults;
  }

  function getCheckParamValues(checkId) {
    var chk = checks.find(function(c) { return c.id === checkId; });
    if (!chk) return {};
    var defaults = getCheckParamDefaults(chk);
    var overrides = checkParamValues[checkId] || {};
    var merged = {};
    for (var key in defaults) {
      merged[key] = overrides.hasOwnProperty(key) ? overrides[key] : defaults[key];
    }
    return merged;
  }

  function setCheckParamValue(checkId, paramId, value) {
    if (!checkParamValues[checkId]) checkParamValues[checkId] = {};
    checkParamValues[checkId][paramId] = value;
    // Refresh SQL display if this check is active
    if (activeCheckId === checkId) {
      refreshSqlPane(checkId);
    }
  }

  function renderCheckParams(checkId) {
    var chk = checks.find(function(c) { return c.id === checkId; });
    var bar = document.getElementById('check-params-bar');
    var fields = document.getElementById('check-params-fields');

    if (!chk || !chk.parameters || chk.parameters.length === 0) {
      bar.style.display = 'none';
      return;
    }

    var values = getCheckParamValues(checkId);
    var html = '';
    chk.parameters.forEach(function(p) {
      var val = values[p.id];
      var inputHtml = '';
      if (p.type === 'number') {
        inputHtml = '<input type="number"' +
          ' id="cparam-' + p.id + '"' +
          ' value="' + val + '"' +
          (p.min !== undefined ? ' min="' + p.min + '"' : '') +
          (p.max !== undefined ? ' max="' + p.max + '"' : '') +
          (p.step !== undefined ? ' step="' + p.step + '"' : '') +
          ' title="' + (p.description || '') + '"' +
          ' aria-label="' + p.label + '"' +
          ' onchange="setCheckParamValue(' + checkId + ',\'' + p.id + '\',parseFloat(this.value))"' +
          ' />';
      } else if (p.type === 'select' && p.options) {
        inputHtml = '<select id="cparam-' + p.id + '"' +
          ' title="' + (p.description || '') + '"' +
          ' aria-label="' + p.label + '"' +
          ' onchange="setCheckParamValue(' + checkId + ',\'' + p.id + '\',this.value)">';
        p.options.forEach(function(opt) {
          var optVal = typeof opt === 'string' ? opt : opt.value;
          var optLabel = typeof opt === 'string' ? opt : opt.label;
          inputHtml += '<option value="' + optVal + '"' + (optVal === String(val) ? ' selected' : '') + '>' + optLabel + '</option>';
        });
        inputHtml += '</select>';
      } else {
        inputHtml = '<input type="text"' +
          ' id="cparam-' + p.id + '"' +
          ' value="' + val + '"' +
          ' title="' + (p.description || '') + '"' +
          ' aria-label="' + p.label + '"' +
          ' onchange="setCheckParamValue(' + checkId + ',\'' + p.id + '\',this.value)"' +
          ' />';
      }
      html += '<div class="param-group"><label for="cparam-' + p.id + '">' + p.label + '</label>' + inputHtml + '</div>';
    });

    fields.innerHTML = html;
    fields.style.display = 'flex';
    fields.style.gap = 'var(--sp-3)';
    fields.style.flexWrap = 'wrap';
    fields.style.alignItems = 'center';
    bar.style.display = 'flex';
  }

     PRESETS — common parameter combinations

  var presets = {
    'eod-prod':   { cob: 0, env: 'PROD', book: 'ALL', benchmark: 'ALL' },
    'eod-1-prod': { cob: -1, env: 'PROD', book: 'ALL', benchmark: 'ALL' },

  function applyPreset(key) {
    var p = presets[key];
    if (!p) return;
    var d = new Date();
    d.setDate(d.getDate() + p.cob);
    var yyyy = d.getFullYear();
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');
    document.getElementById('param-cob').value = yyyy + '-' + mm + '-' + dd;
    document.getElementById('param-env').value = p.env;
    document.getElementById('param-book').value = p.book;
    document.getElementById('param-benchmark').value = p.benchmark;
    document.querySelectorAll('.preset-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('onclick').indexOf(key) !== -1);
    });
    if (activeCheckId) refreshSqlPane(activeCheckId);

  /* ================================================================
     GET PARAMS from the param bar (global parameters)
     ================================================================ */
  function getGlobalParams() {
    return {
      cob: document.getElementById('param-cob').value || '2026-05-07',
      environment: document.getElementById('param-env').value,
      book: document.getElementById('param-book').value,
      benchmark: document.getElementById('param-benchmark').value
    };
  }

  function getParams() { return getGlobalParams(); }

  /* ================================================================
     BUILD FULL SQL with parameter substitution
     Replaces @paramName in the SQL template with actual values.
     In production: POST /api/support/sql-checks/{id}/run
     sends global + per-check params; server does substitution.
     ================================================================ */
  function buildSql(checkId) {
    var chk = checks.find(function(c) { return c.id === checkId; });
    if (!chk) return '';
    var global = getGlobalParams();
    var perCheck = getCheckParamValues(checkId);
    var sql = chk.sqlTemplate;
    // Substitute global params
    sql = sql.replace(/@cob\b/g, "'" + global.cob + "'");
    sql = sql.replace(/@environment\b/g, "'" + global.environment + "'");
    sql = sql.replace(/@book\b/g, "'" + global.book + "'");
    sql = sql.replace(/@benchmark\b/g, "'" + global.benchmark + "'");
    // Substitute per-check params
    for (var key in perCheck) {
      var val = perCheck[key];
      var re = new RegExp('@' + key + '\\b', 'g');
      if (typeof val === 'number') {
        sql = sql.replace(re, String(val));
      } else {
        sql = sql.replace(re, "'" + val + "'");
      }
    }
    return sql;
  }

  /* ================================================================
     RENDER CHECKS TABLE
     Uses event delegation on tbody for all click handling.
     ================================================================ */
  function renderChecksTable() {
    var tbody = document.getElementById('checks-tbody');
    // Save checkbox states before re-render
    var savedChecked = {};
    document.querySelectorAll('.check-row-cb').forEach(function(cb, i) {
      if (checks[i]) savedChecked[checks[i].id] = cb.checked;
    });

    tbody.innerHTML = '';
    checks.forEach(function(chk) {
      var st = checkStates[chk.id];
      var isRunning = runningChecks[chk.id];
      var tr = document.createElement('tr');
      if (activeCheckId === chk.id) tr.classList.add('active-check');
      tr.setAttribute('data-check-id', chk.id);

      var statusBadge = '<span style="color:var(--text-muted);">—</span>';
      var detail = '—';
      var time = '—';
      var dur = '—';

      if (isRunning) {
        statusBadge = '<span class="check-running">Running</span>';
      } else if (st) {
        var badgeColor = st.status === 'PASS' ? 'green' : st.status === 'WARN' ? 'amber' : 'red';
        statusBadge = '<span class="hz-badge ' + badgeColor + '">' + st.status + '</span>';
        detail = st.detail;
        time = st.time;
        dur = st.duration;
      }

      var isChecked = savedChecked[chk.id] ? ' checked' : '';
      var paramHint = (chk.parameters && chk.parameters.length > 0)
        ? ' <span style="color:var(--accent-light);font-size:0.5rem;" title="Has per-check parameters">&#9881;</span>'
        : '';

      tr.innerHTML =
        '<td class="check-select"><input type="checkbox" class="check-row-cb"' + isChecked + ' /></td>' +
        '<td class="check-num">' + chk.id + '</td>' +
        '<td class="check-name">' + chk.name + paramHint + '</td>' +
        '<td class="check-category">' + chk.category + '</td>' +
        '<td class="check-time">' + time + '</td>' +
        '<td class="check-duration">' + dur + '</td>' +
        '<td class="c">' + statusBadge + '</td>' +
        '<td class="check-details" title="' + detail + '">' + detail + '</td>' +
        '<td class="check-actions">' +
          '<button class="hz-btn sm primary" data-action="run" data-check-id="' + chk.id + '" aria-label="Run check ' + chk.id + '">Run</button>' +
          '<button class="hz-btn sm ghost" data-action="results" data-check-id="' + chk.id + '" aria-label="View results for check ' + chk.id + '">Results</button>' +
          '<button class="hz-btn sm ghost" data-action="sql" data-check-id="' + chk.id + '" aria-label="View SQL for check ' + chk.id + '">SQL</button>' +
        '</td>';

      tbody.appendChild(tr);
    });

    // Event delegation on tbody — handles all button clicks, checkbox clicks, and row clicks
    tbody.onclick = function(e) {
      // Action buttons (Run, Results, SQL)
      var btn = e.target.closest('[data-action]');
      if (btn) {
        e.stopPropagation();
        var checkId = parseInt(btn.getAttribute('data-check-id'), 10);
        var action = btn.getAttribute('data-action');
        if (action === 'run') {
          runSingleCheck(checkId);
        } else if (action === 'results') {
          viewResults(checkId);
        } else if (action === 'sql') {
          viewSQL(checkId);
        }
        return;
      }
      // Checkbox click — let the default toggle happen, then update
      if (e.target.type === 'checkbox') {
        // Use setTimeout to let the checkbox state update first
        setTimeout(function() { onCheckboxChange(); }, 0);
        return;
      }
      // Row click = select check
      var row = e.target.closest('tr[data-check-id]');
      if (row) {
        var id = parseInt(row.getAttribute('data-check-id'), 10);
        selectCheck(id);
      }
    };
  }

  /* ================================================================
     RUN SINGLE CHECK — runs ONLY the specified check
     Shows spinner on that row, updates its badge, opens results panel.
     Does NOT interfere with other checks or change selection.
     ================================================================ */
  function runSingleCheck(id) {
    var chk = checks.find(function(c) { return c.id === id; });
    if (!chk) return;

    // Mark as running and update just this row's badge cell
    runningChecks[id] = true;
    var row = document.querySelector('tr[data-check-id="' + id + '"]');
    if (row) {
      row.cells[6].innerHTML = '<span class="check-running">Running</span>';
    }

    var delay = 400 + Math.random() * 800;
    setTimeout(function() {
      var result = chk.mockResult();
      var now = new Date();
      var hh = String(now.getHours()).padStart(2, '0');
      var mi = String(now.getMinutes()).padStart(2, '0');
      var ss = String(now.getSeconds()).padStart(2, '0');

      checkStates[id] = {
        status: result.status,
        detail: result.detail,
        duration: result.duration,
        time: hh + ':' + mi + ':' + ss,
        rows: result.rows,
        cols: chk.cols,
        colAlign: chk.colAlign
      };

      delete runningChecks[id];
      activeCheckId = id;
      renderChecksTable();
      updateSummary();
      showPanel(id, 'results');

      var label = result.status === 'PASS' ? 'success' : result.status === 'WARN' ? 'warning' : 'error';
      showToast('#' + id + ' ' + chk.name + ': ' + result.status, label);
    }, delay);
  }

  function runCheck(id) { runSingleCheck(id); }

  /* ================================================================
     RUN ALL / RUN SELECTED (batch mode)
     ================================================================ */
  function runAllChecks() {
    var allIds = checks.map(function(c) { return c.id; });
    runBatch(allIds);
  }

  function runSelected() {
    var ids = getSelectedIds();
    if (ids.length === 0) {
      showToast('No checks selected', 'warning');
      return;
    }
    runBatch(ids);
  }

  function runBatch(ids) {
    // Mark all as running and update UI
    ids.forEach(function(id) {
      runningChecks[id] = true;
    });
    renderChecksTable();

    ids.forEach(function(id, i) {
      setTimeout(function() {
        var chk = checks.find(function(c) { return c.id === id; });
        if (!chk) return;

        var result = chk.mockResult();
        var now = new Date();
        var hh = String(now.getHours()).padStart(2, '0');
        var mi = String(now.getMinutes()).padStart(2, '0');
        var ss = String(now.getSeconds()).padStart(2, '0');

        checkStates[id] = {
          status: result.status,
          detail: result.detail,
          duration: result.duration,
          time: hh + ':' + mi + ':' + ss,
          rows: result.rows,
          cols: chk.cols,
          colAlign: chk.colAlign
        };

        delete runningChecks[id];
        renderChecksTable();
        updateSummary();

        // After last check completes, show summary
        if (i === ids.length - 1) {
          setTimeout(function() {
            if (ids.length > 1) {
              showMultiPanel(ids);
            } else {
              activeCheckId = ids[0];
              renderChecksTable();
              showPanel(ids[0], 'results');
            }
          }, 100);
        }
      }, (i + 1) * (300 + Math.random() * 400));
    });
  }

  /* ================================================================
     UPDATE SUMMARY BAR
     ================================================================ */
  function updateSummary() {
    var pass = 0, warn = 0, fail = 0, total = 0;
    for (var id in checkStates) {
      total++;
      if (checkStates[id].status === 'PASS') pass++;
      else if (checkStates[id].status === 'WARN') warn++;
      else fail++;
    }
    document.getElementById('status-summary').innerHTML =
      '<span>' + total + ' checks:</span>' +
      '<span class="hz-dot green"></span><span style="color:var(--green);">' + pass + ' pass</span>' +
      '<span class="hz-dot amber"></span><span style="color:var(--amber);">' + warn + ' warning</span>' +
      '<span class="hz-dot red"></span><span style="color:var(--red);">' + fail + ' fail</span>';

    var now = new Date();
    var ts = String(now.getDate()).padStart(2, '0') + ' ' +
      ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()] + ' ' +
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0') + ':' +
      String(now.getSeconds()).padStart(2, '0');
    document.getElementById('last-run-time').textContent = 'Last run: ' + ts;
  }

  /* ================================================================
     SELECT CHECK — clicking a row selects it and shows SQL
     ================================================================ */
  function selectCheck(id) {
    activeCheckId = id;
    renderChecksTable();
    showPanel(id, 'sql');
  }

  /* ================================================================
     CHECKBOX CHANGE — handle multi-select display
     ================================================================ */
  function onCheckboxChange() {
    var selectedIds = getSelectedIds();
    if (selectedIds.length > 1) {
      showMultiPanel(selectedIds);
    } else if (selectedIds.length === 1) {
      activeCheckId = selectedIds[0];
      renderChecksTable();
      showPanel(selectedIds[0], 'sql');
    }
  }

  function getSelectedIds() {
    var ids = [];
    var cbs = document.querySelectorAll('.check-row-cb');
    cbs.forEach(function(cb, i) {
      if (cb.checked && checks[i]) ids.push(checks[i].id);
    });
    return ids;
  }

  /* ================================================================
     VIEW RESULTS / VIEW SQL
     ================================================================ */
  function viewResults(id) {
    activeCheckId = id;
    renderChecksTable();
    showPanel(id, 'results');
  }

  function viewSQL(id) {
    activeCheckId = id;
    renderChecksTable();
    showPanel(id, 'sql');
  }

  /* ================================================================
     SHOW MULTI-SELECT PANEL
     ================================================================ */
  function showMultiPanel(ids) {
    var panel = document.getElementById('detail-panel');
    panel.classList.remove('closed');
    panel.classList.add('open');

    // Hide per-check params for multi-select
    document.getElementById('check-params-bar').style.display = 'none';

    document.getElementById('detail-title').textContent = ids.length + ' checks selected';

    var resultsHeader = document.getElementById('results-header');
    var resultsWrap = document.getElementById('results-wrap');

    var ranCount = 0, pass = 0, warn = 0, fail = 0;
    ids.forEach(function(id) {
      var st = checkStates[id];
      if (st) {
        ranCount++;
        if (st.status === 'PASS') pass++;
        else if (st.status === 'WARN') warn++;
        else fail++;
      }
    });

    if (ranCount > 0) {
      resultsHeader.innerHTML =
        '<span>' + ranCount + '/' + ids.length + ' run</span>' +
        '<span style="color:var(--green);font-weight:600;">' + pass + ' pass</span>' +
        '<span style="color:var(--amber);font-weight:600;">' + warn + ' warn</span>' +
        '<span style="color:var(--red);font-weight:600;">' + fail + ' fail</span>';
    } else {
      resultsHeader.innerHTML = '<span>' + ids.length + ' checks selected — none run yet</span>';
    }

    var html = '<div class="multi-summary"><table class="tbl"><thead><tr>' +
      '<th>#</th><th>Check Name</th><th>Category</th><th class="c">Result</th><th>Details</th><th>Duration</th>' +
      '</tr></thead><tbody>';

    ids.forEach(function(id) {
      var chk = checks.find(function(c) { return c.id === id; });
      if (!chk) return;
      var st = checkStates[id];
      var badge = '<span style="color:var(--text-muted);">—</span>';
      var detail = '—', dur = '—';
      if (st) {
        var bc = st.status === 'PASS' ? 'green' : st.status === 'WARN' ? 'amber' : 'red';
        badge = '<span class="hz-badge ' + bc + '">' + st.status + '</span>';
        detail = st.detail;
        dur = st.duration;
      }
      html += '<tr onclick="selectCheck(' + id + ')" title="Click to view details">' +
        '<td class="check-num">' + id + '</td>' +
        '<td class="check-name">' + chk.name + '</td>' +
        '<td class="check-category">' + chk.category + '</td>' +
        '<td class="c">' + badge + '</td>' +
        '<td class="check-details">' + detail + '</td>' +
        '<td class="check-duration">' + dur + '</td>' +
        '</tr>';
    });

    html += '</tbody></table></div>';
    resultsWrap.innerHTML = html;

    document.getElementById('sql-code-block').innerHTML =
      '<span class="sql-comment">-- ' + ids.length + ' checks selected</span>\n' +
      '<span class="sql-comment">-- Click a row above or in the table to view its SQL</span>';

    switchTab('results');
  }

  /* ================================================================
     REFRESH SQL PANE — updates SQL with current params
     ================================================================ */
  function refreshSqlPane(id) {
    var chk = checks.find(function(c) { return c.id === id; });
    if (!chk) return;
    var sql = buildSql(id);
    document.getElementById('sql-code-block').innerHTML = highlightSQL(sql);
  }

  /* ================================================================
     SHOW SINGLE CHECK PANEL
     ================================================================ */
  function showPanel(id, tab) {
    var chk = checks.find(function(c) { return c.id === id; });
    if (!chk) return;

    var panel = document.getElementById('detail-panel');
    panel.classList.remove('closed');
    panel.classList.add('open');

    // Title
    document.getElementById('detail-title').textContent = '#' + id + ' ' + chk.name;

    // Render per-check parameters inline
    renderCheckParams(id);

    // SQL pane — generate with current params (global + per-check)
    var sql = buildSql(id);
    document.getElementById('sql-code-block').innerHTML = highlightSQL(sql);

    // Results pane
    var st = checkStates[id];
    var resultsHeader = document.getElementById('results-header');
    var resultsWrap = document.getElementById('results-wrap');

    if (!st) {
      resultsHeader.innerHTML = '';
      resultsWrap.innerHTML = '<div class="results-empty">Check has not been run yet. Click <strong>Run</strong> to execute with the current parameters.</div>';
    } else {
      var badgeClass = st.status === 'PASS' ? 'color:var(--green)' : st.status === 'WARN' ? 'color:var(--amber)' : 'color:var(--red)';
      resultsHeader.innerHTML =
        '<span style="font-weight:600;' + badgeClass + ';">' + st.status + '</span>' +
        '<span>' + st.detail + '</span>' +
        '<span style="font-family:var(--font-mono);color:var(--text-tertiary);">' + st.rows.length + ' row' + (st.rows.length !== 1 ? 's' : '') + '</span>' +
        '<span style="font-family:var(--font-mono);color:var(--text-tertiary);">' + st.duration + '</span>';

      if (st.rows.length === 0) {
        resultsWrap.innerHTML = '<div class="results-empty" style="color:var(--green);">No issues found — all records pass validation.</div>';
      } else {
        var html = '<table class="tbl"><thead><tr>';
        st.cols.forEach(function(col, ci) {
          var cls = st.colAlign[ci] === 'r' ? ' class="r"' : st.colAlign[ci] === 'c' ? ' class="c"' : '';
          html += '<th' + cls + '>' + col + '</th>';
        });
        html += '</tr></thead><tbody>';
        st.rows.forEach(function(row) {
          html += '<tr>';
          row.forEach(function(cell, ci) {
            var cls = st.colAlign[ci] === 'r' ? ' class="r font-mono"' : st.colAlign[ci] === 'c' ? ' class="c"' : '';
            var val = cell;
            if (cell === 'PASS' || cell === 'OK' || cell === 'COMPLETE' || cell === 'Valid') {
              val = '<span class="hz-badge green">' + cell + '</span>';
            } else if (cell === 'FAIL' || cell === 'MISSING' || cell === 'OUT OF TOLERANCE' || cell === 'INVERSION') {
              val = '<span class="hz-badge red">' + cell + '</span>';
            } else if (cell === 'WARN' || cell === 'Confirmed') {
              val = '<span class="hz-badge amber">' + cell + '</span>';
            }
            html += '<td' + cls + '>' + val + '</td>';
          });
          html += '</tr>';
        });
        html += '</tbody></table>';
        resultsWrap.innerHTML = html;
      }
    }

    switchTab(tab);
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /* ================================================================
     SQL SYNTAX HIGHLIGHTING
     ================================================================ */
  function highlightSQL(sql) {
    var s = sql.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    // Highlight @param references
    s = s.replace(/@(\w+)/g, '<span class="sql-param">@$1</span>');
    s = s.replace(/(--[^\n]*)/g, '<span class="sql-comment">$1</span>');
    s = s.replace(/'([^']*)'/g, '<span class="sql-str">\'$1\'</span>');
    s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="sql-num">$1</span>');
    var kws = ['SELECT','FROM','WHERE','AND','OR','NOT','IN','AS','ON','JOIN','LEFT','RIGHT','INNER',
      'CROSS','GROUP BY','ORDER BY','HAVING','CASE','WHEN','THEN','ELSE','END','IS','NULL','BETWEEN',
      'LIKE','EXISTS','UNION','PARTITION BY','DESC','ASC','DISTINCT','WITH'];
    kws.forEach(function(kw) {
      var re = new RegExp('\\b(' + kw.replace(/ /g, '\\s+') + ')\\b', 'gi');
      s = s.replace(re, '<span class="sql-kw">$1</span>');
    });
    var fns = ['COUNT','SUM','AVG','MIN','MAX','ABS','ROUND','LAG','LEAD','OVER','ROW_NUMBER',
      'DATEDIFF','DATEADD','CURRENT_DATE','COALESCE','ISNULL','CAST','CONVERT','GETDATE'];
    fns.forEach(function(fn) {
      var re = new RegExp('\\b(' + fn + ')\\b', 'gi');
      s = s.replace(re, '<span class="sql-fn">$1</span>');
    });
    return s;
  }

  /* ================================================================
     TAB SWITCHING
     ================================================================ */
  function switchTab(tab) {
    document.querySelectorAll('.detail-tab').forEach(function(t) {
      t.classList.toggle('active', t.getAttribute('data-tab') === tab);
    });
    document.getElementById('pane-results').classList.toggle('active', tab === 'results');
    document.getElementById('pane-sql').classList.toggle('active', tab === 'sql');
    document.getElementById('btn-copy-results').style.display = tab === 'results' ? '' : 'none';
    document.getElementById('btn-copy-sql').style.display = tab === 'sql' ? '' : 'none';
  }

  /* ================================================================
     COPY ACTIONS
     ================================================================ */
  function copySql() {
    if (!activeCheckId) return;
    var sql = buildSql(activeCheckId);
    navigator.clipboard.writeText(sql).then(function() {
      showToast('SQL copied to clipboard', 'success');
    });
  }

  function copyResults() {
    var st = checkStates[activeCheckId];
    if (!st || st.rows.length === 0) {
      showToast('No results to copy', 'warning');
      return;
    }
    var lines = [st.cols.join('\t')];
    st.rows.forEach(function(row) { lines.push(row.join('\t')); });
    navigator.clipboard.writeText(lines.join('\n')).then(function() {
      showToast('Results copied (' + st.rows.length + ' rows)', 'success');
    });
  }

  function exportResults() {
    var allRows = [];
    var header = ['Check #','Check Name','Category','Status','Details','Duration'];
    allRows.push(header.join(','));
    checks.forEach(function(chk) {
      var st = checkStates[chk.id];
      if (st) {
        allRows.push([chk.id, '"' + chk.name + '"', chk.category, st.status, '"' + st.detail + '"', st.duration].join(','));
      }
    });
    if (allRows.length <= 1) {
      showToast('No results to export — run checks first', 'warning');
      return;
    }
    var blob = new Blob([allRows.join('\n')], { type: 'text/csv' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'sql-checks-' + document.getElementById('param-cob').value + '.csv';
    a.click();
    showToast('Exported ' + (allRows.length - 1) + ' check results to CSV', 'success');
  }

  /* ================================================================
     CLOSE PANEL
     ================================================================ */
  function closePanel() {
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('detail-panel').classList.add('closed');
    document.getElementById('check-params-bar').style.display = 'none';
    activeCheckId = null;
    renderChecksTable();
  }

  /* ================================================================
     SELECT ALL TOGGLE
     ================================================================ */
  function toggleSelectAll(el) {
    document.querySelectorAll('.check-row-cb').forEach(function(cb) { cb.checked = el.checked; });
    onCheckboxChange();
  }

  /* ================================================================
     RESIZE HANDLE for detail panel
     ================================================================ */
  (function() {
    var handle = document.getElementById('detail-resize');
    var panel = document.getElementById('detail-panel');
    var startY, startH;
    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      startY = e.clientY;
      startH = panel.offsetHeight;
      document.addEventListener('mousemove', onDrag);
      document.addEventListener('mouseup', onUp);
    });
    function onDrag(e) {
      var delta = startY - e.clientY;
      var newH = Math.max(120, Math.min(window.innerHeight * 0.7, startH + delta));
      panel.style.maxHeight = newH + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onDrag);
      document.removeEventListener('mouseup', onUp);
    }
  })();

  /* ================================================================
     KEYBOARD SHORTCUTS
     ================================================================ */
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runAllChecks();
    }
    if (e.key === 'Escape') {
      closePanel();
    }
    // Enter on per-check param field triggers run of active check
    if (e.key === 'Enter' && e.target.closest('.check-params-bar') && activeCheckId) {
      e.preventDefault();
      runSingleCheck(activeCheckId);
    }
  });
</script>
</body>
</html>
