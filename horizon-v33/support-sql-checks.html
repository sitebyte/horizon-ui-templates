<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Checks — Horizon ETRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:["selector","[data-theme=\"dark\"]"],theme:{extend:{fontFamily:{sans:["Inter","sans-serif"],mono:["JetBrains Mono","monospace"]}}}}</script>
  <link href="shell.css" rel="stylesheet" />
  <style>
    /* ---- Toolbar ---- */
    .sql-toolbar {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-1) 0;
      margin-bottom: var(--sp-2);
      flex-wrap: wrap;
    }
    .sql-toolbar .spacer { flex: 1; }
    .sql-status-summary {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }
    .sql-status-summary .hz-dot { width: 0.375rem; height: 0.375rem; }

    /* ---- Parameter bar ---- */
    .param-bar {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-3);
      background: var(--surface-raised);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: var(--sp-2);
      flex-wrap: wrap;
    }
    .param-group {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
    }
    .param-group label {
      font-size: 0.5625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .param-group input,
    .param-group select {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      background: var(--input-bg);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 0.125rem var(--sp-2);
      height: 1.5rem;
    }
    .param-group input[type="date"] { width: 8.5rem; }
    .param-group select { min-width: 6rem; }

    /* ---- Table — compact .tbl pattern ---- */
    .tbl { font-size: var(--text-xs); width: 100%; border-collapse: collapse; }
    .tbl th {
      font-size: 0.5rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.125rem var(--sp-2);
      text-align: left;
      border-bottom: 0.0625rem solid var(--border);
      font-family: var(--font-ui);
      position: sticky;
      top: 0;
      background: var(--surface-canvas);
      z-index: 1;
    }
    .tbl td {
      padding: 0.125rem var(--sp-2);
      border-bottom: 0.0625rem solid var(--border-subtle);
      height: 1.25rem;
    }
    .tbl tr:hover td { background: var(--hover); }
    .tbl .r { text-align: right; }
    .tbl .c { text-align: center; }
    .tbl .check-num {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-size: 0.5625rem;
      width: 1.5rem;
    }
    .tbl .check-name {
      font-weight: 600;
      color: var(--text-primary);
    }
    .tbl .check-category {
      font-size: 0.5625rem;
      color: var(--text-tertiary);
    }
    .tbl .check-time {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-size: 0.5625rem;
    }
    .tbl .check-duration {
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      font-size: 0.5625rem;
    }
    .tbl .check-details {
      font-size: 0.5625rem;
      color: var(--text-tertiary);
      max-width: 14rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tbl .check-actions {
      display: flex;
      gap: var(--sp-1);
      white-space: nowrap;
    }
    .tbl .check-select {
      width: 1.25rem;
      text-align: center;
    }
    .tbl .check-select input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* Active row highlight */
    .tbl tr.active-check td {
      background: var(--accent-bg2);
    }

    /* Running spinner */
    .check-running {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-1);
      font-size: 0.5625rem;
      color: var(--accent-light);
    }
    .check-running::before {
      content: '';
      width: 0.5rem;
      height: 0.5rem;
      border: 0.0625rem solid var(--accent-light);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Layout: checks table + bottom panel ---- */
    .sql-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }
    .sql-table-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }

    /* ---- Bottom detail panel (tabs: Results | SQL) ---- */
    .detail-panel {
      flex-shrink: 0;
      border-top: 0.0625rem solid var(--border);
      margin-top: var(--sp-2);
      max-height: 45vh;
      flex-direction: column;
    }
    .detail-panel.open { display: flex; }
    .detail-panel.closed { display: none; }

    .detail-tabs {
      display: flex;
      align-items: center;
      gap: 0;
      border-bottom: 0.0625rem solid var(--border);
      flex-shrink: 0;
    }
    .detail-tab {
      padding: var(--sp-2) var(--sp-3);
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 0.125rem solid transparent;
      transition: color var(--transition-fast), border-color var(--transition-fast);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .detail-tab:hover { color: var(--text-secondary); }
    .detail-tab.active {
      color: var(--accent-light);
      border-bottom-color: var(--accent-light);
    }
    .detail-tab-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      padding-right: var(--sp-2);
    }
    .detail-tab-title {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-secondary);
      padding: var(--sp-2) var(--sp-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 20rem;
    }

    .detail-body {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    .detail-pane {
      display: none;
      padding: var(--sp-2) 0;
    }
    .detail-pane.active { display: block; }

    /* Results table inside detail panel */
    .results-wrap {
      overflow: auto;
      padding: 0 var(--sp-2);
    }
    .results-header {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: 0 var(--sp-2) var(--sp-1);
      font-size: 0.5625rem;
      color: var(--text-muted);
    }
    .results-empty {
      padding: var(--sp-6) var(--sp-4);
      text-align: center;
      color: var(--text-muted);
      font-size: var(--text-xs);
    }

    /* SQL code block */
    .sql-code-block {
      background: var(--surface-canvas);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--sp-3);
      margin: 0 var(--sp-2);
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      line-height: 1.7;
      color: var(--text-secondary);
    }
    .sql-code-block .sql-kw { color: var(--accent-light); font-weight: 600; }
    .sql-code-block .sql-fn { color: var(--accent-violet); }
    .sql-code-block .sql-str { color: var(--green); }
    .sql-code-block .sql-comment { color: var(--text-muted); font-style: italic; }
    .sql-code-block .sql-num { color: var(--amber); }
    .sql-code-block .sql-alias { color: var(--text-tertiary); }

    /* Resize handle */
    .detail-resize {
      height: 0.375rem;
      cursor: ns-resize;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .detail-resize::after {
      content: '';
      width: 2rem;
      height: 0.125rem;
      border-radius: var(--radius-full);
      background: var(--border-strong);
    }
    .detail-resize:hover::after { background: var(--accent-light); }
  </style>
</head>
<body>
<div id="hz-app">

  <div class="hz-content-fill">
    <div class="sql-layout">

      <!-- Toolbar (same structure, added dynamic last-run + summary) -->
      <div class="sql-toolbar" data-component="sql-toolbar">
        <button class="hz-btn primary sm" onclick="runAllChecks()" aria-label="Run all checks">Run All Checks</button>
        <button class="hz-btn sm" onclick="runSelected()" aria-label="Run selected checks">Run Selected</button>
        <button class="hz-btn ghost sm" onclick="exportResults()" aria-label="Export results to CSV">Export Results</button>
        <div class="spacer"></div>
        <span class="font-mono text-xs" style="color:var(--text-muted);" id="last-run-time">Last run: —</span>
        <div class="sql-status-summary" id="status-summary">
          <span>12 checks:</span>
          <span class="hz-dot green"></span><span style="color:var(--green);">—</span>
          <span class="hz-dot amber"></span><span style="color:var(--amber);">—</span>
          <span class="hz-dot red"></span><span style="color:var(--red);">—</span>
        </div>
      </div>

      <!-- Parameter Bar (NEW) -->
      <div class="param-bar" data-component="param-bar">
        <div class="param-group">
          <label for="param-cob">COB Date</label>
          <input type="date" id="param-cob" aria-label="Close of business date" />
        </div>
        <div class="param-group">
          <label for="param-env">Environment</label>
          <select id="param-env" aria-label="Target environment">
            <option value="PROD" selected>PROD</option>
            <option value="UAT">UAT</option>
            <option value="TST1">TST1</option>
            <option value="TST2">TST2</option>
          </select>
        </div>
        <div class="param-group">
          <label for="param-book">Book</label>
          <select id="param-book" aria-label="Trading book filter">
            <option value="ALL" selected>All Books</option>
            <option value="GLNG">GLNG</option>
            <option value="GLNG-SPOT">GLNG Spot</option>
            <option value="GLNG-TERM">GLNG Term</option>
          </select>
        </div>
        <div class="param-group">
          <label for="param-benchmark">Benchmark</label>
          <select id="param-benchmark" aria-label="Benchmark filter">
            <option value="ALL" selected>All</option>
            <option value="JKM">JKM</option>
            <option value="TTF">TTF</option>
            <option value="HH">HH</option>
            <option value="Brent">Brent</option>
            <option value="NBP">NBP</option>
            <option value="JCC">JCC</option>
          </select>
        </div>
      </div>

      <!-- Check Results Table (now data-driven from JS) -->
      <div class="sql-table-wrap" data-component="sql-checks-table">
        <table class="tbl" id="sql-checks-table">
          <thead>
            <tr>
              <th class="check-select"><input type="checkbox" id="select-all" onclick="toggleSelectAll(this)" /></th>
              <th>#</th>
              <th>Check Name</th>
              <th>Category</th>
              <th>Last Run</th>
              <th>Duration</th>
              <th class="c">Result</th>
              <th>Details</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="checks-tbody"></tbody>
        </table>
      </div>

      <!-- Bottom Detail Panel: Results | SQL tabs (replaces old single SQL panel) -->
      <div class="detail-panel closed" id="detail-panel" data-component="detail-panel">
        <div class="detail-resize" id="detail-resize" title="Drag to resize"></div>
        <div class="detail-tabs">
          <span class="detail-tab-title" id="detail-title">—</span>
          <button class="detail-tab active" data-tab="results" onclick="switchTab('results')">Results</button>
          <button class="detail-tab" data-tab="sql" onclick="switchTab('sql')">SQL</button>
          <div class="detail-tab-actions">
            <button class="hz-btn sm ghost" onclick="copyResults()" id="btn-copy-results" title="Copy results as tab-separated">Copy Results</button>
            <button class="hz-btn sm ghost" onclick="copySql()" id="btn-copy-sql" style="display:none;" title="Copy SQL to clipboard">Copy SQL</button>
            <button class="hz-btn sm ghost" onclick="closePanel()">Close</button>
          </div>
        </div>
        <div class="detail-body">
          <div class="detail-pane active" id="pane-results">
            <div class="results-header" id="results-header"></div>
            <div class="results-wrap" id="results-wrap">
              <div class="results-empty">Run a check to see results here</div>
            </div>
          </div>
          <div class="detail-pane" id="pane-sql">
            <div class="sql-code-block" id="sql-code-block"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<script src="shell.js"></script>
<script>
  initShell('support-sql-checks', 'SQL Checks');

  /* ================================================================
     CHECK DEFINITIONS
     Each check has: id, name, category, a sql() function that
     receives params, columns, alignment, and mock results.
     The SQL uses the COB date and other params from the param bar.
     ================================================================ */
  var checks = [
    {
      id: 1, name: 'Bootstrap Curve Validation', category: 'Curves',
      sql: function(p) {
        return '-- Bootstrap Curve Validation\n'
          + '-- Checks forward curves for smoothness and arbitrage-free pricing\n'
          + 'SELECT\n'
          + '    c.benchmark, c.tenor, c.settle_date,\n'
          + '    c.price AS current_price,\n'
          + '    LAG(c.price) OVER (PARTITION BY c.benchmark ORDER BY c.tenor) AS prev_price,\n'
          + '    ABS(c.price - LAG(c.price) OVER (...)) AS delta,\n'
          + '    CASE WHEN ABS(delta) > c.price * 0.05\n'
          + '         THEN \'FAIL\' ELSE \'PASS\' END AS check_result\n'
          + 'FROM curve_data c\n'
          + 'WHERE c.curve_date = \'' + p.cob + '\'\n'
          + (p.benchmark !== 'ALL' ? '  AND c.benchmark = \'' + p.benchmark + '\'\n' : '  AND c.benchmark IN (\'JKM\', \'TTF\', \'HH\', \'Brent\')\n')
          + 'ORDER BY c.benchmark, c.tenor;';
      },
      cols: ['Benchmark','Tenor','Settle Date','Price','Prev Price','Delta','Result'],
      colAlign: [null,null,null,'r','r','r','c'],
      mockResult: function() {
        return { status: 'PASS', detail: '4 curves, 96 tenors validated', duration: '2.4s', rows: [
          ['JKM','M+1','2026-06-15','14.85','14.72','0.13','PASS'],
          ['JKM','M+2','2026-07-15','14.62','14.85','0.23','PASS'],
          ['JKM','M+3','2026-08-15','14.41','14.62','0.21','PASS'],
          ['TTF','M+1','2026-06-15','11.34','11.28','0.06','PASS'],
          ['TTF','M+2','2026-07-15','11.18','11.34','0.16','PASS'],
          ['HH','M+1','2026-06-15','3.42','3.38','0.04','PASS'],
          ['Brent','M+1','2026-06-15','78.40','78.15','0.25','PASS'],
          ['Brent','M+2','2026-07-15','77.95','78.40','0.45','PASS'],
        ]};
      }
    },
    {
      id: 2, name: 'Forward Curve Monotonicity', category: 'Curves',
      sql: function(p) {
        return '-- Forward Curve Monotonicity\n'
          + '-- Detects backward inversions in the forward curve\n'
          + 'SELECT benchmark, tenor, price,\n'
          + '    LAG(price) OVER (PARTITION BY benchmark ORDER BY tenor) AS prev,\n'
          + '    CASE WHEN price < LAG(price) OVER (...) THEN \'INVERSION\'\n'
          + '         ELSE \'OK\' END AS status\n'
          + 'FROM curve_data\n'
          + 'WHERE curve_date = \'' + p.cob + '\'\n'
          + (p.benchmark !== 'ALL' ? '  AND benchmark = \'' + p.benchmark + '\'\n' : '')
          + 'ORDER BY benchmark, tenor;';
      },
      cols: ['Benchmark','Tenor','Price','Prev','Status'],
      colAlign: [null,null,'r','r','c'],
      mockResult: function() {
        return { status: 'PASS', detail: 'No inversions detected', duration: '1.1s', rows: [] };
      }
    },
    {
      id: 3, name: 'Stale Price Detection', category: 'Curves',
      sql: function(p) {
        return '-- Stale Price Detection\n'
          + '-- Flags prices not updated within 24 hours of COB\n'
          + 'SELECT benchmark, tenor, price, last_updated,\n'
          + '    DATEDIFF(hour, last_updated, \'' + p.cob + ' 17:00\') AS hours_stale\n'
          + 'FROM curve_data\n'
          + 'WHERE curve_date = \'' + p.cob + '\'\n'
          + '  AND DATEDIFF(hour, last_updated, \'' + p.cob + ' 17:00\') > 24\n'
          + (p.benchmark !== 'ALL' ? '  AND benchmark = \'' + p.benchmark + '\'\n' : '')
          + 'ORDER BY hours_stale DESC;';
      },
      cols: ['Benchmark','Tenor','Price','Last Updated','Hours Stale'],
      colAlign: [null,null,'r',null,'r'],
      mockResult: function() {
        return { status: 'WARN', detail: '6 prices >24h old', duration: '0.8s', rows: [
          ['NBP','Q3-26','8.42','2026-05-04 09:15','55'],
          ['NBP','Q4-26','9.10','2026-05-04 09:15','55'],
          ['JCC','M+4','72.30','2026-05-04 14:22','50'],
          ['JCC','M+5','71.85','2026-05-04 14:22','50'],
          ['JCC','M+6','71.40','2026-05-04 14:22','50'],
          ['HH','Cal-27','3.95','2026-05-05 03:00','38'],
        ]};
      }
    },
    {
      id: 4, name: 'Trade Duplicate Check', category: 'Trades',
      sql: function(p) {
        return '-- Trade Duplicate Check\n'
          + '-- Identifies trades with identical key fields\n'
          + 'SELECT t1.trade_id, t1.counterparty, t1.direction,\n'
          + '    t1.volume, t1.price, t1.trade_date,\n'
          + '    COUNT(*) OVER (PARTITION BY t1.counterparty, t1.direction,\n'
          + '        t1.volume, t1.price, t1.trade_date) AS dup_count\n'
          + 'FROM trades t1\n'
          + 'WHERE t1.trade_date <= \'' + p.cob + '\'\n'
          + (p.book !== 'ALL' ? '  AND t1.book = \'' + p.book + '\'\n' : '')
          + 'HAVING dup_count > 1\n'
          + 'ORDER BY t1.trade_date DESC;';
      },
      cols: ['Trade ID','Counterparty','Direction','Volume','Price','Trade Date','Dup Count'],
      colAlign: [null,null,null,'r','r',null,'r'],
      mockResult: function() {
        return { status: 'PASS', detail: '0 duplicates in 1,247 trades', duration: '3.2s', rows: [] };
      }
    },
    {
      id: 5, name: 'Missing Settlement Prices', category: 'Settlement',
      sql: function(p) {
        return '-- Missing Settlement Prices\n'
          + '-- Checks for settlement periods without published prices\n'
          + 'SELECT s.benchmark, s.delivery_month, s.settlement_type,\n'
          + '    s.expected_date, s.status\n'
          + 'FROM settlement_schedule s\n'
          + 'LEFT JOIN settlement_prices sp\n'
          + '    ON s.benchmark = sp.benchmark\n'
          + '    AND s.delivery_month = sp.delivery_month\n'
          + 'WHERE sp.price IS NULL\n'
          + '  AND s.expected_date <= \'' + p.cob + '\'\n'
          + (p.benchmark !== 'ALL' ? '  AND s.benchmark = \'' + p.benchmark + '\'\n' : '')
          + 'ORDER BY s.expected_date;';
      },
      cols: ['Benchmark','Delivery Month','Settlement Type','Expected Date','Status'],
      colAlign: [null,null,null,null,'c'],
      mockResult: function() {
        return { status: 'WARN', detail: '2 missing: NBP Nov, JCC Dec', duration: '1.5s', rows: [
          ['NBP','Nov-26','Final','2026-05-02','MISSING'],
          ['JCC','Dec-26','Provisional','2026-05-05','MISSING'],
        ]};
      }
    },
    {
      id: 6, name: 'Position-Trade Reconciliation', category: 'Positions',
      sql: function(p) {
        return '-- Position-Trade Reconciliation\n'
          + '-- Verifies aggregated positions match underlying trades\n'
          + 'SELECT p.benchmark, p.delivery_month,\n'
          + '    p.net_position AS pos_volume,\n'
          + '    SUM(CASE t.direction WHEN \'BUY\' THEN t.volume\n'
          + '         ELSE -t.volume END) AS trade_volume,\n'
          + '    p.net_position - trade_volume AS variance\n'
          + 'FROM positions p\n'
          + 'JOIN trades t ON p.benchmark = t.benchmark\n'
          + '    AND p.delivery_month = t.delivery_month\n'
          + 'WHERE p.as_of_date = \'' + p.cob + '\'\n'
          + (p.book !== 'ALL' ? '  AND p.book = \'' + p.book + '\'\n' : '')
          + 'GROUP BY p.benchmark, p.delivery_month, p.net_position\n'
          + 'HAVING ABS(variance) > 0.01\n'
          + 'ORDER BY ABS(variance) DESC;';
      },
      cols: ['Benchmark','Delivery Month','Position Vol','Trade Vol','Variance'],
      colAlign: [null,null,'r','r','r'],
      mockResult: function() {
        return { status: 'PASS', detail: 'All positions reconciled', duration: '4.8s', rows: [] };
      }
    },
    {
      id: 7, name: 'Credit Limit Validation', category: 'Risk',
      sql: function(p) {
        return '-- Credit Limit Validation\n'
          + '-- Checks counterparty exposure against credit limits\n'
          + 'SELECT cp.name, cp.credit_limit,\n'
          + '    SUM(t.mtm_value) AS exposure,\n'
          + '    cp.credit_limit - SUM(t.mtm_value) AS headroom,\n'
          + '    ROUND(SUM(t.mtm_value) / cp.credit_limit * 100, 1) AS utilisation_pct\n'
          + 'FROM counterparties cp\n'
          + 'JOIN trades t ON cp.id = t.counterparty_id\n'
          + 'WHERE t.status IN (\'FO-Validated\', \'Trade Checked\')\n'
          + '  AND t.value_date >= \'' + p.cob + '\'\n'
          + (p.book !== 'ALL' ? '  AND t.book = \'' + p.book + '\'\n' : '')
          + 'GROUP BY cp.name, cp.credit_limit\n'
          + 'ORDER BY utilisation_pct DESC;';
      },
      cols: ['Counterparty','Credit Limit ($M)','Exposure ($M)','Headroom ($M)','Utilisation %'],
      colAlign: [null,'r','r','r','r'],
      mockResult: function() {
        return { status: 'PASS', detail: 'All within limits', duration: '0.6s', rows: [
          ['Tokyo Gas','150.0','89.2','60.8','59.5'],
          ['JERA','200.0','112.4','87.6','56.2'],
          ['Kogas','180.0','67.1','112.9','37.3'],
          ['Shell Eastern','250.0','43.8','206.2','17.5'],
          ['Petronas LNG','120.0','18.6','101.4','15.5'],
        ]};
      }
    },
    {
      id: 8, name: 'Counterparty Master Check', category: 'Reference',
      sql: function(p) {
        return '-- Counterparty Master Check\n'
          + '-- Validates counterparty records for completeness\n'
          + 'SELECT cp.id, cp.name, cp.lei, cp.status,\n'
          + '    CASE WHEN cp.lei IS NULL THEN \'Missing LEI\'\n'
          + '         WHEN cp.credit_limit IS NULL THEN \'No credit limit\'\n'
          + '         WHEN cp.kyc_expiry < \'' + p.cob + '\' THEN \'KYC expired\'\n'
          + '         ELSE \'Valid\' END AS validation\n'
          + 'FROM counterparties cp\n'
          + 'WHERE cp.status = \'Active\'\n'
          + 'ORDER BY cp.name;';
      },
      cols: ['ID','Name','LEI','Status','Validation'],
      colAlign: [null,null,null,'c','c'],
      mockResult: function() {
        return { status: 'PASS', detail: '47 counterparties valid', duration: '0.4s', rows: [] };
      }
    },
    {
      id: 9, name: 'Unmatched Nominations', category: 'Operations',
      sql: function(p) {
        return '-- Unmatched Nominations\n'
          + '-- Finds nominations without a matching trade or cargo\n'
          + 'SELECT n.nom_id, n.facility, n.direction,\n'
          + '    n.volume_mmbtu, n.flow_date, n.status,\n'
          + '    n.counterparty\n'
          + 'FROM nominations n\n'
          + 'LEFT JOIN trades t ON n.trade_id = t.trade_id\n'
          + 'WHERE t.trade_id IS NULL\n'
          + '  AND n.flow_date >= \'' + p.cob + '\'\n'
          + '  AND n.status != \'Cancelled\'\n'
          + 'ORDER BY n.flow_date;';
      },
      cols: ['Nom ID','Facility','Direction','Volume (MMBtu)','Flow Date','Status','Counterparty'],
      colAlign: [null,null,null,'r',null,'c',null],
      mockResult: function() {
        return { status: 'FAIL', detail: '1 unmatched: NOM-Q2-003', duration: '1.2s', rows: [
          ['NOM-Q2-003','Sabine Pass','DELIVER','145,000','2026-05-12','Confirmed','JERA'],
        ]};
      }
    },
    {
      id: 10, name: 'Invoice Amount Validation', category: 'Settlement',
      sql: function(p) {
        return '-- Invoice Amount Validation\n'
          + '-- Checks invoiced amounts against calculated amounts\n'
          + 'SELECT i.invoice_id, i.counterparty, i.invoice_amount,\n'
          + '    c.calculated_amount,\n'
          + '    ABS(i.invoice_amount - c.calculated_amount) AS variance,\n'
          + '    CASE WHEN ABS(variance) > i.invoice_amount * 0.001\n'
          + '         THEN \'OUT OF TOLERANCE\' ELSE \'OK\' END AS status\n'
          + 'FROM invoices i\n'
          + 'JOIN calculated_settlements c\n'
          + '    ON i.trade_id = c.trade_id AND i.period = c.period\n'
          + 'WHERE i.invoice_date <= \'' + p.cob + '\'\n'
          + '  AND i.status IN (\'Pending\', \'Approved\')\n'
          + 'ORDER BY variance DESC;';

      cols: ['Invoice ID','Counterparty','Invoiced ($)','Calculated ($)','Variance ($)','Status'],
      colAlign: [null,null,'r','r','r','c'],
      mockResult: function() {
        return { status: 'PASS', detail: 'All invoices within tolerance', duration: '2.1s', rows: [
          ['INV-2026-0142','Tokyo Gas','4,812,340.00','4,812,291.50','48.50','OK'],
          ['INV-2026-0143','JERA','7,241,100.00','7,241,087.25','12.75','OK'],
          ['INV-2026-0138','Kogas','3,590,000.00','3,589,972.10','27.90','OK'],
        ]};
      }
    },
    {
      id: 11, name: 'Orphaned Cargo Check', category: 'Physical',
      sql: function(p) {
        return '-- Orphaned Cargo Check\n'
          + '-- Finds cargoes without both a buy and sell trade\n'
          + 'SELECT c.cargo_id, c.vessel, c.load_port, c.discharge_port,\n'
          + '    c.load_date, c.volume_mmbtu,\n'
          + '    CASE WHEN tb.trade_id IS NULL THEN \'No buy trade\'\n'
          + '         WHEN ts.trade_id IS NULL THEN \'No sell trade\'\n'
          + '         END AS issue\n'
          + 'FROM cargoes c\n'
          + 'LEFT JOIN trades tb ON c.buy_trade_id = tb.trade_id\n'
          + 'LEFT JOIN trades ts ON c.sell_trade_id = ts.trade_id\n'
          + 'WHERE (tb.trade_id IS NULL OR ts.trade_id IS NULL)\n'
          + '  AND c.load_date >= \'' + p.cob + '\'\n'
          + 'ORDER BY c.load_date;';
      },
      cols: ['Cargo ID','Vessel','Load Port','Discharge Port','Load Date','Volume (MMBtu)','Issue'],
      colAlign: [null,null,null,null,null,'r',null],
      mockResult: function() {
        return { status: 'PASS', detail: 'No orphaned cargoes', duration: '0.9s', rows: [] };
      }
    },
    {
      id: 12, name: 'EOD Completeness', category: 'System',
      sql: function(p) {
        return '-- EOD Completeness\n'
          + '-- Validates all end-of-day batch steps completed\n'
          + 'SELECT step_name, step_order, status,\n'
          + '    started_at, completed_at,\n'
          + '    DATEDIFF(second, started_at, completed_at) AS duration_sec\n'
          + 'FROM eod_batch_log\n'
          + 'WHERE batch_date = \'' + p.cob + '\'\n'
          + 'ORDER BY step_order;';
      },
      cols: ['Step','Order','Status','Started','Completed','Duration (s)'],
      colAlign: [null,'c','c',null,null,'r'],
      mockResult: function() {
        return { status: 'PASS', detail: '8/8 steps complete', duration: '0.3s', rows: [
          ['Curve Snapshot','1','COMPLETE','17:00:01','17:00:14','13'],
          ['Position Calc','2','COMPLETE','17:00:15','17:01:42','87'],
          ['P&L Calc','3','COMPLETE','17:01:43','17:03:18','95'],
          ['Risk Metrics','4','COMPLETE','17:03:19','17:04:05','46'],
          ['Credit Update','5','COMPLETE','17:04:06','17:04:22','16'],
          ['Trade Validation','6','COMPLETE','17:04:23','17:05:01','38'],
          ['Report Generation','7','COMPLETE','17:05:02','17:06:44','102'],
          ['Archive','8','COMPLETE','17:06:45','17:07:02','17'],
        ]};
      }
    }
  ];

  /* ================================================================
     STATE
     ================================================================ */
  var activeCheckId = null;
  var checkStates = {};

  /* ================================================================
     INIT — set COB to today and render the table
     ================================================================ */
  setTimeout(function() {
    var today = new Date();
    var yyyy = today.getFullYear();
    var mm = String(today.getMonth() + 1).padStart(2, '0');
    var dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('param-cob').value = yyyy + '-' + mm + '-' + dd;
    renderChecksTable();
  }, 100);

  /* ================================================================
     GET PARAMS from the param bar
     ================================================================ */
  function getParams() {
    return {
      cob: document.getElementById('param-cob').value || '2026-05-07',
      env: document.getElementById('param-env').value,
      book: document.getElementById('param-book').value,
      benchmark: document.getElementById('param-benchmark').value
    };
  }

  /* ================================================================
     RENDER CHECKS TABLE
     ================================================================ */
  function renderChecksTable() {
    var tbody = document.getElementById('checks-tbody');
    tbody.innerHTML = '';
    checks.forEach(function(chk) {
      var st = checkStates[chk.id];
      var tr = document.createElement('tr');
      if (activeCheckId === chk.id) tr.classList.add('active-check');
      tr.setAttribute('data-check-id', chk.id);

      var statusBadge = '<span style="color:var(--text-muted);">—</span>';
      var detail = '—';
      var time = '—';
      var dur = '—';
      if (st) {
        var badgeColor = st.status === 'PASS' ? 'green' : st.status === 'WARN' ? 'amber' : 'red';
        statusBadge = '<span class="hz-badge ' + badgeColor + '">' + st.status + '</span>';
        detail = st.detail;
        time = st.time;
        dur = st.duration;
      }

      tr.innerHTML =
        '<td class="check-select"><input type="checkbox" class="check-row-cb" /></td>' +
        '<td class="check-num">' + chk.id + '</td>' +
        '<td class="check-name">' + chk.name + '</td>' +
        '<td class="check-category">' + chk.category + '</td>' +
        '<td class="check-time">' + time + '</td>' +
        '<td class="check-duration">' + dur + '</td>' +
        '<td class="c">' + statusBadge + '</td>' +
        '<td class="check-details" title="' + detail + '">' + detail + '</td>' +
        '<td class="check-actions">' +
          '<button class="hz-btn sm primary" onclick="runCheck(' + chk.id + ')">Run</button>' +
          '<button class="hz-btn sm ghost" onclick="viewResults(' + chk.id + ')">Results</button>' +
          '<button class="hz-btn sm ghost" onclick="viewSQL(' + chk.id + ')">SQL</button>' +
        '</td>';
      tbody.appendChild(tr);
    });
  }

  /* ================================================================
     RUN CHECK — spinner then populate results
     ================================================================ */
  function runCheck(id) {
    var chk = checks.find(function(c) { return c.id === id; });
    if (!chk) return;

    // Show running state
    var row = document.querySelector('tr[data-check-id="' + id + '"]');
    if (row) {
      row.cells[6].innerHTML = '<span class="check-running">Running</span>';
    }

    var delay = 400 + Math.random() * 800;
    setTimeout(function() {
      var result = chk.mockResult();
      var now = new Date();
      var hh = String(now.getHours()).padStart(2, '0');
      var mi = String(now.getMinutes()).padStart(2, '0');
      var ss = String(now.getSeconds()).padStart(2, '0');

      checkStates[id] = {
        status: result.status,
        detail: result.detail,
        duration: result.duration,
        time: hh + ':' + mi + ':' + ss,
        rows: result.rows,
        cols: chk.cols,
        colAlign: chk.colAlign
      };

      activeCheckId = id;
      renderChecksTable();
      updateSummary();
      showPanel(id, 'results');

      var label = result.status === 'PASS' ? 'success' : result.status === 'WARN' ? 'warning' : 'error';
      showToast('#' + id + ' ' + chk.name + ': ' + result.status, label);
    }, delay);
  }

  /* ================================================================
     RUN ALL / RUN SELECTED
     ================================================================ */
  function runAllChecks() {
    checks.forEach(function(chk, i) {
      setTimeout(function() { runCheck(chk.id); }, i * 200);
    });
  }

  function runSelected() {
    var cbs = document.querySelectorAll('.check-row-cb');
    var ids = [];
    cbs.forEach(function(cb, i) {
      if (cb.checked) ids.push(checks[i].id);
    });
    if (ids.length === 0) {
      showToast('No checks selected', 'warning');
      return;
    }
    ids.forEach(function(id, i) {
      setTimeout(function() { runCheck(id); }, i * 200);
    });
  }

  /* ================================================================
     UPDATE SUMMARY BAR
     ================================================================ */
  function updateSummary() {
    var pass = 0, warn = 0, fail = 0, total = 0;
    for (var id in checkStates) {
      total++;
      if (checkStates[id].status === 'PASS') pass++;
      else if (checkStates[id].status === 'WARN') warn++;
      else fail++;
    }
    document.getElementById('status-summary').innerHTML =
      '<span>' + total + ' checks:</span>' +
      '<span class="hz-dot green"></span><span style="color:var(--green);">' + pass + ' pass</span>' +
      '<span class="hz-dot amber"></span><span style="color:var(--amber);">' + warn + ' warning</span>' +
      '<span class="hz-dot red"></span><span style="color:var(--red);">' + fail + ' fail</span>';

    var now = new Date();
    var ts = String(now.getDate()).padStart(2, '0') + ' ' +
      ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()] + ' ' +
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0') + ':' +
      String(now.getSeconds()).padStart(2, '0');
    document.getElementById('last-run-time').textContent = 'Last run: ' + ts;
  }

  /* ================================================================
     VIEW RESULTS / VIEW SQL — opens the bottom panel on the right tab
     ================================================================ */
  function viewResults(id) {
    activeCheckId = id;
    renderChecksTable();
    showPanel(id, 'results');
  }

  function viewSQL(id) {
    activeCheckId = id;
    renderChecksTable();
    showPanel(id, 'sql');
  }

  function showPanel(id, tab) {
    var chk = checks.find(function(c) { return c.id === id; });
    if (!chk) return;

    var panel = document.getElementById('detail-panel');
    panel.classList.remove('closed');
    panel.classList.add('open');

    // Title
    document.getElementById('detail-title').textContent = '#' + id + ' ' + chk.name;

    // SQL pane — generate with current params
    var params = getParams();
    var rawSql = chk.sql(params);
    document.getElementById('sql-code-block').innerHTML = highlightSQL(rawSql);

    // Results pane
    var st = checkStates[id];
    var resultsHeader = document.getElementById('results-header');
    var resultsWrap = document.getElementById('results-wrap');

    if (!st) {
      resultsHeader.innerHTML = '';
      resultsWrap.innerHTML = '<div class="results-empty">Check has not been run yet. Click <strong>Run</strong> to execute with the current parameters.</div>';
    } else {
      var badgeClass = st.status === 'PASS' ? 'color:var(--green)' : st.status === 'WARN' ? 'color:var(--amber)' : 'color:var(--red)';
      resultsHeader.innerHTML =
        '<span style="font-weight:600;' + badgeClass + ';">' + st.status + '</span>' +
        '<span>' + st.detail + '</span>' +
        '<span style="font-family:var(--font-mono);color:var(--text-tertiary);">' + st.rows.length + ' row' + (st.rows.length !== 1 ? 's' : '') + '</span>' +
        '<span style="font-family:var(--font-mono);color:var(--text-tertiary);">' + st.duration + '</span>';

      if (st.rows.length === 0) {
        resultsWrap.innerHTML = '<div class="results-empty" style="color:var(--green);">No issues found — all records pass validation.</div>';
      } else {
        var html = '<table class="tbl"><thead><tr>';
        st.cols.forEach(function(col, ci) {
          var cls = st.colAlign[ci] === 'r' ? ' class="r"' : st.colAlign[ci] === 'c' ? ' class="c"' : '';
          html += '<th' + cls + '>' + col + '</th>';
        });
        html += '</tr></thead><tbody>';
        st.rows.forEach(function(row) {
          html += '<tr>';
          row.forEach(function(cell, ci) {
            var cls = st.colAlign[ci] === 'r' ? ' class="r font-mono"' : st.colAlign[ci] === 'c' ? ' class="c"' : '';
            var val = cell;
            if (cell === 'PASS' || cell === 'OK' || cell === 'COMPLETE' || cell === 'Valid') {
              val = '<span class="hz-badge green">' + cell + '</span>';
            } else if (cell === 'FAIL' || cell === 'MISSING' || cell === 'OUT OF TOLERANCE' || cell === 'INVERSION') {
              val = '<span class="hz-badge red">' + cell + '</span>';
            } else if (cell === 'WARN' || cell === 'Confirmed') {
              val = '<span class="hz-badge amber">' + cell + '</span>';
            }
            html += '<td' + cls + '>' + val + '</td>';
          });
          html += '</tr>';
        });
        html += '</tbody></table>';
        resultsWrap.innerHTML = html;
      }
    }

    switchTab(tab);
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /* ================================================================
     SQL SYNTAX HIGHLIGHTING
     ================================================================ */
  function highlightSQL(sql) {
    var s = sql.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    s = s.replace(/(--[^\n]*)/g, '<span class="sql-comment">$1</span>');
    s = s.replace(/'([^']*)'/g, '<span class="sql-str">\'$1\'</span>');
    s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="sql-num">$1</span>');
    var kws = ['SELECT','FROM','WHERE','AND','OR','NOT','IN','AS','ON','JOIN','LEFT','RIGHT','INNER',
      'CROSS','GROUP BY','ORDER BY','HAVING','CASE','WHEN','THEN','ELSE','END','IS','NULL','BETWEEN',
      'LIKE','EXISTS','UNION','PARTITION BY','DESC','ASC','DISTINCT','WITH'];
    kws.forEach(function(kw) {
      var re = new RegExp('\\b(' + kw.replace(/ /g, '\\s+') + ')\\b', 'gi');
      s = s.replace(re, '<span class="sql-kw">$1</span>');
    });
    var fns = ['COUNT','SUM','AVG','MIN','MAX','ABS','ROUND','LAG','LEAD','OVER','ROW_NUMBER',
      'DATEDIFF','DATEADD','CURRENT_DATE','COALESCE','ISNULL','CAST','CONVERT','GETDATE'];
    fns.forEach(function(fn) {
      var re = new RegExp('\\b(' + fn + ')\\b', 'gi');
      s = s.replace(re, '<span class="sql-fn">$1</span>');
    });
    return s;
  }

  /* ================================================================
     TAB SWITCHING
     ================================================================ */
  function switchTab(tab) {
    document.querySelectorAll('.detail-tab').forEach(function(t) {
      t.classList.toggle('active', t.getAttribute('data-tab') === tab);
    });
    document.getElementById('pane-results').classList.toggle('active', tab === 'results');
    document.getElementById('pane-sql').classList.toggle('active', tab === 'sql');
    document.getElementById('btn-copy-results').style.display = tab === 'results' ? '' : 'none';
    document.getElementById('btn-copy-sql').style.display = tab === 'sql' ? '' : 'none';
  }

  /* ================================================================
     COPY ACTIONS
     ================================================================ */
  function copySql() {
    var chk = checks.find(function(c) { return c.id === activeCheckId; });
    if (!chk) return;
    var sql = chk.sql(getParams());
    navigator.clipboard.writeText(sql).then(function() {
      showToast('SQL copied to clipboard', 'success');
    });
  }

  function copyResults() {
    var st = checkStates[activeCheckId];
    if (!st || st.rows.length === 0) {
      showToast('No results to copy', 'warning');
      return;
    }
    var lines = [st.cols.join('\t')];
    st.rows.forEach(function(row) { lines.push(row.join('\t')); });
    navigator.clipboard.writeText(lines.join('\n')).then(function() {
      showToast('Results copied (' + st.rows.length + ' rows)', 'success');
    });
  }

  function exportResults() {
    var allRows = [];
    var header = ['Check #','Check Name','Category','Status','Details','Duration'];
    allRows.push(header.join(','));
    checks.forEach(function(chk) {
      var st = checkStates[chk.id];
      if (st) {
        allRows.push([chk.id, '"' + chk.name + '"', chk.category, st.status, '"' + st.detail + '"', st.duration].join(','));
      }
    });
    if (allRows.length <= 1) {
      showToast('No results to export — run checks first', 'warning');
      return;
    }
    var blob = new Blob([allRows.join('\n')], { type: 'text/csv' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'sql-checks-' + document.getElementById('param-cob').value + '.csv';
    a.click();
    showToast('Exported ' + (allRows.length - 1) + ' check results to CSV', 'success');
  }

  /* ================================================================
     CLOSE PANEL
     ================================================================ */
  function closePanel() {
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('detail-panel').classList.add('closed');
    activeCheckId = null;
    renderChecksTable();
  }

  /* ================================================================
     SELECT ALL TOGGLE
     ================================================================ */
  function toggleSelectAll(el) {
    document.querySelectorAll('.check-row-cb').forEach(function(cb) { cb.checked = el.checked; });
  }

  /* ================================================================
     RESIZE HANDLE for detail panel
     ================================================================ */
  (function() {
    var handle = document.getElementById('detail-resize');
    var panel = document.getElementById('detail-panel');
    var startY, startH;
    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      startY = e.clientY;
      startH = panel.offsetHeight;
      document.addEventListener('mousemove', onDrag);
      document.addEventListener('mouseup', onUp);
    });
    function onDrag(e) {
      var delta = startY - e.clientY;
      var newH = Math.max(120, Math.min(window.innerHeight * 0.7, startH + delta));
      panel.style.maxHeight = newH + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onDrag);
      document.removeEventListener('mouseup', onUp);
    }
  })();

  /* ================================================================
     KEYBOARD SHORTCUTS
     ================================================================ */
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runAllChecks();
    }
    if (e.key === 'Escape') {
      closePanel();
    }
  });
</script>
