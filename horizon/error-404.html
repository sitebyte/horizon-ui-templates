<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Horizon ETRM</title>
  <link href="shell.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-canvas);
      position: relative;
      overflow: hidden;
    }
    /* Gradient accent strip at top */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 0.25rem;
      background: linear-gradient(90deg, #4f46e5, #7c3aed, #4f46e5);
      background-size: 200% 100%;
      animation: gradientShift 3s ease infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .error-container {
      text-align: center;
      max-width: 28rem;
      padding: 2rem;
      animation: fadeInUp 0.5s ease forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(1rem); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-code {
      font-family: var(--font-mono);
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .error-title {
      font-family: var(--font-ui);
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }
    .error-desc {
      font-size: var(--text-base);
      color: var(--text-muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .error-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }
    .error-btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1.5rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 0.5rem;
      color: #ffffff;
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0.25rem 1rem rgba(79, 70, 229, 0.3);
      text-decoration: none;
    }
    .error-btn-primary:hover {
      transform: translateY(-0.0625rem);
      box-shadow: 0 0.375rem 1.5rem rgba(79, 70, 229, 0.45);
    }
    .error-btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1.5rem;
      background: transparent;
      border: 0.0625rem solid var(--border);
      border-radius: 0.5rem;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      text-decoration: none;
    }
    .error-btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .error-brand {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .error-brand-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border-radius: 0.375rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
    }
    .error-brand-text {
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: var(--text-base);
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <script>
    // Apply theme
    var t = localStorage.getItem('hz-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  </script>

  <!-- Top-left brand -->
  <div class="error-brand">
    <div class="error-brand-icon">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
    </div>
    <span class="error-brand-text">Horizon</span>
  </div>

  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Page not found</h1>
    <p class="error-desc">
      The page you are looking for does not exist or has been moved.
      Check the URL or navigate back to the dashboard.
    </p>
    <div class="error-actions">
      <a href="index.html" class="error-btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
        Go to Dashboard
      </a>
      <a href="javascript:history.back()" class="error-btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Go Back
      </a>
    </div>
  </div>

<!-- Back to Index -->
<a href="../index.html" 
   style="position:fixed;bottom:1rem;right:1rem;z-index:9999;display:inline-flex;align-items:center;gap:0.375rem;padding:0.5rem 0.875rem;font-size:0.75rem;font-family:Inter,system-ui,sans-serif;border-radius:0.5rem;text-decoration:none;transition:all 0.15s;background:rgba(99,102,241,0.9);color:white;box-shadow:0 0.25rem 0.75rem rgba(0,0,0,0.2);backdrop-filter:blur(0.5rem);"
   onmouseover="this.style.background='rgba(79,70,229,1)'"
   onmouseout="this.style.background='rgba(99,102,241,0.9)'"
>&#8592; All Themes</a>

</body>
</html>
