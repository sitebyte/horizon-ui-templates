<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Horizon ETRM</title>
  <link href="shell.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 25%, #4f46e5 50%, #7c3aed 75%, #6d28d9 100%);
      position: relative;
      overflow: hidden;
    }
    /* Subtle background pattern */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.05) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(124,58,237,0.2) 0%, transparent 50%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 50rem;
      height: 50rem;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .signin-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 24rem;
      padding: 2.5rem;
      background: rgba(15, 15, 20, 0.85);
      backdrop-filter: blur(1.5rem);
      border: 0.0625rem solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      box-shadow: 0 2rem 4rem rgba(0, 0, 0, 0.4), 0 0 0 0.0625rem rgba(255,255,255,0.05) inset;
      animation: cardIn 0.5s ease forwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(1rem) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .signin-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .signin-brand-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 0.75rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      box-shadow: 0 0.25rem 1rem rgba(79, 70, 229, 0.4);
    }
    .signin-brand-text {
      font-family: var(--font-ui);
      font-size: 1.75rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
    }
    .signin-subtitle {
      text-align: center;
      font-size: var(--text-sm);
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 2rem;
      margin-top: -1.25rem;
    }

    .signin-field {
      margin-bottom: 1.25rem;
    }
    .signin-label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 0.375rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .signin-input {
      width: 100%;
      height: 2.75rem;
      padding: 0.5rem 0.75rem;
      background: rgba(255, 255, 255, 0.06);
      border: 0.0625rem solid rgba(255, 255, 255, 0.12);
      border-radius: 0.5rem;
      color: #ffffff;
      font-family: var(--font-ui);
      font-size: var(--text-base);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .signin-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 0.1875rem rgba(79, 70, 229, 0.25);
    }
    .signin-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .signin-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      font-size: var(--text-xs);
    }
    .signin-remember {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
    }
    .signin-remember input[type="checkbox"] {
      width: 0.875rem;
      height: 0.875rem;
      accent-color: var(--accent);
    }
    .signin-forgot {
      color: var(--accent-light);
      font-weight: 500;
      transition: color 0.15s;
    }
    .signin-forgot:hover { color: #818cf8; }

    .signin-btn {
      width: 100%;
      height: 2.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 0.5rem;
      color: #ffffff;
      font-family: var(--font-ui);
      font-size: var(--text-base);
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0.25rem 1rem rgba(79, 70, 229, 0.3);
    }
    .signin-btn:hover {
      transform: translateY(-0.0625rem);
      box-shadow: 0 0.375rem 1.5rem rgba(79, 70, 229, 0.45);
    }
    .signin-btn:active {
      transform: translateY(0);
    }

    .signin-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      font-size: var(--text-xs);
      color: rgba(255, 255, 255, 0.25);
    }
    .signin-divider::before, .signin-divider::after {
      content: '';
      flex: 1;
      height: 0.0625rem;
      background: rgba(255, 255, 255, 0.1);
    }

    .signin-sso {
      width: 100%;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.06);
      border: 0.0625rem solid rgba(255, 255, 255, 0.1);
      border-radius: 0.5rem;
      color: rgba(255, 255, 255, 0.7);
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .signin-sso:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .signin-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: var(--text-xs);
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

  <div class="signin-card">
    <!-- Brand -->
    <div class="signin-brand">
      <div class="signin-brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>
      </div>
      <span class="signin-brand-text">Horizon</span>
    </div>
    <p class="signin-subtitle">Energy Trading &amp; Risk Management</p>

    <!-- Form -->
    <form onsubmit="event.preventDefault(); window.location.href='index.html';">
      <div class="signin-field">
        <label class="signin-label" for="email">Email</label>
        <input type="email" id="email" class="signin-input" placeholder="you@company.com" autocomplete="email" autofocus />
      </div>
      <div class="signin-field">
        <label class="signin-label" for="password">Password</label>
        <input type="password" id="password" class="signin-input" placeholder="Enter your password" autocomplete="current-password" />
      </div>

      <div class="signin-options">
        <label class="signin-remember">
          <input type="checkbox" checked />
          Remember me
        </label>
        <a href="#" class="signin-forgot">Forgot password?</a>
      </div>

      <button type="submit" class="signin-btn">Sign In</button>

      <div class="signin-divider">or continue with</div>

      <button type="button" class="signin-sso" onclick="window.location.href='index.html';">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Corporate SSO
      </button>
    </form>

    <p class="signin-footer">&copy; 2026 Horizon ETRM. All rights reserved.</p>
  </div>


<!-- Back to Index -->
<a href="../index.html" 
   style="position:fixed;bottom:1rem;right:1rem;z-index:9999;display:inline-flex;align-items:center;gap:0.375rem;padding:0.5rem 0.875rem;font-size:0.75rem;font-family:Inter,system-ui,sans-serif;border-radius:0.5rem;text-decoration:none;transition:all 0.15s;background:rgba(99,102,241,0.9);color:white;box-shadow:0 0.25rem 0.75rem rgba(0,0,0,0.2);backdrop-filter:blur(0.5rem);"
   onmouseover="this.style.background='rgba(79,70,229,1)'"
   onmouseout="this.style.background='rgba(99,102,241,0.9)'"
>&#8592; All Themes</a>

</body>
</html>
