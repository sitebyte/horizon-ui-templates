<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Horizon ETRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
            violet: { 400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9' },
          }
        }
      }
    };
  </script>
</head>
<body class="h-full font-sans antialiased bg-slate-50 dark:bg-slate-900 flex items-center justify-center">
  <div class="text-center px-6">
    <p class="text-8xl font-bold bg-gradient-to-r from-primary-500 to-violet-500 bg-clip-text text-transparent">404</p>
    <h1 class="mt-4 text-2xl font-bold text-slate-900 dark:text-white">Page not found</h1>
    <p class="mt-2 text-slate-500 dark:text-slate-400 max-w-sm mx-auto">The page you're looking for doesn't exist or has been moved to a different location.</p>
    <div class="mt-8 flex items-center justify-center gap-3">
      <a href="index.html" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg bg-gradient-to-r from-primary-600 to-violet-600 text-white font-medium text-sm hover:from-primary-500 hover:to-violet-500 transition shadow-lg shadow-primary-900/20">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back to Dashboard
      </a>
      <a href="signin.html" class="inline-flex items-center px-5 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 font-medium text-sm hover:bg-slate-100 dark:hover:bg-slate-800 transition">
        Sign In
      </a>
    </div>
  </div>
  <script>
    if (localStorage.getItem('horizon-theme') === 'dark') document.documentElement.classList.add('dark');
  </script>
</body>
</html>
