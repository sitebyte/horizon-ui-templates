<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Horizon ETRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
            violet: { 400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9' },
          }
        }
      }
    };
  </script>
  <style>
    .glass { background: rgba(255,255,255,0.12); backdrop-filter: blur(1.25rem); -webkit-backdrop-filter: blur(1.25rem); border: 0.0625rem solid rgba(255,255,255,0.18); }
    .dark .glass { background: rgba(15,23,42,0.6); border-color: rgba(255,255,255,0.08); }
  </style>
</head>
<body class="h-full font-sans antialiased bg-gradient-to-br from-primary-600 via-primary-700 to-violet-700">
  <div class="min-h-full flex items-center justify-center p-4">
    <div class="glass rounded-2xl w-full max-w-md p-10">
      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-white/20 mb-4">
          <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Horizon ETRM</h1>
        <p class="text-sm text-white/60 mt-1">Energy Trading & Risk Management</p>
      </div>

      <!-- Form -->
      <form onsubmit="event.preventDefault(); window.location.href='index.html';" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-white/80 mb-1.5">Email</label>
          <input type="email" value="trader@horizon.energy" class="w-full rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/40 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-white/40 transition" placeholder="you@company.com" />
        </div>
        <div>
          <label class="block text-sm font-medium text-white/80 mb-1.5">Password</label>
          <input type="password" value="password123" class="w-full rounded-lg bg-white/10 border border-white/20 text-white placeholder-white/40 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-white/40 transition" placeholder="••••••••" />
        </div>
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 text-white/70 cursor-pointer">
            <input type="checkbox" checked class="rounded border-white/30 bg-white/10 text-primary-500 focus:ring-primary-500" />
            Remember me
          </label>
          <a href="#" class="text-white/70 hover:text-white transition">Forgot password?</a>
        </div>
        <button type="submit" class="w-full py-2.5 rounded-lg bg-gradient-to-r from-primary-500 to-violet-500 text-white font-semibold text-sm hover:from-primary-400 hover:to-violet-400 transition shadow-lg shadow-primary-900/40 focus:outline-none focus:ring-2 focus:ring-white/40">
          Sign In
        </button>
      </form>

      <p class="text-center text-white/40 text-xs mt-8">&copy; 2026 Horizon Energy. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
