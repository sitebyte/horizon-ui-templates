<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Horizon Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif']},colors:{accent:'#2563eb','accent-hover':'#1d4ed8'}}}}
</script>
<style>
  *,*::before,*::after{box-sizing:border-box}body{font-family:'Inter',sans-serif}
</style>
</head>
<body class="bg-slate-50 dark:bg-zinc-900 min-h-screen flex flex-col">

<!-- Theme Toggle -->
<div class="fixed top-4 right-4 z-50">
  <button onclick="toggleTheme()" class="p-2 rounded-lg bg-white dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 shadow-sm hover:bg-slate-100 dark:hover:bg-zinc-700 transition-colors" title="Toggle theme">
    <svg class="w-5 h-5 hidden dark:block text-zinc-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
    <svg class="w-5 h-5 block dark:hidden text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
  </button>
</div>

<!-- Content -->
<div class="flex-1 flex items-center justify-center p-6">
  <div class="text-center">
    <p class="text-9xl font-bold text-accent leading-none">404</p>
    <h1 class="text-2xl font-bold text-slate-800 dark:text-zinc-100 mt-4">Page not found</h1>
    <p class="text-sm text-slate-500 dark:text-zinc-400 mt-2 max-w-sm mx-auto">The page you are looking for does not exist or has been moved. Check the URL or navigate back to the dashboard.</p>
    <div class="mt-8 flex items-center justify-center gap-3">
      <a href="index.html" class="px-5 py-2.5 rounded-lg text-sm font-semibold bg-accent text-white hover:bg-accent-hover transition-colors inline-flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Go to Dashboard
      </a>
      <button onclick="history.back()" class="px-5 py-2.5 rounded-lg text-sm font-medium border border-slate-300 dark:border-zinc-600 text-slate-600 dark:text-zinc-300 hover:bg-slate-100 dark:hover:bg-zinc-700 transition-colors">Go Back</button>
    </div>
    <div class="mt-12">
      <div class="w-12 h-12 rounded-xl bg-accent/10 flex items-center justify-center mx-auto">
        <svg class="w-6 h-6 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      </div>
      <p class="text-xs text-slate-400 dark:text-zinc-500 mt-2">Horizon Back Office</p>
    </div>
  </div>
</div>

<script>
function initTheme(){const t=localStorage.getItem('horizon-theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.classList.add('dark');document.documentElement.classList.remove('light')}}
function toggleTheme(){document.documentElement.classList.toggle('dark');document.documentElement.classList.toggle('light');localStorage.setItem('horizon-theme',document.documentElement.classList.contains('dark')?'dark':'light')}
initTheme();
</script>

</body>
