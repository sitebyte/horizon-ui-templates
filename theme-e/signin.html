<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Horizon Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif']},colors:{accent:'#2563eb','accent-hover':'#1d4ed8'}}}}
</script>
<style>
  *,*::before,*::after{box-sizing:border-box}body{font-family:'Inter',sans-serif}
</style>
</head>
<body class="bg-slate-50 dark:bg-zinc-900 min-h-screen flex flex-col">

<!-- Theme Toggle -->
<div class="fixed top-4 right-4 z-50">
  <button onclick="toggleTheme()" class="p-2 rounded-lg bg-white dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 shadow-sm hover:bg-slate-100 dark:hover:bg-zinc-700 transition-colors" title="Toggle theme">
    <svg class="w-5 h-5 hidden dark:block text-zinc-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
    <svg class="w-5 h-5 block dark:hidden text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
  </button>
</div>

<!-- Content -->
<div class="flex-1 flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-zinc-800 rounded-xl shadow-lg border border-slate-200 dark:border-zinc-700 p-8">
      <!-- Logo -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-12 h-12 rounded-xl bg-accent flex items-center justify-center mb-4">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        </div>
        <h1 class="text-xl font-bold text-slate-800 dark:text-zinc-100">Horizon</h1>
        <p class="text-sm text-slate-500 dark:text-zinc-400 mt-1">Sign in to your account</p>
      </div>

      <!-- Form -->
      <form onsubmit="event.preventDefault();window.location.href='index.html'" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-zinc-400 mb-1.5">Email</label>
          <input type="email" placeholder="you@company.com" value="j.cobley@horizon-lng.com" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-zinc-600 bg-white dark:bg-zinc-700 text-sm text-slate-800 dark:text-zinc-100 focus:ring-2 focus:ring-accent/30 focus:border-accent outline-none placeholder:text-slate-400 dark:placeholder:text-zinc-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-zinc-400 mb-1.5">Password</label>
          <input type="password" placeholder="Enter your password" value="password123" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-zinc-600 bg-white dark:bg-zinc-700 text-sm text-slate-800 dark:text-zinc-100 focus:ring-2 focus:ring-accent/30 focus:border-accent outline-none placeholder:text-slate-400 dark:placeholder:text-zinc-500">
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked class="w-4 h-4 rounded border-slate-300 dark:border-zinc-600 accent-accent">
            <span class="text-sm text-slate-600 dark:text-zinc-400">Remember me</span>
          </label>
          <a href="#" class="text-sm text-accent hover:text-accent-hover font-medium">Forgot password?</a>
        </div>

        <button type="submit" class="w-full py-2.5 rounded-lg text-sm font-semibold bg-accent text-white hover:bg-accent-hover transition-colors">Sign In</button>
      </form>

      <div class="mt-6 pt-6 border-t border-slate-200 dark:border-zinc-700 text-center">
        <p class="text-xs text-slate-400 dark:text-zinc-500">Horizon Back Office v2.4.0</p>
        <p class="text-xs text-slate-400 dark:text-zinc-500 mt-1">Protected by enterprise-grade security</p>
      </div>
    </div>
  </div>
</div>

<script>
function initTheme(){const t=localStorage.getItem('horizon-theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.classList.add('dark');document.documentElement.classList.remove('light')}}
function toggleTheme(){document.documentElement.classList.toggle('dark');document.documentElement.classList.toggle('light');localStorage.setItem('horizon-theme',document.documentElement.classList.contains('dark')?'dark':'light')}
initTheme();
</script>
<!-- Back to Index --><a href="../index.html" style="position:fixed;bottom:1rem;right:1rem;z-index:9999;display:inline-flex;align-items:center;gap:0.375rem;padding:0.375rem 0.75rem;font-size:0.75rem;font-family:Inter,system-ui,sans-serif;border-radius:0.5rem;text-decoration:none;transition:all 0.15s;background:rgba(99,102,241,0.9);color:white;box-shadow:0 0.25rem 0.75rem rgba(0,0,0,0.2);backdrop-filter:blur(0.5rem);" onmouseover="this.style.background='rgba(79,70,229,1)'" onmouseout="this.style.background='rgba(99,102,241,0.9)'"></body>#8592; All Themes</a>
</body>
</html>
