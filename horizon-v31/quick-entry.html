<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Entry — Horizon ETRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:["selector","[data-theme=\"dark\"]"],theme:{extend:{fontFamily:{sans:["Inter","sans-serif"],mono:["JetBrains Mono","monospace"]}}}}</script>
  <link href="shell.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-quartz.css" />
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
</head>
<body>
<div id="hz-app">

  <!-- Compact Entry Strip — no card wrapper, tight padding -->
  <div style="padding:0.375rem 0.5rem;border-bottom:0.0625rem solid var(--border);background:var(--card-bg);flex-shrink:0;" class="fade-in">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.25rem;">
      <div style="font-size:0.6875rem;font-weight:600;color:var(--text-primary);">Quick Trade Entry</div>
      <div class="flex items-center gap-2">
        <span class="hz-key-hint">B</span><span class="text-xs" style="color:var(--text-muted);">Buy</span>
        <span class="hz-key-hint">S</span><span class="text-xs" style="color:var(--text-muted);">Sell</span>
        <span class="hz-key-hint">Tab</span><span class="text-xs" style="color:var(--text-muted);">Next</span>
        <span class="hz-key-hint">Enter</span><span class="text-xs" style="color:var(--text-muted);">Submit</span>
      </div>
    </div>

    <div class="flex flex-wrap items-end gap-2" id="entry-form">
      <!-- Direction -->
      <div style="min-width:5.5rem;">
        <label class="hz-label" style="font-size:0.5rem;margin-bottom:0.125rem;">Direction</label>
        <div class="flex gap-1">
          <button id="btn-buy" class="hz-btn sm flex-1" onclick="setDirection('BUY')" style="background:var(--green);border-color:var(--green);color:#fff;height:1.5rem;font-size:0.625rem;">BUY</button>
          <button id="btn-sell" class="hz-btn sm flex-1" onclick="setDirection('SELL')" style="height:1.5rem;font-size:0.625rem;">SELL</button>
        </div>
      </div>

      <!-- Counterparty -->
      <div style="min-width:9rem;flex:1;max-width:12rem;">
        <label class="hz-label" style="font-size:0.5rem;margin-bottom:0.125rem;">Counterparty</label>
        <div class="hz-combobox" id="counterparty-combo">
          <input class="hz-combobox-input" placeholder="Search..." tabindex="1" style="height:1.5rem;font-size:0.6875rem;" />
          <div class="hz-combobox-dropdown"></div>
          <div class="hz-combobox-context" style="display:none;"></div>
        </div>
      </div>

      <!-- Volume -->
      <div style="min-width:7rem;">
        <label class="hz-label" style="font-size:0.5rem;margin-bottom:0.125rem;">Volume (MMBtu)</label>
        <input type="text" class="hz-input font-mono" id="entry-volume" placeholder="3,200,000" tabindex="2" style="height:1.5rem;font-size:0.6875rem;" />
      </div>

      <!-- Index -->
      <div style="min-width:5rem;">
        <label class="hz-label" style="font-size:0.5rem;margin-bottom:0.125rem;">Index</label>
        <select class="hz-input" id="entry-index" tabindex="3" style="height:1.5rem;font-size:0.6875rem;">
          <option>JKM</option>
          <option>TTF</option>
          <option>HH</option>
          <option>Brent</option>
        </select>
      </div>

      <!-- Premium -->
      <div style="min-width:5.5rem;">
        <label class="hz-label" style="font-size:0.5rem;margin-bottom:0.125rem;">Premium</label>
        <input type="text" class="hz-input font-mono" id="entry-premium" placeholder="+0.50" tabindex="4" style="height:1.5rem;font-size:0.6875rem;" />
      </div>

      <!-- Delivery -->
      <div style="min-width:5rem;">
        <label class="hz-label" style="font-size:0.5rem;margin-bottom:0.125rem;">Delivery</label>
        <select class="hz-input" id="entry-delivery" tabindex="5" style="height:1.5rem;font-size:0.6875rem;">
          <option>Jun-26</option>
          <option>Jul-26</option>
          <option>Aug-26</option>
          <option>Sep-26</option>
          <option>Oct-26</option>
          <option>Q3-26</option>
          <option>Q4-26</option>
        </select>
      </div>

      <!-- Terms -->
      <div style="min-width:4rem;">
        <label class="hz-label" style="font-size:0.5rem;margin-bottom:0.125rem;">Terms</label>
        <select class="hz-input" id="entry-terms" tabindex="6" style="height:1.5rem;font-size:0.6875rem;">
          <option>FOB</option>
          <option>DES</option>
          <option>CIF</option>
          <option>DAP</option>
        </select>
      </div>

      <!-- Submit + inline position impact -->
      <div class="flex gap-2 items-end">
        <button class="hz-btn primary sm" id="btn-submit" onclick="submitEntry()" tabindex="7" style="height:1.5rem;font-size:0.625rem;white-space:nowrap;">
          Enter Trade
        </button>
        <div style="font-size:0.5rem;color:var(--text-muted);display:flex;flex-direction:column;align-items:flex-end;line-height:1.3;">
          <span>After: <strong class="font-mono pnl-positive">+9.6M JKM</strong></span>
          <span>Limit: <strong class="font-mono" style="color:var(--amber);">96%</strong></span>
        </div>
      </div>
    </div>

    <!-- Confirmation Bar (hidden by default) -->
    <div id="confirm-bar" class="hz-confirm-bar" style="display:none;margin-top:0.25rem;padding:0.25rem 0.5rem;">
      <div style="color:var(--accent-light);flex-shrink:0;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <span class="hz-confirm-text" id="confirm-text"></span>
      <div class="flex gap-2 shrink-0">
        <button class="hz-btn sm primary" onclick="confirmEntry()" style="height:1.5rem;">
          <span class="hz-key-hint" style="background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.3);color:#fff;">Enter</span>
          Confirm
        </button>
        <button class="hz-btn sm" onclick="cancelEntry()" style="height:1.5rem;">
          <span class="hz-key-hint">Esc</span>
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- AG Grid Blotter — no card wrapper, fills viewport -->
  <div class="fade-in-d1" style="flex:1;display:flex;flex-direction:column;min-height:0;padding:0.25rem 0.5rem 0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.25rem;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <span style="font-size:0.6875rem;font-weight:600;color:var(--text-primary);">Trade Blotter</span>
        <span style="font-size:0.5625rem;color:var(--text-muted);">Today's trades with live P&amp;L</span>
      </div>
      <div class="flex gap-2 items-center">
        <span class="hz-inline-kpi">Trades <span class="kpi-val" id="trade-count">8</span></span>
        <span class="hz-inline-kpi">Net P&L <span class="kpi-val pnl-positive" id="net-pnl">+$2.3M</span></span>
        <button class="hz-btn sm" style="height:1.5rem;font-size:0.625rem;">Export CSV</button>
      </div>
    </div>
    <div id="trade-grid" class="ag-theme-quartz-dark ag-compact" style="width:100%;flex:1;min-height:0;"></div>
  </div>

</div>

<script src="shell.js"></script>
<script>
  initShell('quick-entry', 'Quick Entry');

  // ---- Trade state ----
  var direction = 'BUY';
  var pendingTrade = null;
  var tradeIdCounter = 1;

  var BLOTTER_DATA = [
    { id: 'BUY-2026-0502-A3F', dir: 'BUY', cpty: 'Shell Trading', vol: 3200000, index: 'JKM', prem: 0.50, delivery: 'Jun-26', terms: 'DES', price: 14.75, mtm: 340000, pnl: 208000, status: 'Confirmed', time: '09:42' },
    { id: 'SELL-2026-0502-B7C', dir: 'SELL', cpty: 'TotalEnergies', vol: 1600000, index: 'JKM', prem: 0.25, delivery: 'Jul-26', terms: 'FOB', price: 14.10, mtm: -85000, pnl: -42000, status: 'Confirmed', time: '10:15' },
    { id: 'BUY-2026-0502-D2E', dir: 'BUY', cpty: 'BP Gas Marketing', vol: 4800000, index: 'TTF', prem: -0.10, delivery: 'Sep-26', terms: 'DES', price: 12.70, mtm: 520000, pnl: 1600000, status: 'Pending', time: '11:30' },
    { id: 'SELL-2026-0502-E4G', dir: 'SELL', cpty: 'JERA Co.', vol: 2800000, index: 'JKM', prem: 0.35, delivery: 'Aug-26', terms: 'DES', price: 15.10, mtm: 280000, pnl: 420000, status: 'Confirmed', time: '11:48' },
    { id: 'BUY-2026-0502-F1H', dir: 'BUY', cpty: 'QatarEnergy', vol: 3200000, index: 'JKM', prem: -0.20, delivery: 'Jun-26', terms: 'FOB', price: 14.10, mtm: 450000, pnl: 380000, status: 'Confirmed', time: '12:05' },
    { id: 'SELL-2026-0502-G8J', dir: 'SELL', cpty: 'Chevron', vol: 2400000, index: 'HH', prem: 0.15, delivery: 'Oct-26', terms: 'FOB', price: 3.55, mtm: -62000, pnl: -28000, status: 'Pending', time: '13:22' },
    { id: 'BUY-2026-0502-H5K', dir: 'BUY', cpty: 'Equinor', vol: 1600000, index: 'TTF', prem: 0.08, delivery: 'Aug-26', terms: 'DES', price: 12.78, mtm: 195000, pnl: 44000, status: 'Confirmed', time: '14:10' },
    { id: 'BUY-2026-0502-J9L', dir: 'BUY', cpty: 'Cheniere', vol: 5000000, index: 'HH', prem: -0.05, delivery: 'Jul-26', terms: 'FOB', price: 3.38, mtm: 310000, pnl: 200000, status: 'Confirmed', time: '14:45' },
  ];

  // ---- Direction toggle ----
  function setDirection(dir) {
    direction = dir;
    var buyBtn = document.getElementById('btn-buy');
    var sellBtn = document.getElementById('btn-sell');
    if (dir === 'BUY') {
      buyBtn.style.cssText = 'background:var(--green);border-color:var(--green);color:#fff;height:1.5rem;font-size:0.625rem;';
      sellBtn.style.cssText = 'height:1.5rem;font-size:0.625rem;';
    } else {
      sellBtn.style.cssText = 'background:var(--red);border-color:var(--red);color:#fff;height:1.5rem;font-size:0.625rem;';
      buyBtn.style.cssText = 'height:1.5rem;font-size:0.625rem;';
    }
  }

  // ---- B/S keyboard shortcut ----
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    if (document.getElementById('hz-cmdk-overlay').style.display !== 'none') return;

    if (e.key === 'b' || e.key === 'B') { setDirection('BUY'); }
    if (e.key === 's' || e.key === 'S') { setDirection('SELL'); }
  });

  // ---- Counterparty combobox ----
  setTimeout(function() {
    var combo = document.getElementById('counterparty-combo');
    if (combo) {
      initCombobox(combo, [
        { label: 'Shell Trading', value: 'shell', context: 'Shell Energy Trading — UK — Credit: $22M headroom' },
        { label: 'TotalEnergies', value: 'total', context: 'TotalEnergies Gas & Power — FR — Credit: $18M headroom' },
        { label: 'BP Gas Marketing', value: 'bp', context: 'BP Gas Marketing Ltd — UK — Credit: $31M headroom' },
        { label: 'Chevron', value: 'chevron', context: 'Chevron Natural Gas — US — Credit: $45M headroom' },
        { label: 'Equinor', value: 'equinor', context: 'Equinor ASA — NO — Credit: $28M headroom' },
        { label: 'Gunvor', value: 'gunvor', context: 'Gunvor Group — CH — Credit: $15M headroom' },
        { label: 'Vitol', value: 'vitol', context: 'Vitol SA — CH — Credit: $20M headroom' },
        { label: 'Trafigura', value: 'trafigura', context: 'Trafigura Pte Ltd — SG — Credit: $12M headroom' },
        { label: "Woodside O'Brien", value: 'woodside', context: 'Woodside Energy — AU — Credit: $35M headroom' },
      ]);
    }
  }, 600);

  // ---- Submit / Confirm flow ----
  function submitEntry() {
    var vol = document.getElementById('entry-volume').value;
    var idx = document.getElementById('entry-index').value;
    var prem = document.getElementById('entry-premium').value;
    var delivery = document.getElementById('entry-delivery').value;
    var terms = document.getElementById('entry-terms').value;
    var combo = document.getElementById('counterparty-combo');
    var cpty = combo && combo.combobox ? combo.combobox.getValue() : '';

    if (!vol) {
      showToast('Please enter a volume', 'error');
      document.getElementById('entry-volume').focus();
      return;
    }

    pendingTrade = {
      dir: direction,
      cpty: cpty || 'Unknown',
      vol: vol.replace(/,/g, ''),
      index: idx,
      prem: prem || '0',
      delivery: delivery,
      terms: terms
    };

    var confirmBar = document.getElementById('confirm-bar');
    var confirmText = document.getElementById('confirm-text');
    confirmText.textContent = direction + ' ' + vol + ' MMBtu ' + idx + (prem ? '+' + prem : '') + ' ' + terms + ' ' + delivery + ' from ' + (cpty || 'Unknown');
    confirmBar.style.display = '';
    document.getElementById('entry-form').style.opacity = '0.5';
    document.getElementById('entry-form').style.pointerEvents = 'none';
  }

  function confirmEntry() {
    if (!pendingTrade) return;

    var newId = pendingTrade.dir + '-2026-0502-' + String.fromCharCode(65 + tradeIdCounter) + tradeIdCounter + 'F';
    tradeIdCounter++;

    var newTrade = {
      id: newId,
      dir: pendingTrade.dir,
      cpty: pendingTrade.cpty,
      vol: parseInt(pendingTrade.vol) || 0,
      index: pendingTrade.index,
      prem: parseFloat(pendingTrade.prem) || 0,
      delivery: pendingTrade.delivery,
      terms: pendingTrade.terms,
      price: pendingTrade.index === 'JKM' ? 14.75 : pendingTrade.index === 'TTF' ? 12.90 : 3.42,
      mtm: Math.round((Math.random() - 0.3) * 500000),
      pnl: Math.round((Math.random() - 0.3) * 300000),
      status: 'Confirmed',
      time: new Date().toTimeString().slice(0, 5)
    };

    BLOTTER_DATA.unshift(newTrade);
    if (gridApi) gridApi.setGridOption('rowData', BLOTTER_DATA);

    cancelEntry();
    showToast('Trade ' + newId + ' committed', 'success', function() {
      BLOTTER_DATA.shift();
      if (gridApi) gridApi.setGridOption('rowData', BLOTTER_DATA);
      showToast('Trade undone', 'warning');
    });
  }

  function cancelEntry() {
    pendingTrade = null;
    document.getElementById('confirm-bar').style.display = 'none';
    document.getElementById('entry-form').style.opacity = '';
    document.getElementById('entry-form').style.pointerEvents = '';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && pendingTrade) {
      e.preventDefault();
      confirmEntry();
      return;
    }
    if (e.key === 'Escape' && pendingTrade) {
      e.preventDefault();
      cancelEntry();
      return;
    }
  });

  // ---- AG Grid Setup ----
  var gridApi = null;

  setTimeout(function() {
    var gridDiv = document.getElementById('trade-grid');
    if (!gridDiv || typeof agGrid === 'undefined') return;

    gridDiv.className = getAgTheme() + ' ag-compact';

    var columnDefs = [
      { field: 'id', headerName: 'Trade ID', width: 180, pinned: 'left',
        cellRenderer: function(p) {
          if (!p.value) return '';
          return '<a href="lifecycle.html" class="hz-entity-link">' + p.value + '</a>';
        }
      },
      { field: 'time', headerName: 'Time', width: 65 },
      {
        field: 'dir', headerName: 'B/S', width: 55,
        cellRenderer: function(p) {
          if (!p.value) return '';
          if (p.value === 'BUY') return '<span style="display:inline-flex;align-items:center;justify-content:center;width:1.25rem;height:1rem;border-radius:0.1875rem;font-size:0.5625rem;font-weight:700;background:var(--green-dim);color:var(--green);">B</span>';
          return '<span style="display:inline-flex;align-items:center;justify-content:center;width:1.25rem;height:1rem;border-radius:0.1875rem;font-size:0.5625rem;font-weight:700;background:var(--red-dim);color:var(--red);">S</span>';
        }
      },
      { field: 'cpty', headerName: 'Counterparty', width: 140 },
      { field: 'vol', headerName: 'Volume', width: 110, valueFormatter: numberFormatter, cellStyle: { fontFamily: 'var(--font-mono)' } },
      { field: 'index', headerName: 'Index', width: 70 },
      {
        field: 'prem', headerName: 'Premium', width: 85,
        valueFormatter: function(p) {
          if (p.value == null) return '';
          return (p.value >= 0 ? '+' : '') + p.value.toFixed(2);
        },
        cellStyle: { fontFamily: 'var(--font-mono)' }
      },
      { field: 'delivery', headerName: 'Delivery', width: 80 },
      { field: 'terms', headerName: 'Terms', width: 60 },
      {
        field: 'price', headerName: 'Price', width: 85,
        valueFormatter: function(p) { return p.value != null ? '$' + p.value.toFixed(2) : ''; },
        cellStyle: { fontFamily: 'var(--font-mono)' }
      },
      { field: 'mtm', headerName: 'MTM', width: 100, valueFormatter: pnlFormatter, cellStyle: pnlCellStyle },
      { field: 'pnl', headerName: 'P&L', width: 100, valueFormatter: pnlFormatter, cellStyle: pnlCellStyle },
      {
        field: 'status', headerName: 'Status', width: 100,
        cellRenderer: function(p) {
          if (!p.value) return '';
          var cls = p.value === 'Confirmed' ? 'green' : p.value === 'Pending' ? 'amber' : 'neutral';
          return '<span class="hz-badge ' + cls + '">' + p.value + '</span>';
        }
      },
    ];

    var gridOptions = {
      columnDefs: columnDefs,
      rowData: BLOTTER_DATA,
      defaultColDef: {
        sortable: true,
        resizable: true,
        suppressMovable: true,
      },
      getRowId: function(params) { return params.data.id; },
      animateRows: true,
      rowSelection: 'single',
      headerHeight: 28,
      rowHeight: 24,
    };

    gridApi = agGrid.createGrid(gridDiv, gridOptions);
  }, 100);
</script>

</body>
</html>
