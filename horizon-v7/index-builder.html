<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Index Builder — Horizon ETRM</title>
  <link href="shell.css" rel="stylesheet" />
  <style>
    /* ===== 2-Column Layout ===== */
    .ib-layout {
      display: grid;
      grid-template-columns: 22rem 1fr;
      gap: var(--sp-3);
      flex: 1;
      min-height: 0;
    }
    @media (max-width: 64rem) {
      .ib-layout { grid-template-columns: 1fr; }
    }

    /* ===== Index List (left) ===== */
    .ib-list {
      background: var(--card-bg);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .ib-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-2) var(--sp-3);
      border-bottom: 0.0625rem solid var(--border);
      flex-shrink: 0;
    }
    .ib-list-title {
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--text-primary);
    }
    .ib-list-count {
      font-size: var(--text-xs);
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .ib-list-search {
      padding: var(--sp-2) var(--sp-3);
      border-bottom: 0.0625rem solid var(--border);
      flex-shrink: 0;
    }
    .ib-list-items {
      flex: 1;
      overflow-y: auto;
    }
    .ib-item {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
      padding: var(--sp-2) var(--sp-3);
      border-bottom: 0.0625rem solid var(--border-subtle);
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    .ib-item:hover { background: var(--hover); }
    .ib-item.active {
      background: var(--accent-bg);
      border-left: 0.1875rem solid var(--accent);
    }
    .ib-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-2);
    }
    .ib-item-name {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .ib-item-status {
      flex-shrink: 0;
    }
    .ib-item-meta {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-xs);
      color: var(--text-muted);
    }

    /* ===== Detail Panel (right) ===== */
    .ib-detail {
      background: var(--card-bg);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-y: auto;
    }
    .ib-detail-header {
      padding: var(--sp-3) var(--sp-4);
      border-bottom: 0.0625rem solid var(--border);
      flex-shrink: 0;
    }
    .ib-detail-name {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--sp-1);
    }
    .ib-detail-desc {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
    }
    .ib-detail-body {
      padding: var(--sp-3) var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }

    /* ===== Property Grid ===== */
    .ib-props {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-2) var(--sp-4);
    }
    @media (max-width: 48rem) {
      .ib-props { grid-template-columns: 1fr; }
    }
    .ib-prop {
      display: flex;
      flex-direction: column;
      gap: 0.0625rem;
    }
    .ib-prop-label {
      font-size: 0.5625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .ib-prop-value {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-primary);
    }

    /* ===== Signature Section ===== */
    .ib-sig-section {
      background: var(--surface-raised);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .ib-sig-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-2) var(--sp-3);
      border-bottom: 0.0625rem solid var(--border);
      background: var(--surface-base);
    }
    .ib-sig-title {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .ib-sig-body {
      padding: var(--sp-3);
    }
    .ib-sig-params {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--sp-2) var(--sp-3);
    }
    @media (max-width: 48rem) {
      .ib-sig-params { grid-template-columns: 1fr 1fr; }
    }

    /* ===== Formula Preview ===== */
    .ib-formula {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--accent-light);
      padding: var(--sp-3);
      background: var(--surface-base);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      line-height: 1.6;
      word-break: break-all;
    }

    /* ===== Test Section ===== */
    .ib-test {
      background: var(--surface-raised);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--sp-3);
    }
    .ib-test-title {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: var(--sp-3);
    }
    .ib-test-form {
      display: flex;
      align-items: flex-end;
      gap: var(--sp-3);
      flex-wrap: wrap;
    }
    .ib-test-group {
      display: flex;
      flex-direction: column;
      gap: var(--sp-1);
    }
    .ib-test-result {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-2) var(--sp-3);
      background: var(--surface-base);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      margin-top: var(--sp-3);
      font-family: var(--font-mono);
      font-size: var(--text-sm);
    }
    .ib-test-result-label {
      font-family: var(--font-ui);
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .ib-test-result-value {
      font-weight: 700;
      font-size: var(--text-lg);
      color: var(--green);
    }
  </style>
</head>
<body>
<div id="hz-app">

  <div class="ib-layout">

    <!-- ===== Left: Index List ===== -->
    <div class="ib-list">
      <div class="ib-list-header">
        <span class="ib-list-title">Price Indices</span>
        <span class="ib-list-count">8 indices</span>
      </div>
      <div class="ib-list-search">
        <input type="text" class="hz-input" placeholder="Filter indices..." id="ib-search" oninput="filterIndices()" style="height:1.75rem; font-size:var(--text-xs);" />
      </div>
      <div class="ib-list-items" id="ib-list-items">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- ===== Right: Detail Panel ===== -->
    <div class="ib-detail" id="ib-detail">
      <!-- Populated by JS -->
    </div>

  </div>

</div>

<script src="shell.js"></script>
<script>
initShell('index-builder', 'Index Builder');

/* ========== INDEX DATA ========== */
var indices = [
  {
    id: 'IDX-001',
    name: 'SGP_Platts JKM Month Ahead',
    description: 'Platts JKM LNG marker — front month assessment for DES Northeast Asia cargoes.',
    signatureType: 'MonthlySpot',
    status: 'Active',
    priceUnits: '$/MMBtu',
    observationType: 'Daily Settlement',
    decimalPlaces: 4,
    signature: {
      settlementCurve: 'Platts JKM',
      forwardCurve: 'JKM Forward',
      averagingPeriod: 'M-1 (Month Ahead)',
      lag: '0 business days',
      weighting: 'Equal'
    },
    formula: 'Avg(Platts_JKM_Settlement[M-1], BusinessDays)'
  },
  {
    id: 'IDX-002',
    name: 'SGP_ICE Brent Dated',
    description: 'ICE Brent Crude dated marker — absolute spot price for oil-indexed LNG contracts.',
    signatureType: 'AbsoluteSpot',
    status: 'Active',
    priceUnits: '$/bbl',
    observationType: 'Daily Close',
    decimalPlaces: 2,
    signature: {
      settlementCurve: 'ICE Brent Dated',
      forwardCurve: 'Brent Forward',
      averagingPeriod: 'Spot (T+0)',
      lag: '0 business days',
      weighting: 'N/A'
    },
    formula: 'ICE_Brent_Settlement[T+0]'
  },
  {
    id: 'IDX-003',
    name: 'SGP_Ave_ICE TTF FMA x 0.293071 x EURUSD',
    description: 'TTF front month average converted from EUR/MWh to $/MMBtu via thermal factor and FX.',
    signatureType: 'StandardProductWithFX',
    status: 'Active',
    priceUnits: '$/MMBtu',
    observationType: 'Monthly Average',
    decimalPlaces: 4,
    signature: {
      settlementCurve: 'ICE TTF Settlement',
      forwardCurve: 'TTF Forward',
      averagingPeriod: 'M-1 (Month Ahead)',
      lag: '2 business days',
      weighting: 'Equal'
    },
    formula: 'Avg(ICE_TTF[M-1], BusDays) * 0.293071 * EURUSD_Fix[T-2]'
  },
  {
    id: 'IDX-004',
    name: 'SGP (3,2,1) JCC Index',
    description: 'Japan Customs-cleared Crude (JCC) — 3-month trailing average with 2-month lag, calendar product.',
    signatureType: 'CalendarProduct',
    status: 'Active',
    priceUnits: '$/bbl',
    observationType: 'Monthly Publication',
    decimalPlaces: 2,
    signature: {
      settlementCurve: 'JCC Monthly',
      forwardCurve: 'JCC Forward',
      averagingPeriod: '3-month trailing',
      lag: '2 months',
      weighting: 'Equal (3M)'
    },
    formula: 'Avg(JCC_Monthly[M-3..M-1]) / 3'
  },
  {
    id: 'IDX-005',
    name: 'SGP_HH NYMEX Settlement',
    description: 'NYMEX Henry Hub Natural Gas front-month settlement for US-indexed cargo pricing.',
    signatureType: 'MonthlySpot',
    status: 'Active',
    priceUnits: '$/MMBtu',
    observationType: 'Daily Settlement',
    decimalPlaces: 4,
    signature: {
      settlementCurve: 'NYMEX HH',
      forwardCurve: 'HH Forward',
      averagingPeriod: 'M-1 (Month Ahead)',
      lag: '0 business days',
      weighting: 'Equal'
    },
    formula: 'Avg(NYMEX_HH_Settlement[M-1], BusinessDays)'
  },
  {
    id: 'IDX-006',
    name: 'SGP_Brent Slope 14.85%',
    description: 'Oil-indexed LNG price derived from Brent slope formula — common in legacy Asian SPAs.',
    signatureType: 'OilSlope',
    status: 'Active',
    priceUnits: '$/MMBtu',
    observationType: 'Monthly Average',
    decimalPlaces: 4,
    signature: {
      settlementCurve: 'ICE Brent Dated',
      forwardCurve: 'Brent Forward',
      averagingPeriod: '3-month trailing',
      lag: '3 months',
      weighting: 'Equal (3M)'
    },
    formula: '0.1485 * Avg(ICE_Brent[M-5..M-3]) + 0.50'
  },
  {
    id: 'IDX-007',
    name: 'SGP_NBP Day Ahead',
    description: 'ICE UK National Balancing Point day-ahead index for European regas terminal deliveries.',
    signatureType: 'AbsoluteSpot',
    status: 'Inactive',
    priceUnits: 'p/therm',
    observationType: 'Daily Close',
    decimalPlaces: 2,
    signature: {
      settlementCurve: 'ICE NBP',
      forwardCurve: 'NBP Forward',
      averagingPeriod: 'Spot (D+1)',
      lag: '0 business days',
      weighting: 'N/A'
    },
    formula: 'ICE_NBP_Settlement[D+1]'
  },
  {
    id: 'IDX-008',
    name: 'SGP_Hybrid JKM-Brent 50/50',
    description: 'Blended index: 50% JKM hub-indexed + 50% Brent oil-slope, used in transitional SPAs.',
    signatureType: 'HybridBlend',
    status: 'Active',
    priceUnits: '$/MMBtu',
    observationType: 'Monthly Average',
    decimalPlaces: 4,
    signature: {
      settlementCurve: 'Platts JKM / ICE Brent',
      forwardCurve: 'JKM Fwd / Brent Fwd',
      averagingPeriod: 'M-1 (Month Ahead)',
      lag: '0 / 3 months',
      weighting: '50% / 50%'
    },
    formula: '0.50 * Avg(JKM[M-1]) + 0.50 * (0.1485 * Avg(Brent[M-5..M-3]) + 0.50)'
  }
];

var selectedIndex = 0;

/* ========== RENDER INDEX LIST ========== */
function renderIndexList(filter) {
  var container = document.getElementById('ib-list-items');
  var html = '';
  var q = (filter || '').toLowerCase();

  indices.forEach(function(idx, i) {
    if (q && idx.name.toLowerCase().indexOf(q) < 0 && idx.signatureType.toLowerCase().indexOf(q) < 0) return;

    var isActive = (i === selectedIndex);
    var statusClass = idx.status === 'Active' ? 'green' : 'neutral';
    var sigColor = getSignatureBadgeColor(idx.signatureType);

    html += '<div class="ib-item' + (isActive ? ' active' : '') + '" onclick="selectIndex(' + i + ')">';
    html += '  <div class="ib-item-top">';
    html += '    <span class="ib-item-name">' + idx.name + '</span>';
    html += '    <span class="hz-badge ' + statusClass + '">' + idx.status + '</span>';
    html += '  </div>';
    html += '  <div class="ib-item-meta">';
    html += '    <span class="hz-badge ' + sigColor + '" style="font-size:0.5625rem;">' + idx.signatureType + '</span>';
    html += '    <span style="color:var(--text-muted);">' + idx.priceUnits + '</span>';
    html += '  </div>';
    html += '</div>';
  });

  container.innerHTML = html;
}

function getSignatureBadgeColor(type) {
  var map = {
    'MonthlySpot': 'blue',
    'AbsoluteSpot': 'green',
    'StandardProductWithFX': 'amber',
    'CalendarProduct': 'neutral',
    'OilSlope': 'red',
    'HybridBlend': 'blue',
  };
  return map[type] || 'neutral';
}

/* ========== RENDER DETAIL PANEL ========== */
function renderDetail() {
  var idx = indices[selectedIndex];
  var container = document.getElementById('ib-detail');
  var sigColor = getSignatureBadgeColor(idx.signatureType);

  var html = '';

  /* Header */
  html += '<div class="ib-detail-header">';
  html += '  <div class="ib-detail-name">' + idx.name + '</div>';
  html += '  <div class="ib-detail-desc">' + idx.description + '</div>';
  html += '</div>';

  html += '<div class="ib-detail-body">';

  /* Properties */
  html += '<div class="ib-props">';
  html += renderProp('Index ID', '<span class="hz-entity-link" style="font-family:var(--font-mono);">' + idx.id + '</span>');
  html += renderProp('Price Units', idx.priceUnits);
  html += renderProp('Observation Type', idx.observationType);
  html += renderProp('Decimal Places', '<span class="font-mono">' + idx.decimalPlaces + '</span>');
  html += renderProp('Status', '<span class="hz-badge ' + (idx.status === 'Active' ? 'green' : 'neutral') + '">' + idx.status + '</span>');
  html += renderProp('Signature Type', '<span class="hz-badge ' + sigColor + '">' + idx.signatureType + '</span>');
  html += '</div>';

  /* Price Signature */
  html += '<div class="ib-sig-section">';
  html += '  <div class="ib-sig-header">';
  html += '    <span class="ib-sig-title">Price Signature</span>';
  html += '    <span class="hz-badge ' + sigColor + '">' + idx.signatureType + '</span>';
  html += '  </div>';
  html += '  <div class="ib-sig-body">';
  html += '    <div class="ib-sig-params">';
  html += renderProp('Settlement Curve', idx.signature.settlementCurve);
  html += renderProp('Forward Curve', idx.signature.forwardCurve);
  html += renderProp('Averaging Period', idx.signature.averagingPeriod);
  html += renderProp('Lag', idx.signature.lag);
  html += renderProp('Weighting', idx.signature.weighting);
  html += '    </div>';
  html += '  </div>';
  html += '</div>';

  /* Formula Preview */
  html += '<div>';
  html += '  <div style="font-size:var(--text-xs); font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:var(--sp-2);">Formula</div>';
  html += '  <div class="ib-formula">' + idx.formula + '</div>';
  html += '</div>';

  /* Test Section */
  html += '<div class="ib-test">';
  html += '  <div class="ib-test-title">Evaluate Index</div>';
  html += '  <div class="ib-test-form">';
  html += '    <div class="ib-test-group">';
  html += '      <label class="hz-label">COB Date</label>';
  html += '      <input type="date" class="hz-input" id="ib-cob-date" value="2026-04-30" style="width:10rem;" />';
  html += '    </div>';
  html += '    <div class="ib-test-group">';
  html += '      <label class="hz-label">Maturity Start</label>';
  html += '      <input type="date" class="hz-input" id="ib-mat-start" value="2026-05-01" style="width:10rem;" />';
  html += '    </div>';
  html += '    <button class="hz-btn primary" onclick="evaluateIndex()">Evaluate</button>';
  html += '  </div>';
  html += '  <div class="ib-test-result" id="ib-test-result" style="display:none;">';
  html += '    <span class="ib-test-result-label">Result</span>';
  html += '    <span class="ib-test-result-value" id="ib-result-value"></span>';
  html += '    <span style="font-size:var(--text-xs); color:var(--text-muted);" id="ib-result-units"></span>';
  html += '  </div>';
  html += '</div>';

  html += '</div>'; /* end detail-body */

  container.innerHTML = html;
}

function renderProp(label, value) {
  return '<div class="ib-prop"><span class="ib-prop-label">' + label + '</span><span class="ib-prop-value">' + value + '</span></div>';
}

/* ========== INTERACTIONS ========== */
function selectIndex(i) {
  selectedIndex = i;
  renderIndexList(document.getElementById('ib-search').value);
  renderDetail();
}

function filterIndices() {
  var q = document.getElementById('ib-search').value;
  renderIndexList(q);
}

function evaluateIndex() {
  var idx = indices[selectedIndex];
  /* Simulated evaluation result */
  var mockResults = {
    'IDX-001': 14.2475,
    'IDX-002': 82.40,
    'IDX-003': 13.1842,
    'IDX-004': 78.33,
    'IDX-005': 3.4175,
    'IDX-006': 12.6948,
    'IDX-007': 72.15,
    'IDX-008': 13.4711
  };
  var result = mockResults[idx.id] || (Math.random() * 15 + 5).toFixed(4);
  var dp = idx.decimalPlaces;

  document.getElementById('ib-test-result').style.display = 'flex';
  document.getElementById('ib-result-value').textContent = parseFloat(result).toFixed(dp);
  document.getElementById('ib-result-units').textContent = idx.priceUnits;

  showToast('Index ' + idx.id + ' evaluated: ' + parseFloat(result).toFixed(dp) + ' ' + idx.priceUnits, 'success');
}

/* ========== INITIAL RENDER ========== */
document.addEventListener('DOMContentLoaded', function() {
  renderIndexList();
  renderDetail();
});
</script>

</body>
</html>
